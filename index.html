<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#070a12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PF Coach" />
  <title>PF Workout Coach · Atlas 2.0</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a12;
      --bg2: #0b1120;
      --surface: #111827;
      --surface2: #182132;
      --surface3: #202b3e;
      --text: #f7f9fd;
      --muted: #9aa7bd;
      --line: rgba(255,255,255,.105);
      --purple: #8b5cf6;
      --blue: #3b82f6;
      --green: #22c55e;
      --cyan: #06b6d4;
      --orange: #f59e0b;
      --red: #fb7185;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --shadow: 0 20px 60px rgba(0,0,0,.34);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #eef2f8;
      --bg2: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --surface3: #e7edf5;
      --text: #111827;
      --muted: #5f6b7e;
      --line: rgba(15,23,42,.11);
      --shadow: 0 18px 45px rgba(30,41,59,.13);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    html { background: var(--bg); }
    body {
      background:
        radial-gradient(circle at 2% -8%, rgba(139,92,246,.24), transparent 31rem),
        radial-gradient(circle at 100% 0%, rgba(6,182,212,.12), transparent 27rem),
        linear-gradient(150deg, var(--bg), var(--bg2));
      color: var(--text);
      padding-bottom: calc(86px + var(--safe-bottom));
      overflow-x: hidden;
    }
    body.focus-running { overflow: hidden; padding-bottom: 0; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; color: inherit; }
    button:disabled { opacity: .42; cursor: default; }
    input, select, textarea {
      width: 100%;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;
      font-size: 16px;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(139,92,246,.75);
      box-shadow: 0 0 0 4px rgba(139,92,246,.14);
    }
    h1,h2,h3,p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: clamp(34px, 9vw, 54px); line-height: .95; letter-spacing: -.058em; }
    h2 { margin-bottom: 10px; font-size: clamp(25px, 6vw, 34px); line-height: 1.02; letter-spacing: -.042em; }
    h3 { margin-bottom: 8px; font-size: 18px; letter-spacing: -.022em; }
    a { color: inherit; }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .eyebrow { color: var(--green); text-transform: uppercase; letter-spacing: .16em; font-size: 12px; font-weight: 900; }
    .shell { width: min(760px, calc(100% - 30px)); margin: 0 auto; }
    .app-header {
      position: sticky; top: 0; z-index: 40;
      padding-top: var(--safe-top);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(22px);
      border-bottom: 1px solid var(--line);
    }
    .header-inner { min-height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 48px; height: 48px; border-radius: 16px; flex: 0 0 auto;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      box-shadow: 0 14px 34px rgba(84,83,255,.28);
      overflow: hidden;
    }
    .brand-mark svg { width: 29px; height: 29px; }
    .brand-copy { min-width: 0; }
    .brand-title { font-weight: 920; font-size: 19px; letter-spacing: -.035em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .version-badge { display: inline-flex; margin-left: 6px; padding: 3px 7px; border-radius: 999px; font-size: 10px; letter-spacing: .08em; color: #c8fbd7; background: rgba(34,197,94,.13); border: 1px solid rgba(34,197,94,.35); vertical-align: 2px; }
    .icon-btn {
      width: 46px; height: 46px; border-radius: 16px; display: grid; place-items: center;
      background: var(--surface2); border: 1px solid var(--line); font-size: 20px;
    }
    .main { padding: 18px 0 34px; }
    .stack { display: grid; gap: 16px; }
    .card {
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-pad { padding: 22px; }
    .soft-card { background: var(--surface2); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 17px; }
    .mission-card {
      position: relative;
      background:
        radial-gradient(circle at 90% 8%, rgba(6,182,212,.16), transparent 18rem),
        radial-gradient(circle at 0% 0%, rgba(139,92,246,.25), transparent 22rem),
        var(--surface);
    }
    .mission-card::after { content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit; box-shadow: inset 0 1px 0 rgba(255,255,255,.06); }
    .mission-meta { display: flex; flex-wrap: wrap; gap: 9px; margin: 16px 0; }
    .chip { display: inline-flex; align-items: center; gap: 7px; min-height: 34px; padding: 7px 11px; border-radius: 999px; background: rgba(255,255,255,.065); border: 1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 800; }
    .chip.good { color: #a7f3d0; background: rgba(34,197,94,.11); border-color: rgba(34,197,94,.28); }
    .mission-note { color: #dbe5f5; line-height: 1.55; padding: 14px 15px; background: rgba(255,255,255,.055); border-left: 4px solid var(--purple); border-radius: 16px; }
    .btn {
      min-height: 50px; border-radius: 17px; padding: 13px 17px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      background: var(--surface2); border: 1px solid var(--line); font-weight: 880; text-decoration: none;
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:active { transform: scale(.985); }
    .btn.primary { background: linear-gradient(135deg, var(--purple), #2863ef); color: #fff; border: 0; box-shadow: 0 18px 38px rgba(91,71,230,.3); }
    .btn.green { background: linear-gradient(135deg, var(--green), var(--cyan)); color: #fff; border: 0; }
    .btn.danger { color: #ffd5dc; background: rgba(251,113,133,.12); border-color: rgba(251,113,133,.28); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 40px; padding: 9px 12px; border-radius: 14px; font-size: 13px; }
    .btn.block { width: 100%; }
    .button-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 11px; }
    .button-row.one { grid-template-columns: 1fr; }
    .mini-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 11px; }
    .metric { padding: 16px; border-radius: 21px; background: var(--surface2); border: 1px solid var(--line); min-width:0; }
    .metric-label { color: var(--muted); font-size: 12px; font-weight: 790; }
    .metric-value { margin-top: 5px; font-size: 28px; font-weight: 940; letter-spacing: -.045em; overflow-wrap:anywhere; }
    .metric-sub { color: var(--muted); margin-top: 3px; font-size: 12px; line-height: 1.35; }
    .section-head { display:flex; align-items:end; justify-content:space-between; gap:12px; margin: 8px 2px 12px; }
    .section-head h2,.section-head h3 { margin:0; }
    .coach-brief { display:grid; gap:10px; }
    .coach-line { display:grid; grid-template-columns: 32px 1fr; gap:11px; align-items:start; padding:12px 0; border-bottom:1px solid var(--line); }
    .coach-line:last-child { border-bottom:0; padding-bottom:0; }
    .coach-line:first-child { padding-top:0; }
    .coach-icon { width:32px;height:32px;border-radius:12px;display:grid;place-items:center;background:rgba(139,92,246,.15); }
    .coach-line strong { display:block; margin-bottom:3px; }
    .week-strip { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:7px; }
    .day-cell { min-height:66px; border-radius:17px; display:grid; place-items:center; align-content:center; gap:4px; background:var(--surface2); border:1px solid var(--line); color:var(--muted); font-size:11px; font-weight:850; }
    .day-cell.done { background:rgba(34,197,94,.14); border-color:rgba(34,197,94,.38); color:#d8ffe4; }
    .day-cell.today { outline:2px solid rgba(139,92,246,.62); outline-offset:1px; }
    .day-cell b { font-size:16px; color:var(--text); }
    .quick-launch { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .quick-launch button { min-height:58px; border-radius:19px; background:var(--surface2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:10px; font-weight:900; }
    .quick-launch button:first-child { background:linear-gradient(135deg,rgba(34,197,94,.9),rgba(6,182,212,.9)); color:#fff; border:0; }
    .bottom-nav {
      position:fixed; left:0; right:0; bottom:0; z-index:60;
      padding: 9px 10px calc(9px + var(--safe-bottom));
      background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter:blur(24px); border-top:1px solid var(--line);
    }
    .nav-inner { width:min(760px,100%); margin:0 auto; display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:5px; }
    .nav-btn { min-height:60px; border-radius:18px; background:transparent; color:var(--muted); display:grid; place-items:center; align-content:center; gap:4px; font-size:11px; font-weight:850; }
    .nav-btn span:first-child { font-size:21px; line-height:1; }
    .nav-btn.active { color:var(--text); background:var(--surface2); border:1px solid var(--line); }
    .plan-day { display:grid; grid-template-columns:52px 1fr auto; gap:13px; align-items:center; padding:15px; border-radius:22px; background:var(--surface2); border:1px solid var(--line); }
    .plan-num { width:52px;height:52px;border-radius:17px;display:grid;place-items:center;font-weight:940;background:rgba(139,92,246,.14);color:#ddd2ff; }
    .plan-day.rest .plan-num { background:rgba(34,197,94,.12);color:#bff5cd; }
    .plan-day h3 { margin:0 0 3px; }
    .plan-day .tag { font-size:11px;color:var(--muted);font-weight:800; }
    .preview-exercise { display:grid; gap:4px; padding:14px 0; border-bottom:1px solid var(--line); }
    .preview-exercise:last-child { border-bottom:0; }
    .preview-top { display:flex; justify-content:space-between; gap:10px; align-items:start; }
    .target-pill { white-space:nowrap; padding:5px 9px; border-radius:999px; background:rgba(139,92,246,.14); color:#dcd2ff; font-size:11px; font-weight:900; }
    .history-card { border-radius:24px; background:var(--surface2); border:1px solid var(--line); overflow:hidden; }
    .history-card summary { list-style:none; padding:17px; cursor:pointer; }
    .history-card summary::-webkit-details-marker { display:none; }
    .history-top { display:flex; align-items:start; justify-content:space-between; gap:12px; }
    .history-stats { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .history-body { border-top:1px solid var(--line); padding:17px; display:grid; gap:12px; }
    .history-ex { padding:12px 0; border-bottom:1px solid var(--line); }
    .history-ex:last-child { border-bottom:0; }
    .set-inline { display:flex; flex-wrap:wrap; gap:7px; margin-top:7px; }
    .set-chip { padding:6px 9px; border-radius:11px; background:rgba(255,255,255,.06); border:1px solid var(--line); font-size:12px; color:#dfe7f6; }
    .set-chip.wu { opacity:.6; }
    .chart-card { padding:18px; background:var(--surface2); border:1px solid var(--line); border-radius:24px; }
    .chart-wrap { width:100%; height:190px; margin-top:12px; }
    .chart-wrap svg { width:100%; height:100%; overflow:visible; }
    .chart-empty { display:grid;place-items:center;height:160px;color:var(--muted);text-align:center; }
    .form-grid { display:grid; gap:12px; }
    .field label { display:block;color:var(--muted);font-size:12px;font-weight:800;margin:0 0 6px 3px; }
    details.setting { background:var(--surface2);border:1px solid var(--line);border-radius:22px;overflow:hidden; }
    details.setting summary { list-style:none;cursor:pointer;padding:17px;font-weight:900;display:flex;justify-content:space-between;gap:12px; }
    details.setting summary::-webkit-details-marker { display:none; }
    .setting-body { border-top:1px solid var(--line);padding:17px;display:grid;gap:13px; }
    .empty { padding:24px;text-align:center;color:var(--muted);background:var(--surface2);border:1px dashed var(--line);border-radius:21px; }
    .toast { position:fixed;left:50%;bottom:calc(92px + var(--safe-bottom));transform:translate(-50%,20px);z-index:120;max-width:min(430px,calc(100% - 32px));padding:12px 16px;border-radius:16px;background:#05070d;color:#fff;border:1px solid rgba(255,255,255,.13);box-shadow:0 18px 55px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s ease;font-weight:800;text-align:center; }
    .toast.show { opacity:1;transform:translate(-50%,0); }

    /* Focus workout mode */
    .focus-shell { position:fixed;inset:0;z-index:100;background:linear-gradient(155deg,#05070d,#0b1120 60%,#0b0e18);display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;padding-top:var(--safe-top); }
    .focus-header { min-height:66px;padding:10px 14px;display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08); }
    .focus-close,.focus-menu { width:44px;height:44px;border-radius:15px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;font-size:18px; }
    .focus-title { min-width:0;text-align:center; }
    .focus-title strong { display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px; }
    .focus-title span { color:#9aa7bd;font-size:12px; }
    .focus-elapsed { font-variant-numeric:tabular-nums;font-size:13px;font-weight:900; }
    .focus-progress { padding:10px 17px 8px; }
    .focus-progress-top { display:flex;justify-content:space-between;gap:10px;color:#aab5c9;font-size:12px;font-weight:800;margin-bottom:8px; }
    .progress-track { height:6px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden; }
    .progress-fill { height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),var(--blue),var(--cyan));transition:width .25s ease; }
    .exercise-stage { min-height:0;padding:6px 14px 10px;touch-action:pan-y; }
    .exercise-focus-card { height:100%;max-width:680px;margin:0 auto;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.12);border-radius:30px;box-shadow:0 26px 70px rgba(0,0,0,.42);overflow:hidden;animation:cardIn .22s ease; }
    @keyframes cardIn { from{opacity:.2;transform:translateX(18px) scale(.985)} to{opacity:1;transform:none} }
    .exercise-scroll { height:100%;overflow-y:auto;overscroll-behavior:contain;padding:20px 19px 26px;scrollbar-width:none; }
    .exercise-scroll::-webkit-scrollbar { display:none; }
    .exercise-number { color:#9aa7bd;text-transform:uppercase;letter-spacing:.13em;font-size:11px;font-weight:900; }
    .exercise-title { font-size:clamp(30px,8vw,44px);line-height:.95;letter-spacing:-.055em;margin:8px 0 7px; }
    .exercise-target { color:#c5cede;font-size:14px; }
    .previous-card { margin-top:16px;padding:14px;border-radius:20px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.09); }
    .previous-head { display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px; }
    .previous-head strong { font-size:13px; }
    .previous-date { color:#8f9bb0;font-size:11px; }
    .coach-target { margin-top:10px;padding:10px 11px;border-radius:14px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.21);color:#caf7d5;font-size:12px;line-height:1.4; }
    .logged-strip { display:flex;gap:8px;overflow-x:auto;padding:14px 1px 3px;scrollbar-width:none; }
    .logged-strip::-webkit-scrollbar { display:none; }
    .logged-set { flex:0 0 auto;min-width:82px;padding:10px;border-radius:16px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.09);text-align:center; }
    .logged-set b { display:block;font-size:16px; }
    .logged-set span { color:#9aa7bd;font-size:10px; }
    .logged-set.warmup { opacity:.55; }
    .log-panel { margin-top:14px;padding:16px;border-radius:24px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.09); }
    .step-label { display:flex;justify-content:space-between;gap:10px;align-items:center;color:#aab5c9;font-size:12px;font-weight:850;margin-bottom:9px; }
    .step-label strong { color:#f8fbff; }
    .number-stepper { display:grid;grid-template-columns:54px 1fr 54px;gap:9px;align-items:center; }
    .step-btn { height:54px;border-radius:17px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-size:25px;font-weight:900; }
    .big-number { height:62px;text-align:center;font-size:30px;font-weight:950;letter-spacing:-.05em;background:rgba(255,255,255,.075);color:#fff;border-color:rgba(255,255,255,.1);padding:8px; }
    .quick-adjust { display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-top:8px; }
    .quick-adjust button { min-height:39px;border-radius:13px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.09);font-size:12px;font-weight:900; }
    .rep-row { margin-top:15px; }
    .feel-segment { margin-top:15px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px; }
    .feel-btn { min-height:48px;border-radius:15px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);font-size:12px;font-weight:900; }
    .feel-btn.active { border-color:rgba(139,92,246,.75);background:rgba(139,92,246,.2);box-shadow:0 0 0 2px rgba(139,92,246,.13); }
    .warm-toggle { margin-top:12px;display:flex;align-items:center;gap:10px;color:#b2bdd0;font-size:12px;font-weight:750; }
    .warm-toggle input { width:20px;height:20px;accent-color:var(--purple); }
    .log-set-btn { width:100%;min-height:61px;margin-top:15px;border-radius:19px;background:linear-gradient(135deg,var(--purple),#2563eb);color:#fff;font-size:17px;font-weight:950;box-shadow:0 18px 36px rgba(79,70,229,.28); }
    .card-details { margin-top:13px;border:1px solid rgba(255,255,255,.08);border-radius:17px;overflow:hidden; }
    .card-details summary { list-style:none;cursor:pointer;padding:13px 14px;color:#c4ccda;font-size:12px;font-weight:850; }
    .card-details summary::-webkit-details-marker { display:none; }
    .card-details-body { border-top:1px solid rgba(255,255,255,.08);padding:13px;display:grid;gap:10px;color:#aeb9cc;font-size:12px;line-height:1.48; }
    .focus-bottom { padding:9px 14px calc(10px + var(--safe-bottom));display:grid;grid-template-columns:1fr 1.4fr;gap:9px;border-top:1px solid rgba(255,255,255,.08);background:rgba(4,6,12,.9);backdrop-filter:blur(18px); }
    .focus-bottom.one { grid-template-columns:1fr; }
    .focus-bottom .btn { min-height:54px; }
    .rest-overlay { position:fixed;inset:0;z-index:160;background:rgba(3,5,10,.94);backdrop-filter:blur(18px);display:grid;place-items:center;padding:24px;padding-top:calc(24px + var(--safe-top));padding-bottom:calc(24px + var(--safe-bottom)); }
    .rest-card { width:min(430px,100%);text-align:center; }
    .rest-label { color:#a7b3c7;letter-spacing:.22em;text-transform:uppercase;font-weight:900;font-size:13px; }
    .rest-ring { --rest-pct:100%;width:240px;height:240px;margin:22px auto;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--purple) var(--rest-pct),rgba(255,255,255,.08) 0);position:relative; }
    .rest-ring::after { content:"";position:absolute;inset:12px;border-radius:50%;background:#080c16; }
    .rest-time { position:relative;z-index:1;font-size:62px;font-weight:950;letter-spacing:-.07em;font-variant-numeric:tabular-nums; }
    .rest-next { color:#a9b4c8;line-height:1.5;margin:0 auto 20px;max-width:330px; }
    .rest-actions { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
    .completion-hero { text-align:center;padding:30px 22px; }
    .completion-icon { width:86px;height:86px;border-radius:28px;margin:0 auto 18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--cyan));font-size:42px;box-shadow:0 24px 55px rgba(34,197,94,.22); }
    .completion-grid { display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:20px 0; }

    const $ = (selector, scope = document) => scope.querySelector(selector);

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

    const dateKey = (date = new Date()) => { const d = new Date(date); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
    const cleanNumber = value => { const n=Number(value); if(!Number.isFinite(n)) return ''; const r=Math.round(n*100)/100; return Number.isInteger(r)?String(r):String(r); };
    const deepClone = value => JSON.parse(JSON.stringify(value));

    let state = loadState();

    let elapsedTimer = null;
    let restTimer = null;
    let restState = null;
    let lastCompletedSession = null;
    let swipeStart = null;

    function defaultState() {
      return {
        version: 2,
        createdAt: new Date().toISOString(),
        settings: {
          currentDayIndex: 0,
          profileName: 'Bobby',

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const base = defaultState();
        const merged = { ...base, ...parsed };
        merged.settings = { ...base.settings, ...(parsed.settings || {}) };
        merged.goals = { ...base.goals, ...(parsed.goals || {}) };
        merged.history = Array.isArray(parsed.history) ? parsed.history : [];
        merged.bodyMetrics = Array.isArray(parsed.bodyMetrics) ? parsed.bodyMetrics : [];
        merged.dailyCheckins = Array.isArray(parsed.dailyCheckins) ? parsed.dailyCheckins : [];
        merged.exerciseProgress = parsed.exerciseProgress || {};
        return merged;
      } catch (error) {
        console.warn('State load failed', error);
        return defaultState();
      }
    }

    function loadActive() {
      try {
        const raw = localStorage.getItem(ACTIVE_KEY);
        if (!raw) return null;
        const session = JSON.parse(raw);
        session.currentExerciseIndex = Number.isFinite(Number(session.currentExerciseIndex)) ? Number(session.currentExerciseIndex) : 0;
        session.sessionNote = session.sessionNote || '';
        session.exercises = Array.isArray(session.exercises) ? session.exercises.map(entry => ({
          id: entry.id,
          logs: Array.isArray(entry.logs) ? entry.logs : [],

          draftReps: Number.isFinite(Number(entry.draftReps)) ? Number(entry.draftReps) : null,
          draftFeel: ['easy','good','hard'].includes(entry.draftFeel) ? entry.draftFeel : 'good',

        })) : [];
        return session;
      } catch (error) {
        console.warn('Active session load failed', error);
        return null;
      }
    }

    function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (error) { console.warn('State save unavailable', error); } updateChrome(); }
    function saveActive() { try { if(active) localStorage.setItem(ACTIVE_KEY, JSON.stringify(active)); else localStorage.removeItem(ACTIVE_KEY); } catch (error) { console.warn('Active session save unavailable', error); } }
    function getDay(index = state.settings.currentDayIndex) { return PLAN[((Number(index)||0)+PLAN.length)%PLAN.length]; }
    function getExercise(id) { for (const day of PLAN) { const ex = day.exercises.find(item => item.id===id); if(ex) return ex; } return null; }
    function targetLabel(ex) { return (ex.type==='cardio'||ex.type==='timed') ? `${ex.min}–${ex.max} ${ex.unit||'min'}` : `${ex.sets} × ${ex.min}–${ex.max}`; }
    function feelEmoji(feel) { return feel==='easy'?'🟢':feel==='hard'?'🔴':'🟡'; }
    function workingLogs(logs=[]) { return logs.filter(log => !log.warmup); }
    function latestBodyMetric() { return [...state.bodyMetrics].sort((a,b)=>new Date(a.date)-new Date(b.date)).at(-1) || null; }
    function roundTo(value, increment=5) { return Math.round(Number(value)/increment)*increment; }
    function formatDuration(ms) { const total=Math.max(0,Math.floor(Number(ms||0)/1000)); const h=Math.floor(total/3600),m=Math.floor((total%3600)/60),s=total%60; return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`; }
    function estimatedMinutes(day) {
      if(day.type==='rest') return 25;
      const working = day.exercises.reduce((sum,ex)=>sum + (ex.type==='weighted'||ex.type==='bodyweight'?ex.sets:0),0);
      const cardio = day.exercises.filter(ex=>ex.type==='cardio'||ex.type==='timed').reduce((sum,ex)=>sum+ex.min,0);
      return Math.round(8 + working*2.15 + cardio);
    }
    function greeting() { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }

    function render() {

    function stats() {
      const liftSessions=state.history.filter(s=>s.type!=='rest');
      const restDays=state.history.filter(s=>s.type==='rest').length;
      const totalSets=liftSessions.reduce((sum,s)=>sum+(s.exercises||[]).reduce((a,e)=>a+workingLogs(e.logs||[]).length,0),0);
      const totalVolume=liftSessions.reduce((sum,s)=>sum+sessionVolume(s),0);
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-6);cutoff.setHours(0,0,0,0);
      const thisWeek=state.history.filter(s=>new Date(s.startedAt)>=cutoff).length;
      return {liftSessions:liftSessions.length,restDays,totalSets,totalVolume,thisWeek,streak:calculateStreak()};
    }

    function calculateStreak() {
      const dates=new Set(state.history.map(s=>dateKey(s.startedAt)));
      let cursor=new Date(); let count=0;
      if(!dates.has(dateKey(cursor))) cursor.setDate(cursor.getDate()-1);
      while(dates.has(dateKey(cursor))){count++;cursor.setDate(cursor.getDate()-1);} return count;
    }

    function sessionVolume(session) {
      let total=0;
      for(const entry of session.exercises||[]){
        const ex=getExercise(entry.id); if(!ex||ex.type!=='weighted') continue;

      }
      return Math.round(total);
    }

    function sessionWorkingSets(session) { return (session.exercises||[]).reduce((sum,e)=>sum+workingLogs(e.logs||[]).length,0); }

    function renderHome() {

                <p class="muted" style="font-size:17px">${esc(day.focus)}</p>
                <div class="mission-meta">
                  <span class="chip ${isRest?'good':''}">${isRest?'☁️ Recovery':'⚡ Ready'}</span>
                  <span class="chip">⏱ ${estimatedMinutes(day)} min</span>
                  <span class="chip">Day ${day.day} of 7</span>
                  <span class="chip">🚫 No lunges</span>
                </div>
                <div class="mission-note">${esc(day.note)}</div>
                <div class="button-row ${isRest?'':'one'}" style="margin-top:16px">
                  ${isRest&&!resume?`<button class="btn green" data-action="mark-rest">Mark rest complete</button>`:''}
                  <button class="btn primary" data-action="${resume?'resume-workout':'start-workout'}">${resume?'Resume mission':isRest?'Start optional recovery':'Start workout'}</button>
                </div>
              </div>
            </section>
            <section class="card"><div class="card-pad"><div class="eyebrow">Coach briefing</div><div class="coach-brief" style="margin-top:14px">${renderCoachBrief(day)}</div></div></section>
            <section class="card"><div class="card-pad"><div class="section-head" style="margin-top:0"><h3>Quick launch</h3></div>${renderQuickLaunch()}</div></section>
          </div>
          <section class="card"><div class="card-pad"><div class="section-head" style="margin-top:0"><h3>This week</h3><span class="muted" style="font-size:12px">${st.thisWeek} completed</span></div>${renderWeekStrip()}</div></section>
          <section class="card"><div class="card-pad">
            <div class="section-head" style="margin-top:0"><h3>Progress snapshot</h3><button class="btn small ghost" data-view="progress">View progress</button></div>
            <div class="mini-grid">
              <div class="metric"><div class="metric-label">Latest weight</div><div class="metric-value">${metric?`${esc(metric.weight)} lb`:'—'}</div><div class="metric-sub">${metric&&Number.isFinite(trend.avg7)?`7-day avg ${cleanNumber(trend.avg7)} lb`:'Log 3–4 mornings per week'}</div></div>
              <div class="metric"><div class="metric-label">Consistency</div><div class="metric-value">${st.streak}</div><div class="metric-sub">day streak · ${st.liftSessions} lift sessions total</div></div>
            </div>
          </div></section>
        </div>`;
    }

    function renderCoachBrief(day) {
      if(day.type==='rest') return `
        <div class="coach-line"><div class="coach-icon">☁️</div><div><strong>Recovery is training</strong><span class="muted">Keep today easy enough that tomorrow feels better.</span></div></div>
        <div class="coach-line"><div class="coach-icon">🚶</div><div><strong>Optional movement</strong><span class="muted">A conversational walk and a few minutes of mobility are plenty.</span></div></div>`;
      const lines=day.exercises.filter(ex=>ex.type==='weighted'||ex.type==='bodyweight').slice(0,3).map((ex,i)=>{
        const p=state.exerciseProgress[ex.id];
        return `<div class="coach-line"><div class="coach-icon">${i+1}</div><div><strong>${esc(ex.name)}</strong><span class="muted">${esc(p?.note||'Establish a clean baseline and leave 1–2 reps in reserve.')}</span></div></div>`;
      });
      return lines.join('');
    }

    function renderQuickLaunch() { return `<div class="quick-launch"><button data-action="open-app" data-app="pf">🏋️ PF app</button><button data-action="open-app" data-app="music">♫ Apple Music</button></div>`; }

    function renderWeekStrip() {
      const today=new Date();today.setHours(0,0,0,0);
      const done=new Map();
      state.history.forEach(s=>done.set(dateKey(s.startedAt),s.type==='rest'?'rest':'lift'));
      let html='';
      for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);const key=dateKey(d), status=done.get(key);html+=`<div class="day-cell ${status?'done':''} ${i===0?'today':''}"><span>${d.toLocaleDateString(undefined,{weekday:'short'}).slice(0,2)}</span><b>${d.getDate()}</b><span>${status==='rest'?'☁️':status?'✓':'·'}</span></div>`;}
      return `<div class="week-strip">${html}</div>`;
    }

    function renderWorkoutPreview() {
      const day=getDay();
      $('#view').innerHTML=`<div class="stack">
        <section class="card mission-card"><div class="card-pad">
          <div class="eyebrow">Workout brief · Day ${day.day}</div><h1 style="margin-top:9px">${esc(day.title)}</h1><p class="muted" style="font-size:17px">${esc(day.focus)}</p>
          <div class="mission-meta"><span class="chip">${day.type==='rest'?'☁️ Recovery':'🏋️ Lift'}</span><span class="chip">${estimatedMinutes(day)} min est.</span><span class="chip">${day.exercises.length} exercises</span></div>
          <div class="mission-note"><strong>Warm-up:</strong> ${esc(day.warmup)}</div>
          <div class="button-row ${day.type==='rest'?'':'one'}" style="margin-top:16px">${day.type==='rest'?'<button class="btn green" data-action="mark-rest">Mark rest complete</button>':''}<button class="btn primary" data-action="start-workout">${day.type==='rest'?'Start optional recovery':'Start mission'}</button></div>
        </div></section>
        <section class="card"><div class="card-pad"><div class="section-head" style="margin-top:0"><h2>Mission plan</h2><select data-action="change-day" style="width:auto;max-width:180px">${PLAN.map((d,i)=>`<option value="${i}" ${i===state.settings.currentDayIndex?'selected':''}>Day ${d.day}</option>`).join('')}</select></div>
        ${day.exercises.map(ex=>{const p=state.exerciseProgress[ex.id];return `<div class="preview-exercise"><div class="preview-top"><div><strong>${esc(ex.name)}</strong><div class="muted" style="font-size:12px;margin-top:3px">${esc(ex.equipment||'')} · ${esc(ex.cues||'')}</div></div><span class="target-pill">${esc(targetLabel(ex))}</span></div><div style="font-size:12px;color:#b8c4d7"><span style="color:#7de69b;font-weight:850">Coach:</span> ${esc(p?.note||'Build a clean baseline today.')}</div></div>`;}).join('')}
        </div></section>
      </div>`;
    }

    function startWorkout() {
      const day=getDay();
      active={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),dayIndex:state.settings.currentDayIndex,day:day.day,title:day.title,type:day.type,focus:day.focus,startedAt:new Date().toISOString(),sessionNote:'',currentExerciseIndex:0,exercises:day.exercises.map(ex=>({id:ex.id,logs:[],notes:'',draftWeight:initialWeight(ex),draftReps:initialReps(ex),draftFeel:'good',draftWarmup:false}))};
      saveActive();currentView='workout';render();showToast(day.type==='rest'?'Recovery session started.':'Mission started.');
    }

    function initialWeight(ex) { const p=state.exerciseProgress[ex.id]; if(ex.type==='weighted') return Number.isFinite(Number(p?.nextWeight))?Number(p.nextWeight):Number.isFinite(Number(p?.lastWeight))?Number(p.lastWeight):null; return null; }
    function initialReps(ex) { const prev=getPreviousExercise(ex.id); const logs=prev?workingLogs(prev.entry.logs||[]):[]; const last=logs.at(-1); return Number.isFinite(Number(last?.reps))?clamp(Number(last.reps),1,99):ex.min; }

    function renderFocusWorkout() {
      if(!active){currentView='workout';renderWorkoutPreview();return;}
      const day=PLAN[active.dayIndex]||getDay();
      active.currentExerciseIndex=clamp(Number(active.currentExerciseIndex)||0,0,Math.max(0,active.exercises.length-1));
      const index=active.currentExerciseIndex, entry=active.exercises[index], ex=getExercise(entry.id), total=active.exercises.length;
      const completed=active.exercises.filter(e=>{const x=getExercise(e.id);return workingLogs(e.logs||[]).length>=(x?.sets||1);}).length;
      const progress=Math.round((completed/Math.max(1,total))*100);
      $('#view').innerHTML=`<div class="focus-shell">
        <header class="focus-header"><button class="focus-close" data-action="pause-workout" aria-label="Return home">⌄</button><div class="focus-title"><strong>Day ${day.day} · ${esc(day.title)}</strong><span>${esc(day.focus)}</span></div><div class="focus-elapsed" id="elapsed">${formatDuration(Date.now()-new Date(active.startedAt))}</div></header>
        <div class="focus-progress"><div class="focus-progress-top"><span>Exercise ${index+1} of ${total}</span><span>${completed}/${total} complete</span></div><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div></div>
        <main class="exercise-stage" id="exerciseStage">${renderFocusCard(ex,entry,index,total)}</main>
        <footer class="focus-bottom ${index===0?'one-left':''}">${index>0?'<button class="btn ghost" data-action="previous-exercise">← Back</button>':'<button class="btn ghost" data-action="pause-workout">Pause</button>'}${index<total-1?'<button class="btn primary" data-action="next-exercise">Next exercise →</button>':'<button class="btn green" data-action="finish-workout">Finish mission</button>'}</footer>
      </div>`;
      bindSwipe();startElapsedClock();
    }

    function renderFocusCard(ex, entry, index, total) {
      if(!ex) return '<div class="empty">Exercise unavailable.</div>';
      const logs=entry.logs||[], working=workingLogs(logs), targetHit=working.length>=ex.sets;
      const weight=Number.isFinite(Number(entry.draftWeight))?Number(entry.draftWeight):(initialWeight(ex)||'');
      const reps=Number.isFinite(Number(entry.draftReps))?Number(entry.draftReps):ex.min;
      return `<article class="exercise-focus-card"><div class="exercise-scroll">
        <div class="exercise-number">${targetHit?'✓ Target complete':`Exercise ${index+1} of ${total}`}</div>
        <h1 class="exercise-title">${esc(ex.name)}</h1>
        <div class="exercise-target">${esc(targetLabel(ex))} · ${esc(ex.equipment||'')}</div>
        ${renderPreviousCard(ex)}
        ${logs.length?`<div class="logged-strip">${logs.map((log,i)=>renderLoggedSet(ex,log,i,index)).join('')}</div>`:''}
        ${renderFocusLogPanel(ex,entry,index,weight,reps)}
        <details class="card-details"><summary>Form, notes & tools</summary><div class="card-details-body"><div><strong style="color:#fff">Form cue:</strong> ${esc(ex.cues||'Use controlled reps.')}</div><textarea data-input="exercise-note" placeholder="Seat position, grip, pain, machine used…">${esc(entry.notes||'')}</textarea>${ex.name.includes('Smith Machine')?renderPlateTool(ex,index,weight):''}<button class="btn small danger" data-action="delete-last-set">Delete last set</button></div></details>
      </div></article>`;
    }

    function renderPreviousCard(ex) {
      const prev=getPreviousExercise(ex.id); const p=state.exerciseProgress[ex.id];
      if(!prev) return `<div class="previous-card"><div class="previous-head"><strong>First benchmark</strong><span class="previous-date">Today</span></div><div class="muted" style="font-size:12px">Choose a clean starting load and leave 1–3 reps in reserve.</div></div>`;
      const logs=workingLogs(prev.entry.logs||[]);
      return `<div class="previous-card"><div class="previous-head"><strong>Previous workout</strong><span class="previous-date">${fmtDate(prev.session.startedAt)}</span></div><div class="set-inline">${logs.slice(-5).map(log=>`<span class="set-chip">${formatLogShort(ex,log)}</span>`).join('')}</div><div class="coach-target"><strong>Coach target:</strong> ${esc(p?.note||'Repeat the last clean setup.')}</div></div>`;
    }

    function renderLoggedSet(ex, log, setIndex, exerciseIndex) {
      const label=formatLogShort(ex,log); return `<button class="logged-set ${log.warmup?'warmup':''}" data-action="edit-set" data-set-index="${setIndex}" title="Tap to delete"><b>${esc(label)}</b><span>${log.warmup?'warm-up':`${feelEmoji(log.feel)} set ${setIndex+1}`}</span></button>`;
    }

    function renderFocusLogPanel(ex, entry, index, weight, reps) {
      const feel=entry.draftFeel||'good';
      if(ex.type==='weighted') return `<div class="log-panel">
        <div class="step-label"><span>Working weight</span><strong>${state.settings.units}</strong></div>
        <div class="number-stepper"><button class="step-btn" data-action="adjust-weight" data-delta="-5">−</button><input class="big-number" inputmode="decimal" data-input="weight" value="${esc(weight)}" placeholder="0"><button class="step-btn" data-action="adjust-weight" data-delta="5">+</button></div>
        <div class="quick-adjust"><button data-action="adjust-weight" data-delta="-10">−10</button><button data-action="adjust-weight" data-delta="-5">−5</button><button data-action="adjust-weight" data-delta="5">+5</button><button data-action="adjust-weight" data-delta="10">+10</button></div>
        ${renderRepAndFeel(entry,reps,feel)}
        <button class="log-set-btn" data-action="log-set">Log set ${workingLogs(entry.logs||[]).length+1}</button>
      </div>`;
      if(ex.type==='bodyweight') return `<div class="log-panel"><div class="step-label"><span>Reps</span><strong>Target ${ex.min}–${ex.max}</strong></div><div class="number-stepper"><button class="step-btn" data-action="adjust-reps" data-delta="-1">−</button><input class="big-number" inputmode="numeric" data-input="reps" value="${esc(reps)}"><button class="step-btn" data-action="adjust-reps" data-delta="1">+</button></div>${renderFeelOnly(entry,feel)}<button class="log-set-btn" data-action="log-set">Log set ${workingLogs(entry.logs||[]).length+1}</button></div>`;
      const duration=Number.isFinite(Number(entry.draftReps))?Number(entry.draftReps):ex.min;
      return `<div class="log-panel"><div class="step-label"><span>Duration</span><strong>${esc(ex.unit||'min')}</strong></div><div class="number-stepper"><button class="step-btn" data-action="adjust-duration" data-delta="-1">−</button><input class="big-number" inputmode="decimal" data-input="duration" value="${esc(duration)}"><button class="step-btn" data-action="adjust-duration" data-delta="1">+</button></div><input style="margin-top:10px" data-input="cardio-note" placeholder="Incline, speed, effort (optional)"><button class="log-set-btn" data-action="log-set">Log ${esc(ex.unit||'time')}</button></div>`;
    }

    function renderRepAndFeel(entry,reps,feel) { return `<div class="rep-row"><div class="step-label"><span>Reps</span><strong>Target range</strong></div><div class="number-stepper"><button class="step-btn" data-action="adjust-reps" data-delta="-1">−</button><input class="big-number" inputmode="numeric" data-input="reps" value="${esc(reps)}"><button class="step-btn" data-action="adjust-reps" data-delta="1">+</button></div></div>${renderFeelOnly(entry,feel)}`; }
    function renderFeelOnly(entry,feel) { return `<div class="feel-segment"><button class="feel-btn ${feel==='easy'?'active':''}" data-action="set-feel" data-feel="easy">🟢 Easy</button><button class="feel-btn ${feel==='good'?'active':''}" data-action="set-feel" data-feel="good">🟡 Right</button><button class="feel-btn ${feel==='hard'?'active':''}" data-action="set-feel" data-feel="hard">🔴 Hard</button></div><label class="warm-toggle"><input type="checkbox" data-input="warmup" ${entry.draftWarmup?'checked':''}> Warm-up set — save it, but ignore it for progression</label>`; }

    function renderPlateTool(ex,index,weight) { return `<div><strong style="color:#fff">Smith plate calculator</strong><div class="muted" style="margin-top:4px">Target ${esc(weight||0)} lb · starting resistance ${esc(state.settings.smithBarWeight)} lb</div><div style="margin-top:8px;color:#fff;font-weight:850">${esc(plateCalculation(Number(weight)||0,Number(state.settings.smithBarWeight)||0))}</div></div>`; }
    function plateCalculation(total,bar) { if(!Number.isFinite(total)||total<=0) return 'Enter a target weight.'; const per=Math.max(0,(total-bar)/2); const plates=[45,35,25,10,5,2.5]; let remaining=per, used=[]; for(const p of plates){const count=Math.floor((remaining+.001)/p);for(let i=0;i<count;i++)used.push(p);remaining-=count*p;} return remaining>.2?`${cleanNumber(per)} lb per side (closest plates vary)`:`Per side: ${used.length?used.join(' + '):'no plates'}`; }

    function getPreviousExercise(id) {
      const sessions=[...state.history].sort((a,b)=>new Date(b.startedAt)-new Date(a.startedAt));
      for(const session of sessions){const entry=(session.exercises||[]).find(e=>e.id===id && (e.logs||[]).length);if(entry)return{session,entry};} return null;
    }

    function formatLogShort(ex,log) {
      if(ex.type==='weighted') return `${log.warmup?'WU ':''}${cleanNumber(log.weight)}×${cleanNumber(log.reps)}`;
      if(ex.type==='bodyweight') return `${log.warmup?'WU ':''}${cleanNumber(log.reps)} reps${log.weight?` +${cleanNumber(log.weight)}`:''}`;
      return `${cleanNumber(log.duration)} ${ex.unit||'min'}`;
    }

    function syncDraftFromInputs() {
      if(!active) return; const entry=active.exercises[active.currentExerciseIndex], ex=getExercise(entry.id); if(!entry||!ex)return;
      const weight=Number($('[data-input="weight"]')?.value); if(Number.isFinite(weight)&&weight>=0) entry.draftWeight=weight;
      const reps=Number($('[data-input="reps"]')?.value); if(Number.isFinite(reps)&&reps>0) entry.draftReps=reps;
      const duration=Number($('[data-input="duration"]')?.value); if(Number.isFinite(duration)&&duration>0) entry.draftReps=duration;
      const note=$('[data-input="exercise-note"]')?.value; if(typeof note==='string') entry.notes=note;
      const warmup=$('[data-input="warmup"]'); if(warmup) entry.draftWarmup=Boolean(warmup.checked);
      saveActive();
    }

    function adjustDraft(kind,delta) {
      if(!active)return; const entry=active.exercises[active.currentExerciseIndex], ex=getExercise(entry.id); if(!entry||!ex)return;
      syncDraftFromInputs();
      if(kind==='weight'){const current=Number(entry.draftWeight)||0;entry.draftWeight=Math.max(0,Math.round((current+Number(delta))*100)/100);}
      if(kind==='reps'||kind==='duration'){const current=Number(entry.draftReps)||ex.min;entry.draftReps=Math.max(1,Math.round((current+Number(delta))*100)/100);}
      saveActive(); renderFocusWorkout();
    }

    function setFeel(feel) { if(!active)return; syncDraftFromInputs(); const entry=active.exercises[active.currentExerciseIndex];entry.draftFeel=['easy','good','hard'].includes(feel)?feel:'good';saveActive();renderFocusWorkout(); }

    function logSet() {
      if(!active)return; const index=active.currentExerciseIndex,entry=active.exercises[index],ex=getExercise(entry.id);if(!ex)return;
      syncDraftFromInputs(); const warmup=Boolean(entry.draftWarmup),feel=entry.draftFeel||'good';
      if(ex.type==='weighted'){
        const weight=Number(entry.draftWeight),reps=Number(entry.draftReps);if(!Number.isFinite(weight)||weight<=0||!Number.isFinite(reps)||reps<=0){showToast('Enter weight and reps.');return;}
        entry.logs.push({weight,reps,feel,warmup,at:new Date().toISOString()});
      } else if(ex.type==='bodyweight'){
        const reps=Number(entry.draftReps);if(!Number.isFinite(reps)||reps<=0){showToast('Enter reps.');return;}entry.logs.push({reps,weight:null,feel,warmup,at:new Date().toISOString()});
      } else {
        const duration=Number(entry.draftReps);if(!Number.isFinite(duration)||duration<=0){showToast('Enter duration.');return;}entry.logs.push({duration,note:$('[data-input="cardio-note"]')?.value?.trim()||'',at:new Date().toISOString()});
      }
      entry.draftFeel='good'; entry.draftWarmup=false; saveActive(); renderFocusWorkout();
      if(state.settings.autoRest && ex.type!=='cardio' && ex.type!=='timed') startRest(Number(state.settings.restSeconds)||90);
      else showToast(`${ex.name} logged.`);
    }

    function deleteLastSet() { if(!active)return;const entry=active.exercises[active.currentExerciseIndex];if(!entry.logs.length){showToast('No set to delete.');return;}entry.logs.pop();saveActive();renderFocusWorkout();showToast('Last set removed.'); }
    function deleteSpecificSet(setIndex) { if(!active)return;const entry=active.exercises[active.currentExerciseIndex];if(!confirm('Delete this set?'))return;entry.logs.splice(Number(setIndex),1);saveActive();renderFocusWorkout(); }

    function nextExercise(delta=1) { if(!active)return;syncDraftFromInputs();active.currentExerciseIndex=clamp(active.currentExerciseIndex+delta,0,active.exercises.length-1);saveActive();renderFocusWorkout(); }
    function jumpExercise(index) { if(!active)return;syncDraftFromInputs();active.currentExerciseIndex=clamp(Number(index),0,active.exercises.length-1);saveActive();renderFocusWorkout(); }
    function pauseWorkout() { syncDraftFromInputs();currentView='home';render();showToast('Mission paused. Your sets are saved.'); }

    function bindSwipe() {
      const stage=$('#exerciseStage');if(!stage)return;
      stage.addEventListener('touchstart',event=>{if(event.target.closest('button,input,textarea,select,summary'))return;const t=event.changedTouches[0];swipeStart={x:t.clientX,y:t.clientY};},{passive:true});
      stage.addEventListener('touchend',event=>{if(!swipeStart)return;const t=event.changedTouches[0],dx=t.clientX-swipeStart.x,dy=t.clientY-swipeStart.y;swipeStart=null;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.25)nextExercise(dx<0?1:-1);},{passive:true});
    }

    function startElapsedClock() { clearInterval(elapsedTimer);elapsedTimer=setInterval(()=>{const el=$('#elapsed');if(active&&el)el.textContent=formatDuration(Date.now()-new Date(active.startedAt));},1000); }

    function startRest(seconds) {
      stopRest(); const duration=Math.max(5,Number(seconds)||90); restState={start:Date.now(),end:Date.now()+duration*1000,duration};
      renderRest(); restTimer=setInterval(updateRest,250);
    }
    function renderRest() {
      const ex=active?getExercise(active.exercises[active.currentExerciseIndex]?.id):null;
      document.body.insertAdjacentHTML('beforeend',`<div class="rest-overlay" id="restOverlay"><div class="rest-card"><div class="rest-label">Rest</div><div class="rest-ring" id="restRing"><div class="rest-time" id="restTime">${formatRest(restState.duration)}</div></div><div class="rest-next">Breathe, reset your setup, and get ready for the next ${ex?esc(ex.name):'set'}.</div><div class="rest-actions"><button class="btn" data-action="add-rest">+30 sec</button><button class="btn primary" data-action="skip-rest">Skip rest</button></div></div></div>`);
    }
    function updateRest() { if(!restState)return;const remaining=Math.max(0,restState.end-Date.now()),pct=(remaining/(restState.duration*1000))*100;const time=$('#restTime'),ring=$('#restRing');if(time)time.textContent=formatRest(Math.ceil(remaining/1000));if(ring)ring.style.setProperty('--rest-pct',`${pct}%`);if(remaining<=0){finishRest();} }
    function formatRest(seconds){const s=Math.max(0,Math.ceil(seconds));return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
    function finishRest(){stopRest();beep();showToast('Rest complete.');}
    function stopRest(){clearInterval(restTimer);restTimer=null;restState=null;$('#restOverlay')?.remove();}
    function addRest(){if(!restState)return;restState.end+=30000;restState.duration+=30;updateRest();}
    function beep(){try{if(state.settings.sound){const Ctx=window.AudioContext||window.webkitAudioContext;const ctx=new Ctx();const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=660;g.gain.setValueAtTime(.08,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.28);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.3);}if(navigator.vibrate)navigator.vibrate([120,60,120]);}catch(_){} }

    function currentPRScores() { const scores={};for(const day of PLAN)for(const ex of day.exercises){const best=bestSet(ex.id);if(best)scores[ex.id]=best.score;}return scores; }
    function bestSet(id, history=state.history) { const ex=getExercise(id);if(!ex)return null;let best=null;for(const s of history)for(const e of s.exercises||[]){if(e.id!==id)continue;for(const log of workingLogs(e.logs||[])){let score=null;if(ex.type==='weighted'){const w=Number(log.weight),r=Number(log.reps);if(Number.isFinite(w)&&Number.isFinite(r))score=w*(1+r/30);}else if(ex.type==='bodyweight'){score=Number(log.reps);}if(Number.isFinite(score)&&(!best||score>best.score))best={score,log,date:s.startedAt};}}return best; }

    function finishWorkout() {
      if(!active)return;syncDraftFromInputs();const count=active.exercises.reduce((sum,e)=>sum+(e.logs||[]).length,0);if(!count&&!confirm('No activity has been logged. Save this mission anyway?'))return;
      const prior=currentPRScores(),now=new Date().toISOString();const session={...deepClone(active),endedAt:now,completedAt:now,durationMs:new Date(now)-new Date(active.startedAt),prs:[]};

    }

    function markRest() {

    function renderCompletion() {
      const s=lastCompletedSession || [...state.history].sort((a,b)=>new Date(b.startedAt)-new Date(a.startedAt))[0];if(!s){currentView='home';render();return;}
      const working=sessionWorkingSets(s),volume=sessionVolume(s),cardio=sessionCardioMinutes(s),day=PLAN[s.dayIndex]||getDay(),recs=(s.exercises||[]).map(e=>({ex:getExercise(e.id),p:state.exerciseProgress[e.id]})).filter(x=>x.ex&&x.p?.note).slice(0,4);
      $('#view').innerHTML=`<div class="stack" style="padding-top:calc(18px + var(--safe-top));padding-bottom:24px"><section class="card"><div class="completion-hero"><div class="completion-icon">✓</div><div class="eyebrow">Mission complete</div><h1 style="margin-top:10px">${esc(s.title)}</h1><p class="muted">${fmtDate(s.startedAt)} · ${formatDuration(s.durationMs)}</p><div class="completion-grid"><div class="metric"><div class="metric-label">Working sets</div><div class="metric-value">${working}</div></div><div class="metric"><div class="metric-label">Volume</div><div class="metric-value">${volume.toLocaleString()}</div><div class="metric-sub">lb</div></div><div class="metric"><div class="metric-label">Cardio</div><div class="metric-value">${cardio}</div><div class="metric-sub">minutes</div></div><div class="metric"><div class="metric-label">PRs</div><div class="metric-value">${s.prs?.length||0}</div></div></div>${s.prs?.length?`<div class="completion-coach"><strong>🏆 New bests</strong><div class="set-inline">${s.prs.map(pr=>`<span class="set-chip">${esc(pr.name)} · ${esc(pr.value)}</span>`).join('')}</div></div>`:''}<div class="completion-coach" style="margin-top:11px"><strong>Atlas coach</strong>${recs.length?recs.map(x=>`<div class="coach-line"><div class="coach-icon">→</div><div><strong>${esc(x.ex.name)}</strong><span class="muted">${esc(x.p.note)}</span></div></div>`).join(''):'<p class="muted" style="margin:8px 0 0">Recovery day logged. Show up fresh for the next mission.</p>'}</div><button class="btn primary block" style="margin-top:16px" data-action="complete-done">Next mission: ${esc(getDay().title)}</button></div></section></div>`;
    }

    function analyzeExercise(ex, logs, previous={}) {
      const clean=logs||[],base={lastDate:new Date().toISOString(),completedCount:(previous.completedCount||0)+1,lastSummary:clean.map(l=>formatLogShort(ex,l)).join(', ')};
      if(ex.type==='weighted'){
        const all=clean.filter(l=>Number.isFinite(Number(l.weight))&&Number.isFinite(Number(l.reps))),working=all.filter(l=>!l.warmup),source=(working.length?working:all).slice(-ex.sets);if(!source.length)return{...previous,...base};
        const weights=source.map(l=>Number(l.weight)),reps=source.map(l=>Number(l.reps)),lastWeight=weights.at(-1),same=weights.every(w=>w===lastWeight),hard=source.filter(l=>l.feel==='hard').length,easy=source.filter(l=>l.feel==='easy').length,major=Math.ceil(source.length/2);let nextWeight=lastWeight,note=`Repeat ${lastWeight} ${state.settings.units} and add reps.`;

        else if(reps.every(r=>r>=ex.max)&&hard===0){nextWeight=roundTo(lastWeight+ex.increment,ex.increment);note=`Increase to ${nextWeight} ${state.settings.units}. You owned the top of the rep range.`;}

        else if(reps.some(r=>r<ex.min)&&hard>=major){nextWeight=Math.max(0,roundTo(lastWeight-ex.increment,ex.increment));note=`Use ${nextWeight} ${state.settings.units} or repeat lighter; too many sets fell below target.`;}
        else if(reps.some(r=>r<ex.min))note=`Stay at ${lastWeight} ${state.settings.units} until every set reaches ${ex.min} reps.`;
        else if(hard>=major)note=`Repeat ${lastWeight} ${state.settings.units} until the sets feel more controlled.`;

      }

    }

    function rebuildProgress() { state.exerciseProgress={};const sessions=[...state.history].sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt));for(const s of sessions)for(const entry of s.exercises||[]){const ex=getExercise(entry.id);if(ex)state.exerciseProgress[entry.id]=analyzeExercise(ex,entry.logs||[],state.exerciseProgress[entry.id]||{});} }

    function renderProgress() {
      const st=stats(),metric=latestBodyMetric(),trend=getWeightTrend(),weekly=weeklyReview(),weightedIds=weightedExerciseIds();let selected=state.settings.progressExerciseId;if(!weightedIds.includes(selected))selected=weightedIds[0]||'';state.settings.progressExerciseId=selected;
      $('#view').innerHTML=`<div class="stack"><section class="card"><div class="card-pad"><div class="eyebrow">Performance dashboard</div><h1 style="margin-top:8px">Progress</h1><div class="mini-grid"><div class="metric"><div class="metric-label">Lift sessions</div><div class="metric-value">${st.liftSessions}</div></div><div class="metric"><div class="metric-label">Working sets</div><div class="metric-value">${st.totalSets}</div></div><div class="metric"><div class="metric-label">Total volume</div><div class="metric-value">${Math.round(st.totalVolume/1000)}k</div><div class="metric-sub">lb logged</div></div><div class="metric"><div class="metric-label">Streak</div><div class="metric-value">${st.streak}</div><div class="metric-sub">days</div></div></div></div></section>
      <div class="progress-grid"><section class="card"><div class="card-pad"><div class="section-head" style="margin-top:0"><h2>Body trend</h2></div><div class="mini-grid"><div class="metric"><div class="metric-label">Latest</div><div class="metric-value">${metric?`${esc(metric.weight)} lb`:'—'}</div></div><div class="metric"><div class="metric-label">7-day average</div><div class="metric-value">${Number.isFinite(trend.avg7)?`${cleanNumber(trend.avg7)} lb`:'—'}</div><div class="metric-sub">${esc(trend.label)}</div></div></div><div class="chart-card" style="margin-top:12px">${renderWeightChart()}</div></div></section>

      <section class="card"><div class="card-pad"><div class="eyebrow">Weekly coach review</div><h2 style="margin-top:8px">${esc(weekly.title)}</h2><div class="mini-grid"><div class="metric"><div class="metric-label">Lift days</div><div class="metric-value">${weekly.lifts}/5</div></div><div class="metric"><div class="metric-label">Working sets</div><div class="metric-value">${weekly.sets}</div></div><div class="metric"><div class="metric-label">Cardio</div><div class="metric-value">${weekly.cardio}</div><div class="metric-sub">minutes</div></div><div class="metric"><div class="metric-label">Hard sets</div><div class="metric-value">${weekly.hardPct}%</div></div></div><div class="completion-coach" style="margin-top:12px"><strong>Wins</strong>${weekly.wins.map(x=>`<p class="muted" style="margin:8px 0 0">✓ ${esc(x)}</p>`).join('')}</div><div class="completion-coach" style="margin-top:10px"><strong>Next adjustments</strong>${weekly.adjustments.map(x=>`<p class="muted" style="margin:8px 0 0">→ ${esc(x)}</p>`).join('')}</div><button class="btn green block" style="margin-top:12px" data-action="share-weekly">Share weekly review</button></div></section>

    function weightedExerciseIds(){const ids=[];for(const day of PLAN)for(const ex of day.exercises)if(ex.type==='weighted'&&strengthPoints(ex.id).length)ids.push(ex.id);return [...new Set(ids)];}
    function strengthPoints(id){const ex=getExercise(id),points=[];if(!ex)return points;for(const s of [...state.history].sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt))){const entry=(s.exercises||[]).find(e=>e.id===id);if(!entry)continue;let best=0;for(const log of workingLogs(entry.logs||[])){const w=Number(log.weight),r=Number(log.reps);if(Number.isFinite(w)&&Number.isFinite(r))best=Math.max(best,w*(1+r/30));}if(best)points.push({date:s.startedAt,value:Math.round(best*10)/10});}return points;}
    function weightPoints(){return [...state.bodyMetrics].sort((a,b)=>new Date(a.date)-new Date(b.date)).filter(m=>Number.isFinite(Number(m.weight))).map(m=>({date:m.date,value:Number(m.weight)}));}

    function renderLineChart(points,unit){if(points.length<2)return`<div class="chart-empty">Log at least two readings to build this chart.</div>`;const w=600,h=180,pad=18,vals=points.map(p=>p.value),min=Math.min(...vals),max=Math.max(...vals),range=Math.max(1,max-min),coords=points.map((p,i)=>({x:pad+(i/(points.length-1))*(w-pad*2),y:h-pad-((p.value-min)/range)*(h-pad*2),...p})),path=coords.map((p,i)=>`${i?'L':'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');return`<div style="display:flex;justify-content:space-between;gap:10px"><strong>${cleanNumber(points.at(-1).value)} ${esc(unit)}</strong><span class="muted" style="font-size:12px">${fmtDate(points[0].date)} → ${fmtDate(points.at(-1).date)}</span></div><div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img"><defs><linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b5cf6" stop-opacity=".35"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></linearGradient></defs><path d="${path} L ${coords.at(-1).x} ${h-pad} L ${coords[0].x} ${h-pad} Z" fill="url(#area)"/><path d="${path}" fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${coords.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#f8fafc"/>`).join('')}</svg></div>`;}

    function getWeightTrend(){const pts=weightPoints(),now=Date.now();const avgFor=days=>{const cut=now-days*86400000,vals=pts.filter(p=>new Date(p.date).getTime()>=cut).map(p=>p.value);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;};const avg7=avgFor(7);let label='Collecting trend';if(pts.length>=4){const recent=pts.slice(-3).reduce((a,b)=>a+b.value,0)/Math.min(3,pts.length),older=pts.slice(0,Math.max(1,pts.length-3)).slice(-3).reduce((a,b)=>a+b.value,0)/Math.max(1,pts.slice(0,Math.max(1,pts.length-3)).slice(-3).length),diff=recent-older;label=Math.abs(diff)<.5?'Stable trend':diff<0?`Trending down ${cleanNumber(Math.abs(diff))} lb`:`Trending up ${cleanNumber(diff)} lb`; }return{avg7,label};}

    function weeklyReview(){const end=new Date(),start=new Date();start.setDate(end.getDate()-6);start.setHours(0,0,0,0);const sessions=state.history.filter(s=>new Date(s.startedAt)>=start),lifts=sessions.filter(s=>s.type!=='rest'),sets=lifts.reduce((sum,s)=>sum+sessionWorkingSets(s),0),cardio=Math.round(sessions.reduce((sum,s)=>sum+sessionCardioMinutes(s),0)*100)/100,all=lifts.flatMap(s=>(s.exercises||[]).flatMap(e=>workingLogs(e.logs||[]))),rated=all.filter(l=>l.feel),hard=rated.filter(l=>l.feel==='hard').length,hardPct=rated.length?Math.round(hard/rated.length*100):0,ready=Object.values(state.exerciseProgress).filter(p=>/Increase|Try/.test(p.note||'')).length,wins=[`${lifts.length} lift session${lifts.length===1?'':'s'} completed with ${sets} working sets.`,`${cardio} cardio minutes logged.`,ready?`${ready} exercise${ready===1?' is':'s are'} ready for progression.`:'Baseline data is getting stronger.'],adjustments=[];if(lifts.length<5)adjustments.push(`Complete the remaining ${5-lifts.length} planned lift day${5-lifts.length===1?'':'s'} without cramming missed sessions together.`);if(cardio<100)adjustments.push(`Build cardio gradually; ${cardio} minutes are logged in the last 7 days.`);if(hardPct>35)adjustments.push(`${hardPct}% of rated sets were hard. Keep most working sets “just right” and save grinders for occasional final sets.`);else adjustments.push('Effort balance looks controlled. Keep most sets 1–2 clean reps from failure.');adjustments.push('Keep logging morning weight 3–4 times per week so the 7-day average becomes dependable.');return{title:`${fmtDate(start)} – ${fmtDate(end)}`,lifts:lifts.length,sets,cardio,hardPct,wins,adjustments};}

    function renderBodyForm(){return`<div class="form-grid"><div class="mini-grid"><div class="field"><label>Body weight (lb)</label><input data-body="weight" inputmode="decimal" placeholder="ex: 220"></div><div class="field"><label>Body fat %</label><input data-body="bodyFat" inputmode="decimal" placeholder="optional"></div><div class="field"><label>Waist</label><input data-body="waist" inputmode="decimal" placeholder="optional"></div><div class="field"><label>Muscle mass (lb)</label><input data-body="muscleMass" inputmode="decimal" placeholder="optional"></div><div class="field"><label>Skeletal muscle %</label><input data-body="skeletalMuscle" inputmode="decimal" placeholder="optional"></div><div class="field"><label>Visceral fat</label><input data-body="visceralFat" inputmode="decimal" placeholder="optional"></div></div><div class="field"><label>Note</label><input data-body="note" placeholder="optional"></div><button class="btn primary block" data-action="save-body">Save scale reading</button></div>`;}
    function renderBodyTable(){const rows=[...state.bodyMetrics].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);if(!rows.length)return'<div class="empty" style="margin-top:14px">No body readings yet.</div>';return`<div style="overflow-x:auto;margin-top:14px"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr><th style="text-align:left;padding:10px;color:var(--muted)">Date</th><th style="text-align:left;padding:10px;color:var(--muted)">Weight</th><th style="text-align:left;padding:10px;color:var(--muted)">Body fat</th><th></th></tr></thead><tbody>${rows.map(m=>`<tr style="border-top:1px solid var(--line)"><td style="padding:12px 10px">${fmtDate(m.date)}</td><td style="padding:12px 10px">${esc(m.weight)} lb</td><td style="padding:12px 10px">${m.bodyFat?esc(m.bodyFat)+'%':'—'}</td><td style="padding:12px 10px"><button class="btn small danger" data-action="delete-body" data-id="${esc(m.id)}">Delete</button></td></tr>`).join('')}</tbody></table></div>`;}

    function renderPRs(){const items=[];for(const id of weightedExerciseIds()){const ex=getExercise(id),best=bestSet(id);if(best)items.push({ex,best});}items.sort((a,b)=>b.best.score-a.best.score);if(!items.length)return'<div class="empty">Complete workouts to build personal records.</div>';return`<div class="stack" style="gap:10px">${items.slice(0,12).map(({ex,best})=>`<div class="soft-card" style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div><strong>${esc(ex.name)}</strong><div class="muted" style="font-size:12px;margin-top:3px">${fmtDate(best.date)}</div></div><span class="target-pill">🏆 ${esc(formatLogShort(ex,best.log))}</span></div>`).join('')}</div>`;}
