<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>PF Workout Coach v4</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b14;
      --bg-2: #0d1324;
      --panel: rgba(255,255,255,.075);
      --panel-2: rgba(255,255,255,.105);
      --panel-3: rgba(255,255,255,.15);
      --text: #f4f7fb;
      --muted: #a9b3c7;
      --soft: #dbe4f5;
      --line: rgba(255,255,255,.12);
      --accent: #8b5cf6;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --warn: #f59e0b;
      --shadow: 0 24px 70px rgba(0,0,0,.35);
      --radius-lg: 26px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --max: 1180px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f5f7fb;
      --bg-2: #ffffff;
      --panel: rgba(255,255,255,.86);
      --panel-2: #ffffff;
      --panel-3: #edf1f8;
      --text: #101728;
      --muted: #5d677a;
      --soft: #253044;
      --line: rgba(12,18,32,.12);
      --accent: #6d28d9;
      --accent-2: #16a34a;
      --danger: #e11d48;
      --warn: #d97706;
      --shadow: 0 24px 70px rgba(33,43,70,.14);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.32), transparent 36rem),
        radial-gradient(circle at top right, rgba(34,197,94,.18), transparent 32rem),
        linear-gradient(140deg, var(--bg), var(--bg-2));
      color: var(--text);
      padding-bottom: calc(86px + var(--safe-bottom));
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    input, select, textarea {
      width: 100%;
      color: var(--text);
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      outline: none;
    }
    :root[data-theme="light"] input,
    :root[data-theme="light"] select,
    :root[data-theme="light"] textarea { background: #fff; }
    input:focus, select:focus, textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 75%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent);
    }
    a { color: inherit; }
    .app-shell { width: min(var(--max), calc(100% - 28px)); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(18px);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 0;
    }
    .brand { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .logo {
      width: 44px; height: 44px; border-radius: 15px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      box-shadow: 0 14px 34px color-mix(in srgb, var(--accent) 30%, transparent);
      flex: 0 0 auto;
      font-weight: 900;
      letter-spacing: -.05em;
    }
    .brand-title { font-size: 18px; font-weight: 850; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .pill {
      display: inline-flex; gap: 7px; align-items: center; justify-content: center;
      padding: 8px 11px; border-radius: 999px; border: 1px solid var(--line);
      background: var(--panel); color: var(--soft); font-size: 12px; font-weight: 700;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px;
      padding: 12px 15px;
      border-radius: 15px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 780;
      box-shadow: none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); background: var(--panel-3); }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white; border: 0; box-shadow: 0 18px 46px color-mix(in srgb, var(--accent) 34%, transparent);
    }
    .btn.green { background: linear-gradient(135deg, var(--accent-2), #0ea5e9); color: white; border: 0; }
    .btn.danger { background: color-mix(in srgb, var(--danger) 18%, var(--panel)); color: var(--text); border-color: color-mix(in srgb, var(--danger) 35%, var(--line)); }
    .btn.warn { background: color-mix(in srgb, var(--warn) 18%, var(--panel)); color: var(--text); border-color: color-mix(in srgb, var(--warn) 35%, var(--line)); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 36px; padding: 8px 11px; border-radius: 12px; font-size: 13px; }
    .main { padding: 18px 0 34px; }
    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: clip;
    }
    .card-inner { padding: 18px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, .9fr);
      gap: 18px;
      align-items: stretch;
    }
    .hero .card { min-height: 100%; }
    .kicker { color: var(--accent-2); font-size: 13px; font-weight: 850; text-transform: uppercase; letter-spacing: .12em; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: clamp(30px, 5vw, 54px); line-height: .96; letter-spacing: -.055em; }
    h2 { margin-bottom: 12px; font-size: clamp(22px, 3vw, 30px); letter-spacing: -.035em; }
    h3 { margin-bottom: 8px; font-size: 17px; letter-spacing: -.015em; }
    .muted { color: var(--muted); }
    .small-text { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .big-metric { font-size: 36px; letter-spacing: -.05em; font-weight: 900; margin: 3px 0 2px; }
    .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .stat {
      padding: 14px; border-radius: 18px; background: rgba(255,255,255,.06); border: 1px solid var(--line);
    }
    .stat .label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .stat .value { font-size: 25px; font-weight: 900; letter-spacing: -.04em; margin-top: 5px; }
    .exercise-preview, .history-list, .plan-list { display: grid; gap: 12px; }
    .exercise-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      padding: 14px;
    }
    .exercise-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .target {
      padding: 5px 9px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 20%, transparent);
      color: var(--text);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .rec-line { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .rec-good { color: color-mix(in srgb, var(--accent-2) 82%, white); font-weight: 750; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 16px; }
    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 60;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
    }
    .tabs-inner {
      width: min(var(--max), 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    .tab-btn {
      display: grid; place-items: center;
      min-height: 54px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 800;
    }
    .tab-btn span:first-child { font-size: 20px; line-height: 1; margin-bottom: 4px; }
    .tab-btn.active {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
    }
    .form-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)) auto; gap: 10px; align-items: end; }
    .field label { display: block; color: var(--muted); font-size: 12px; font-weight: 760; margin: 0 0 6px 3px; }
    .set-table {
      width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 14px;
      margin: 12px 0; border: 1px solid var(--line);
    }
    .set-table th, .set-table td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
    .set-table th { color: var(--muted); font-size: 12px; background: rgba(255,255,255,.05); }
    .set-table tr:last-child td { border-bottom: 0; }
    .session-bar {
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
      margin-bottom: 16px;
    }
    .timer-bubble {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.08); border: 1px solid var(--line); border-radius: 999px; padding: 9px 13px; font-weight: 850;
    }
    .rest-timer {
      position: fixed;
      right: 16px;
      bottom: calc(94px + var(--safe-bottom));
      z-index: 70;
      width: min(320px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 24px;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      padding: 16px;
      transform: translateY(0);
      transition: transform .18s ease, opacity .18s ease;
    }
    .rest-timer.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
    .rest-time { font-size: 40px; font-weight: 950; letter-spacing: -.06em; margin: 2px 0 10px; }
    .progress-shell { height: 9px; border-radius: 999px; background: rgba(255,255,255,.1); overflow: hidden; }
    .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(92px + var(--safe-bottom)); z-index: 90;
      max-width: min(520px, calc(100% - 28px));
      border-radius: 999px; padding: 12px 16px;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      color: var(--text); border: 1px solid var(--line); box-shadow: var(--shadow);
      opacity: 0; pointer-events: none; transition: opacity .16s ease, transform .16s ease;
      font-size: 14px; font-weight: 760;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -8px); }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font-size: 12px; font-weight: 760; }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 22px 0 12px; }
    .history-card { padding: 14px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,.055); }
    .history-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .history-summary { margin-top: 10px; display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .chart-card svg { width: 100%; height: 220px; display: block; }
    .empty { padding: 28px; border: 1px dashed var(--line); border-radius: 20px; color: var(--muted); text-align: center; background: rgba(255,255,255,.04); }
    .split-select { min-width: 220px; }
    .inline-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .danger-zone { border-color: color-mix(in srgb, var(--danger) 30%, var(--line)); background: color-mix(in srgb, var(--danger) 8%, transparent); }
    .note { border-left: 4px solid var(--accent); padding: 12px 14px; background: rgba(255,255,255,.055); border-radius: 16px; color: var(--muted); }
    .mini-calendar { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; }
    .day-dot { min-height: 54px; border-radius: 15px; border: 1px solid var(--line); display: grid; place-items: center; font-weight: 850; background: rgba(255,255,255,.04); color: var(--muted); }
    .day-dot.done { background: color-mix(in srgb, var(--accent-2) 22%, transparent); color: var(--text); border-color: color-mix(in srgb, var(--accent-2) 48%, var(--line)); }
    .day-dot.today { outline: 2px solid color-mix(in srgb, var(--accent) 65%, transparent); }
    .install-hint { display: none; }
    @media (display-mode: standalone) {
      .install-hint { display: none !important; }
    }
    @media (max-width: 860px) {
      .topbar-inner { grid-template-columns: 1fr; }
      .top-actions { justify-content: space-between; }
      .hero { grid-template-columns: 1fr; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn { grid-column: 1 / -1; }
      .session-bar { grid-template-columns: 1fr; }
    }
    @media (max-width: 540px) {
      body { padding-bottom: calc(82px + var(--safe-bottom)); }
      .app-shell, .topbar-inner { width: min(100% - 18px, var(--max)); }
      .brand-title { font-size: 16px; }
      .brand-sub { max-width: 230px; }
      .top-actions .pill { display: none; }
      .card-inner { padding: 15px; }
      .btn { width: 100%; }
      .toolbar .btn, .inline-controls .btn { width: auto; flex: 1 1 auto; }
      .tabs { padding-inline: 8px; }
      .tabs-inner { gap: 5px; }
      .tab-btn { border-radius: 15px; font-size: 11px; min-height: 50px; }
      .tab-btn span:first-child { font-size: 18px; }
      .stat-row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .exercise-head, .history-card-head { flex-direction: column; align-items: stretch; }
      .target { width: fit-content; }
      .mini-calendar { gap: 5px; }
      .day-dot { min-height: 44px; font-size: 13px; }
    }

    .version-badge {
      display:inline-flex; align-items:center; justify-content:center;
      padding: 3px 8px; margin-left: 6px;
      border-radius: 999px;
      font-size: 10px; font-weight: 900; letter-spacing: .04em;
      color: color-mix(in srgb, var(--accent-2) 82%, white);
      background: color-mix(in srgb, var(--accent-2) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent-2) 28%, var(--line));
      vertical-align: middle;
    }
    .coach-strip {
      margin-top: 16px;
      padding: 13px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--accent-2) 30%, var(--line));
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent-2) 13%, transparent), rgba(255,255,255,.045));
    }
    .coach-strip strong { display:block; margin-bottom:3px; }
    .coach-strip span { display:block; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .coach-card textarea, .coach-preview {
      min-height: 220px;
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.42;
    }
    details.coach-details {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,.045);
    }
    details.coach-details summary {
      cursor: pointer;
      font-weight: 850;
      color: var(--soft);
    }
    .install-note {
      margin-top: 14px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.045);
      border: 1px dashed var(--line);
    }
    .finish-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .finish-pill {
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      font-weight: 750;
    }
    .finish-pill.done {
      color: color-mix(in srgb, var(--accent-2) 82%, white);
      border-color: color-mix(in srgb, var(--accent-2) 35%, var(--line));
      background: color-mix(in srgb, var(--accent-2) 12%, transparent);
    }
    .quick-weight-panel {
      margin-top: 12px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
    }
    .quick-weight-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 780;
    }
    .quick-weight-current {
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }
    .quick-weight-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .quick-weight-grid .btn {
      min-height: 38px;
      padding: 8px 6px;
      border-radius: 13px;
      font-size: 12px;
      width: 100%;
    }
    .quick-weight-hint {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    @media (max-width: 700px) {
      .coach-strip { grid-template-columns: 1fr; }
      .coach-strip .btn { width: 100%; }
      .quick-weight-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; }
      .quick-weight-grid .btn { font-size: 12px; }
    }

    .theme-btn { width: 42px; min-width: 42px; padding: 0; border-radius: 14px; font-size: 18px; flex: 0 0 42px; }
    .coach-card {
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 22rem),
        var(--panel);
      border-color: color-mix(in srgb, var(--accent-2) 28%, var(--line));
    }
    @media (max-width: 860px) {
      .topbar-inner { grid-template-columns: 1fr auto; gap: 10px; }
      .top-actions { justify-content: flex-end; }
      .top-actions .pill { display: none; }
    }
    @media (max-width: 540px) {
      .brand-title { max-width: 230px; }
      .top-actions .theme-btn { width: 40px; min-width: 40px; flex: 0 0 40px; }
      .top-actions .btn { width: 40px; }
      .stat-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media print {
      .topbar, .tabs, .rest-timer, .toast, .toolbar, .btn { display: none !important; }
      body { background: white; color: black; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo">PF</div>
        <div>
          <div class="brand-title">PF Workout Coach <span class="version-badge">v4</span></div>
          <div class="brand-sub" id="headerSub">5 lift days • 2 rest days • no lunges</div>
        </div>
      </div>
      <div class="top-actions">
        <div class="pill" id="nextChip">Next: Day 1</div>
        <button class="btn small theme-btn" data-action="toggle-theme" title="Toggle light/dark" aria-label="Toggle light/dark">◐</button>
      </div>
    </div>
  </header>

  <main class="main app-shell" id="view" aria-live="polite"></main>

  <nav class="tabs" aria-label="Main tabs">
    <div class="tabs-inner">
      <button class="tab-btn active" data-tab="today"><span>🏋️</span><span>Today</span></button>
      <button class="tab-btn" data-tab="history"><span>🗓️</span><span>History</span></button>
      <button class="tab-btn" data-tab="progress"><span>📈</span><span>Progress</span></button>
      <button class="tab-btn" data-tab="plan"><span>📋</span><span>Plan</span></button>
      <button class="tab-btn" data-tab="settings"><span>⚙️</span><span>Settings</span></button>
    </div>
  </nav>

  <aside class="rest-timer hidden" id="restTimerBox" aria-live="polite">
    <div class="small-text">Rest timer</div>
    <div class="rest-time" id="restTime">01:30</div>
    <div class="progress-shell"><div class="progress-bar" id="restBar"></div></div>
    <div class="toolbar">
      <button class="btn small" data-action="add-rest-30">+30 sec</button>
      <button class="btn small" data-action="skip-rest">Skip</button>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script>
  (() => {
    'use strict';

    const STORAGE_KEY = 'pfWorkoutApp.v1';
    const ACTIVE_KEY = 'pfWorkoutApp.active.v1';

    const PLAN = [
      {
        day: 1,
        type: 'lift',
        title: 'Push A',

    const $ = (selector, scope = document) => scope.querySelector(selector);
    const $$ = (selector, scope = document) => Array.from(scope.querySelectorAll(selector));
    const deepClone = (obj) => JSON.parse(JSON.stringify(obj));
    const fmtDate = (iso) => new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    const fmtTime = (iso) => new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const esc = (value) => String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));

    let currentTab = 'today';
    let toastTimer = null;
    let active = loadActiveSession();
    let rest = { end: 0, start: 0, duration: 0, interval: null };
    let renderClock = null;

    const state = loadState();

    function defaultState() {
      return {
        version: 1,
        createdAt: new Date().toISOString(),
        settings: {
          currentDayIndex: 0,
          restSeconds: 90,
          autoRest: true,
          units: 'lb',
          theme: 'dark'
        },
        exerciseProgress: {},
        history: [],
        bodyMetrics: []
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : defaultState();
        const merged = Object.assign(defaultState(), parsed);
        merged.settings = Object.assign(defaultState().settings, parsed.settings || {});
        merged.exerciseProgress = parsed.exerciseProgress || {};
        merged.history = Array.isArray(parsed.history) ? parsed.history : [];
        merged.bodyMetrics = Array.isArray(parsed.bodyMetrics) ? parsed.bodyMetrics : [];
        return merged;
      } catch (err) {
        console.warn('Could not load state', err);
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateHeader();
    }

    function loadActiveSession() {
      try {
        const raw = localStorage.getItem(ACTIVE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        console.warn('Could not load active session', err);
        return null;
      }
    }

    function saveActive() {
      if (active) localStorage.setItem(ACTIVE_KEY, JSON.stringify(active));
      else localStorage.removeItem(ACTIVE_KEY);
    }

    function getDay(index = state.settings.currentDayIndex) {
      return PLAN[((Number(index) || 0) + PLAN.length) % PLAN.length];
    }

    function getExercise(exerciseId) {
      for (const day of PLAN) {
        const found = day.exercises.find(ex => ex.id === exerciseId);
        if (found) return found;
      }
      return null;
    }

    function targetLabel(ex) {
      if (ex.type === 'cardio' || ex.type === 'timed') return `${ex.min}–${ex.max} ${ex.unit || 'min'}`;
      return `${ex.sets} × ${ex.min}–${ex.max}`;
    }

    function typeLabel(day) {
      return day.type === 'rest' ? 'Rest' : 'Lift';
    }

    function recommendationFor(ex) {
      const progress = state.exerciseProgress[ex.id];
      if (!progress) {
        if (ex.type === 'weighted') return 'First time: choose a weight that leaves 1–3 reps in the tank.';
        if (ex.type === 'bodyweight') return 'First time: use clean reps and avoid swinging.';
        return 'First time: hit the low end of the time range.';
      }
      return progress.note || 'Repeat the last successful setup.';
    }

    function recommendedInputValue(ex) {
      const progress = state.exerciseProgress[ex.id];
      if (!progress) return '';
      if (ex.type === 'weighted') return Number.isFinite(progress.nextWeight) ? progress.nextWeight : (progress.lastWeight || '');
      if (ex.type === 'cardio' || ex.type === 'timed') return Number.isFinite(progress.nextDuration) ? progress.nextDuration : '';
      return '';
    }

    function cleanNumber(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      const rounded = Math.round(n * 100) / 100;
      return Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(/\.0+$/, '');
    }

    function getLastLoggedWeight(entry) {
      const logs = [...(entry?.logs || [])].reverse();
      const found = logs.find(log => Number.isFinite(Number(log.weight)) && Number(log.weight) > 0);
      return found ? Number(found.weight) : null;
    }

    function getSessionWeightValue(entry, ex, fallback = '') {
      if (ex.type !== 'weighted' && ex.type !== 'bodyweight') return fallback;
      if (Number.isFinite(Number(entry?.draftWeight)) && Number(entry.draftWeight) > 0) return cleanNumber(entry.draftWeight);
      const lastWeight = getLastLoggedWeight(entry);
      if (lastWeight !== null) return cleanNumber(lastWeight);
      if (Number.isFinite(Number(fallback)) && Number(fallback) > 0) return cleanNumber(fallback);
      return '';
    }

    function currentWeightFromInput(index) {
      const input = $(`[data-input="weight-${index}"]`);
      const fromInput = input ? Number(input.value) : NaN;
      if (Number.isFinite(fromInput) && fromInput > 0) return fromInput;
      const entry = active?.exercises?.[index];
      if (!entry) return NaN;
      const ex = getExercise(entry.id);
      if (!ex) return NaN;
      const fromSession = Number(getSessionWeightValue(entry, ex, recommendedInputValue(ex)));
      return Number.isFinite(fromSession) && fromSession > 0 ? fromSession : NaN;
    }

    function setDraftWeight(index, weight, message = '') {
      if (!active?.exercises?.[index]) return;
      const clean = Math.max(0, Math.round(Number(weight) * 100) / 100);
      if (!Number.isFinite(clean) || clean <= 0) {
        showToast('Enter a starting weight first.');
        return;
      }
      active.exercises[index].draftWeight = clean;
      saveActive();
      const display = cleanNumber(clean);
      const input = $(`[data-input="weight-${index}"]`);
      if (input) input.value = display;
      const label = $(`[data-current-weight="${index}"]`);
      if (label) label.textContent = `${display} ${state.settings.units}`;
      if (message) showToast(message.replace('{weight}', `${display} ${state.settings.units}`));
    }

    function adjustWeight(index, delta) {
      if (!active?.exercises?.[index]) return;
      const entry = active.exercises[index];
      const ex = getExercise(entry.id);
      if (!ex || (ex.type !== 'weighted' && ex.type !== 'bodyweight')) return;
      const current = currentWeightFromInput(index);
      if (!Number.isFinite(current) || current <= 0) {
        showToast('Enter a starting weight first, then use +5 / -5.');
        return;
      }
      const next = Math.max(0, current + Number(delta || 0));
      setDraftWeight(index, next, `Next sets default to {weight}.`);
    }

    function useLastSetWeight(index) {
      if (!active?.exercises?.[index]) return;
      const lastWeight = getLastLoggedWeight(active.exercises[index]);
      if (lastWeight === null) {
        showToast('No previous set weight for this exercise yet.');
        return;
      }
      setDraftWeight(index, lastWeight, `Next sets reset to {weight}.`);
    }

    function clearDraftWeight(index) {
      if (!active?.exercises?.[index]) return;
      active.exercises[index].draftWeight = null;
      saveActive();
      const input = $(`[data-input="weight-${index}"]`);
      if (input) input.value = '';
      const label = $(`[data-current-weight="${index}"]`);
      if (label) label.textContent = 'Set weight';
      showToast('Weight cleared for this exercise.');
    }

    function updateHeader() {
      const day = getDay();
      document.documentElement.dataset.theme = state.settings.theme || 'dark';

    }

    function showToast(message) {
      const box = $('#toast');
      box.textContent = message;
      box.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => box.classList.remove('show'), 3200);
    }

    function render() {
      updateHeader();
      $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === currentTab));
      if (currentTab === 'today') renderToday();
      if (currentTab === 'history') renderHistory();
      if (currentTab === 'progress') renderProgress();
      if (currentTab === 'plan') renderPlan();
      if (currentTab === 'settings') renderSettings();
    }

        renderActiveSession();
        return;

      view.innerHTML = `
        <section class="hero">
          <div class="card">
            <div class="card-inner">
              <div class="kicker">Today’s workout</div>
              <h1>Day ${day.day}: ${esc(day.title)}</h1>
              <p class="muted">${esc(day.focus)}</p>
              <div class="badge-row">
                <span class="badge">${day.type === 'rest' ? '🛌 Rest day' : '🏋️ Lift day'}</span>

                <span class="badge">⏱️ Rest timer: ${state.settings.restSeconds}s</span>
              </div>
              <p class="note" style="margin-top:16px">${esc(day.note)}</p>
              <div class="toolbar">
                ${day.type === 'rest'
                  ? `<button class="btn green" data-action="mark-rest-complete">Mark rest day complete</button><button class="btn primary" data-action="start-workout">Start optional recovery</button>`
                  : `<button class="btn primary" data-action="start-workout">Start workout</button>`}
                <button class="btn" data-action="advance-day">Skip to next day</button>
                <select class="split-select" data-action="change-current-day" aria-label="Choose split day">
                  ${PLAN.map((d, i) => `<option value="${i}" ${i === state.settings.currentDayIndex ? 'selected' : ''}>Day ${d.day}: ${esc(d.title)}</option>`).join('')}
                </select>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <div class="kicker">Dashboard</div>
              <div class="stat-row" style="grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top:12px">
                <div class="stat"><div class="label">Workouts</div><div class="value">${stats.liftSessions}</div></div>
                <div class="stat"><div class="label">This week</div><div class="value">${stats.thisWeek}</div></div>

                <div class="stat"><div class="label">Streak</div><div class="value">${stats.streak}</div></div>
              </div>

              ${renderMiniCalendar()}
              <div class="coach-strip">
                <div><strong>Coach check-in</strong><span>Share your recent workouts, body metrics, and next-weight recommendations with ChatGPT.</span></div>

              </div>
            </div>
          </div>

          <span class="pill">${esc(day.warmup)}</span>

          ${day.exercises.map(ex => renderExercisePreview(ex)).join('')}
        </section>
      `;
    }

    function renderExercisePreview(ex) {
      const rec = recommendationFor(ex);
      const progress = state.exerciseProgress[ex.id];
      const last = progress?.lastSummary ? `<div class="rec-line">Last: ${esc(progress.lastSummary)}</div>` : '';
      return `
        <article class="exercise-item">
          <div class="exercise-head">
            <div>
              <h3>${esc(ex.name)}</h3>
              <div class="small-text">${esc(ex.equipment || '')} ${ex.cues ? '• ' + esc(ex.cues) : ''}</div>
            </div>
            <span class="target">${esc(targetLabel(ex))}</span>
          </div>
          ${last}
          <div class="rec-line"><span class="rec-good">Next:</span> ${esc(rec)}</div>
        </article>
      `;
    }

    function renderMiniCalendar() {
      const days = [];
      const today = new Date();
      today.setHours(0,0,0,0);
      const completedDates = new Set(state.history.map(s => new Date(s.startedAt || s.date).toDateString()));
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const done = completedDates.has(d.toDateString());
        const isToday = i === 0;
        days.push(`<div class="day-dot ${done ? 'done' : ''} ${isToday ? 'today' : ''}" title="${d.toDateString()}">${d.toLocaleDateString(undefined, { weekday: 'short' }).slice(0,2)}</div>`);
      }
      return `<div class="mini-calendar">${days.join('')}</div>`;
    }

    function startWorkout() {
      const day = getDay();
      active = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),

        day: day.day,
        title: day.title,
        type: day.type,
        focus: day.focus,
        startedAt: new Date().toISOString(),

      saveActive();
      currentTab = 'today';
      render();
      showToast(day.type === 'rest' ? 'Optional recovery started.' : 'Workout started. Log each working set.');
