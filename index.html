<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>PF Workout Coach v7</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b14;
      --bg-2: #0d1324;
      --panel: rgba(255,255,255,.075);
      --panel-2: rgba(255,255,255,.105);
      --panel-3: rgba(255,255,255,.15);
      --text: #f4f7fb;
      --muted: #a9b3c7;
      --soft: #dbe4f5;
      --line: rgba(255,255,255,.12);
      --accent: #8b5cf6;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --warn: #f59e0b;
      --shadow: 0 24px 70px rgba(0,0,0,.35);
      --radius-lg: 26px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --max: 1180px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f5f7fb;
      --bg-2: #ffffff;
      --panel: rgba(255,255,255,.86);
      --panel-2: #ffffff;
      --panel-3: #edf1f8;
      --text: #101728;
      --muted: #5d677a;
      --soft: #253044;
      --line: rgba(12,18,32,.12);
      --accent: #6d28d9;
      --accent-2: #16a34a;
      --danger: #e11d48;
      --warn: #d97706;
      --shadow: 0 24px 70px rgba(33,43,70,.14);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(139,92,246,.32), transparent 36rem),
        radial-gradient(circle at top right, rgba(34,197,94,.18), transparent 32rem),
        linear-gradient(140deg, var(--bg), var(--bg-2));
      color: var(--text);
      padding-bottom: calc(86px + var(--safe-bottom));
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    input, select, textarea {
      width: 100%;
      color: var(--text);
      background: rgba(255,255,255,.08);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      outline: none;
    }
    :root[data-theme="light"] input,
    :root[data-theme="light"] select,
    :root[data-theme="light"] textarea { background: #fff; }
    input:focus, select:focus, textarea:focus {
      border-color: color-mix(in srgb, var(--accent) 75%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 20%, transparent);
    }
    a { color: inherit; }
    .app-shell { width: min(var(--max), calc(100% - 28px)); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(18px);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 0;
    }
    .brand { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .logo {
      width: 44px; height: 44px; border-radius: 15px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), #3b82f6);
      box-shadow: 0 14px 34px color-mix(in srgb, var(--accent) 30%, transparent);
      flex: 0 0 auto;
      font-weight: 900;
      letter-spacing: -.05em;
    }
    .brand-title { font-size: 18px; font-weight: 850; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-actions { display: flex; align-items: center; gap: 10px; }
    .pill {
      display: inline-flex; gap: 7px; align-items: center; justify-content: center;
      padding: 8px 11px; border-radius: 999px; border: 1px solid var(--line);
      background: var(--panel); color: var(--soft); font-size: 12px; font-weight: 700;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px;
      padding: 12px 15px;
      border-radius: 15px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 780;
      box-shadow: none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      text-decoration: none;
    }
    .btn:hover { transform: translateY(-1px); background: var(--panel-3); }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: white; border: 0; box-shadow: 0 18px 46px color-mix(in srgb, var(--accent) 34%, transparent);
    }
    .btn.green { background: linear-gradient(135deg, var(--accent-2), #0ea5e9); color: white; border: 0; }
    .btn.danger { background: color-mix(in srgb, var(--danger) 18%, var(--panel)); color: var(--text); border-color: color-mix(in srgb, var(--danger) 35%, var(--line)); }
    .btn.warn { background: color-mix(in srgb, var(--warn) 18%, var(--panel)); color: var(--text); border-color: color-mix(in srgb, var(--warn) 35%, var(--line)); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 36px; padding: 8px 11px; border-radius: 12px; font-size: 13px; }
    .main { padding: 18px 0 34px; }
    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: clip;
    }
    .card-inner { padding: 18px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, .9fr);
      gap: 18px;
      align-items: stretch;
    }
    .hero .card { min-height: 100%; }
    .kicker { color: var(--accent-2); font-size: 13px; font-weight: 850; text-transform: uppercase; letter-spacing: .12em; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: clamp(30px, 5vw, 54px); line-height: .96; letter-spacing: -.055em; }
    h2 { margin-bottom: 12px; font-size: clamp(22px, 3vw, 30px); letter-spacing: -.035em; }
    h3 { margin-bottom: 8px; font-size: 17px; letter-spacing: -.015em; }
    .muted { color: var(--muted); }
    .small-text { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .big-metric { font-size: 36px; letter-spacing: -.05em; font-weight: 900; margin: 3px 0 2px; }
    .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .stat {
      padding: 14px; border-radius: 18px; background: rgba(255,255,255,.06); border: 1px solid var(--line);
    }
    .stat .label { color: var(--muted); font-size: 12px; font-weight: 700; }
    .stat .value { font-size: 25px; font-weight: 900; letter-spacing: -.04em; margin-top: 5px; }
    .exercise-preview, .history-list, .plan-list { display: grid; gap: 12px; }
    .exercise-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.055);
      padding: 14px;
    }
    .exercise-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .target {
      padding: 5px 9px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--accent) 20%, transparent);
      color: var(--text);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .rec-line { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .rec-good { color: color-mix(in srgb, var(--accent-2) 82%, white); font-weight: 750; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 16px; }
    .tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 60;
      padding: 10px 12px calc(10px + var(--safe-bottom));
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
    }
    .tabs-inner {
      width: min(var(--max), 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }
    .tab-btn {
      display: grid; place-items: center;
      min-height: 54px;
      border-radius: 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 800;
    }
    .tab-btn span:first-child { font-size: 20px; line-height: 1; margin-bottom: 4px; }
    .tab-btn.active {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--line);
    }
    .form-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)) auto; gap: 10px; align-items: end; }
    .field label { display: block; color: var(--muted); font-size: 12px; font-weight: 760; margin: 0 0 6px 3px; }
    .set-table {
      width: 100%; border-collapse: collapse; overflow: hidden; border-radius: 14px;
      margin: 12px 0; border: 1px solid var(--line);
    }
    .set-table th, .set-table td { padding: 9px 10px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
    .set-table th { color: var(--muted); font-size: 12px; background: rgba(255,255,255,.05); }
    .set-table tr:last-child td { border-bottom: 0; }
    .session-bar {
      display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center;
      margin-bottom: 16px;
    }
    .timer-bubble {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.08); border: 1px solid var(--line); border-radius: 999px; padding: 9px 13px; font-weight: 850;
    }
    .rest-timer {
      position: fixed;
      right: 16px;
      bottom: calc(94px + var(--safe-bottom));
      z-index: 70;
      width: min(320px, calc(100% - 32px));
      border: 1px solid var(--line);
      border-radius: 24px;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      padding: 16px;
      transform: translateY(0);
      transition: transform .18s ease, opacity .18s ease;
    }
    .rest-timer.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }
    .rest-time { font-size: 40px; font-weight: 950; letter-spacing: -.06em; margin: 2px 0 10px; }
    .progress-shell { height: 9px; border-radius: 999px; background: rgba(255,255,255,.1); overflow: hidden; }
    .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(92px + var(--safe-bottom)); z-index: 90;
      max-width: min(520px, calc(100% - 28px));
      border-radius: 999px; padding: 12px 16px;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      color: var(--text); border: 1px solid var(--line); box-shadow: var(--shadow);
      opacity: 0; pointer-events: none; transition: opacity .16s ease, transform .16s ease;
      font-size: 14px; font-weight: 760;
    }
    .toast.show { opacity: 1; transform: translate(-50%, -8px); }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font-size: 12px; font-weight: 760; }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 22px 0 12px; }
    .history-card { padding: 14px; border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,.055); }
    .history-card-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .history-summary { margin-top: 10px; display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
    .chart-card svg { width: 100%; height: 220px; display: block; }
    .empty { padding: 28px; border: 1px dashed var(--line); border-radius: 20px; color: var(--muted); text-align: center; background: rgba(255,255,255,.04); }
    .split-select { min-width: 220px; }
    .inline-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .danger-zone { border-color: color-mix(in srgb, var(--danger) 30%, var(--line)); background: color-mix(in srgb, var(--danger) 8%, transparent); }
    .note { border-left: 4px solid var(--accent); padding: 12px 14px; background: rgba(255,255,255,.055); border-radius: 16px; color: var(--muted); }
    .mini-calendar { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; }
    .day-dot { min-height: 54px; border-radius: 15px; border: 1px solid var(--line); display: grid; place-items: center; font-weight: 850; background: rgba(255,255,255,.04); color: var(--muted); }
    .day-dot.done { background: color-mix(in srgb, var(--accent-2) 22%, transparent); color: var(--text); border-color: color-mix(in srgb, var(--accent-2) 48%, var(--line)); }
    .day-dot.today { outline: 2px solid color-mix(in srgb, var(--accent) 65%, transparent); }
    .install-hint { display: none; }
    @media (display-mode: standalone) {
      .install-hint { display: none !important; }
    }
    @media (max-width: 860px) {
      .topbar-inner { grid-template-columns: 1fr; }
      .top-actions { justify-content: space-between; }
      .hero { grid-template-columns: 1fr; }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn { grid-column: 1 / -1; }
      .session-bar { grid-template-columns: 1fr; }
    }
    @media (max-width: 540px) {
      body { padding-bottom: calc(82px + var(--safe-bottom)); }
      .app-shell, .topbar-inner { width: min(100% - 18px, var(--max)); }
      .brand-title { font-size: 16px; }
      .brand-sub { max-width: 230px; }
      .top-actions .pill { display: none; }
      .card-inner { padding: 15px; }
      .btn { width: 100%; }
      .toolbar .btn, .inline-controls .btn { width: auto; flex: 1 1 auto; }
      .tabs { padding-inline: 8px; }
      .tabs-inner { gap: 5px; }
      .tab-btn { border-radius: 15px; font-size: 11px; min-height: 50px; }
      .tab-btn span:first-child { font-size: 18px; }
      .stat-row { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .exercise-head, .history-card-head { flex-direction: column; align-items: stretch; }
      .target { width: fit-content; }
      .mini-calendar { gap: 5px; }
      .day-dot { min-height: 44px; font-size: 13px; }
    }

    .app-launch-btn {
      min-width: 42px;
      font-weight: 950;
      letter-spacing: -.02em;
      background: color-mix(in srgb, var(--accent) 13%, var(--panel));
    }
    .app-launch-btn.music {
      background: color-mix(in srgb, #0ea5e9 13%, var(--panel));
    }
    .quick-app-panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, transparent), rgba(255,255,255,.045));
    }
    .quick-app-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .quick-app-head strong { display:block; font-size: 15px; }
    .quick-app-head span { display:block; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .quick-app-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
    .quick-app-help { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.42; }
    @media (max-width: 540px) { .quick-app-grid { grid-template-columns: 1fr; } .quick-app-head { display:block; } }

    .version-badge {
      display:inline-flex; align-items:center; justify-content:center;
      padding: 3px 8px; margin-left: 6px;
      border-radius: 999px;
      font-size: 10px; font-weight: 900; letter-spacing: .04em;
      color: color-mix(in srgb, var(--accent-2) 82%, white);
      background: color-mix(in srgb, var(--accent-2) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent-2) 28%, var(--line));
      vertical-align: middle;
    }
    .coach-strip {
      margin-top: 16px;
      padding: 13px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      border-radius: 18px;
      border: 1px solid color-mix(in srgb, var(--accent-2) 30%, var(--line));
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent-2) 13%, transparent), rgba(255,255,255,.045));
    }
    .coach-strip strong { display:block; margin-bottom:3px; }
    .coach-strip span { display:block; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .coach-card textarea, .coach-preview {
      min-height: 220px;
      margin-top: 12px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.42;
    }
    details.coach-details {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,.045);
    }
    details.coach-details summary {
      cursor: pointer;
      font-weight: 850;
      color: var(--soft);
    }
    .install-note {
      margin-top: 14px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.045);
      border: 1px dashed var(--line);
    }
    .finish-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .finish-pill {
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      font-weight: 750;
    }
    .finish-pill.done {
      color: color-mix(in srgb, var(--accent-2) 82%, white);
      border-color: color-mix(in srgb, var(--accent-2) 35%, var(--line));
      background: color-mix(in srgb, var(--accent-2) 12%, transparent);
    }
    .quick-weight-panel {
      margin-top: 12px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.045);
      border: 1px solid var(--line);
    }
    .quick-weight-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 780;
    }
    .quick-weight-current {
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
    }
    .quick-weight-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .quick-weight-grid .btn {
      min-height: 38px;
      padding: 8px 6px;
      border-radius: 13px;
      font-size: 12px;
      width: 100%;
    }
    .quick-weight-hint {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    @media (max-width: 700px) {
      .coach-strip { grid-template-columns: 1fr; }
      .coach-strip .btn { width: 100%; }
      .quick-weight-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 7px; }
      .quick-weight-grid .btn { font-size: 12px; }
    }

    .theme-btn { width: 42px; min-width: 42px; padding: 0; border-radius: 14px; font-size: 18px; flex: 0 0 42px; }
    .coach-card {
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--accent-2) 18%, transparent), transparent 22rem),
        var(--panel);
      border-color: color-mix(in srgb, var(--accent-2) 28%, var(--line));
    }
    @media (max-width: 860px) {
      .topbar-inner { grid-template-columns: 1fr auto; gap: 10px; }
      .top-actions { justify-content: flex-end; }
      .top-actions .pill { display: none; }
    }
    @media (max-width: 540px) {
      .brand-title { max-width: 230px; }
      .top-actions .theme-btn { width: 40px; min-width: 40px; flex: 0 0 40px; }
      .top-actions .btn { width: 40px; }
      .stat-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }


    .snapshot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .snapshot-tile {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.045);
      border-radius: 16px;
      padding: 12px;
      min-height: 78px;
    }
    .snapshot-tile .label { color: var(--muted); font-size: 12px; font-weight: 760; }
    .snapshot-tile .value { font-size: 23px; line-height: 1.05; font-weight: 950; letter-spacing: -.045em; margin-top: 5px; }
    .snapshot-tile .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .snapshot-tile.good { border-color: color-mix(in srgb, var(--accent-2) 34%, var(--line)); background: color-mix(in srgb, var(--accent-2) 10%, transparent); }
    .goal-meter { height: 8px; border-radius: 999px; background: rgba(255,255,255,.09); overflow: hidden; margin-top: 8px; }

        console.warn('Could not load state', err);
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateHeader();
    }

    function loadActiveSession() {
      try {
        const raw = localStorage.getItem(ACTIVE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (err) {
        console.warn('Could not load active session', err);
        return null;
      }
    }

    function saveActive() {
      if (active) localStorage.setItem(ACTIVE_KEY, JSON.stringify(active));
      else localStorage.removeItem(ACTIVE_KEY);
    }

    function getDay(index = state.settings.currentDayIndex) {
      return PLAN[((Number(index) || 0) + PLAN.length) % PLAN.length];
    }

    function getExercise(exerciseId) {
      for (const day of PLAN) {
        const found = day.exercises.find(ex => ex.id === exerciseId);
        if (found) return found;
      }
      return null;
    }

    function targetLabel(ex) {
      if (ex.type === 'cardio' || ex.type === 'timed') return `${ex.min}–${ex.max} ${ex.unit || 'min'}`;
      return `${ex.sets} × ${ex.min}–${ex.max}`;
    }

    function typeLabel(day) {
      return day.type === 'rest' ? 'Rest' : 'Lift';
    }

    function recommendationFor(ex) {
      const progress = state.exerciseProgress[ex.id];
      if (!progress) {
        if (ex.type === 'weighted') return 'First time: choose a weight that leaves 1–3 reps in the tank.';
        if (ex.type === 'bodyweight') return 'First time: use clean reps and avoid swinging.';
        return 'First time: hit the low end of the time range.';
      }
      return progress.note || 'Repeat the last successful setup.';
    }

    function recommendedInputValue(ex) {
      const progress = state.exerciseProgress[ex.id];
      if (!progress) return '';
      if (ex.type === 'weighted') return Number.isFinite(progress.nextWeight) ? progress.nextWeight : (progress.lastWeight || '');
      if (ex.type === 'cardio' || ex.type === 'timed') return Number.isFinite(progress.nextDuration) ? progress.nextDuration : '';
      return '';
    }

    function cleanNumber(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      const rounded = Math.round(n * 100) / 100;
      return Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(/\.0+$/, '');
    }

    function dateKey(date = new Date()) {
      const d = date instanceof Date ? date : new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function latestBodyMetric() {
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      return metrics[metrics.length - 1] || null;
    }

    function getTodayCheckin() {
      const key = dateKey();
      return state.dailyCheckins.find(c => c.key === key) || null;
    }

    function recentCheckins(days = 7) {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - (days - 1));
      cutoff.setHours(0,0,0,0);
      return [...state.dailyCheckins]
        .filter(c => new Date(c.date || c.key) >= cutoff)
        .sort((a,b) => new Date(a.date || a.key) - new Date(b.date || b.key));
    }

    function avg(nums) {
      const clean = nums.map(Number).filter(Number.isFinite);
      return clean.length ? clean.reduce((a,b) => a + b, 0) / clean.length : null;
    }

    function pct(value, goal) {
      const v = Number(value), g = Number(goal);
      if (!Number.isFinite(v) || !Number.isFinite(g) || g <= 0) return 0;
      return clamp((v / g) * 100, 0, 140);
    }

    function feelEmoji(feel) {
      if (feel === 'easy') return '🟢';
      if (feel === 'hard') return '🔴';
      return '🟡';
    }

    function feelLabel(feel) {
      if (feel === 'easy') return 'Easy';
      if (feel === 'hard') return 'Hard';
      return 'Just right';
    }

    function renderFeelBadge(feel, warmup = false) {
      const f = feel || 'good';
      const warm = warmup ? `<span class="feel-badge warmup-chip">WU</span>` : '';
      return `${warm}<span class="feel-badge ${esc(f)}">${feelEmoji(f)} ${esc(feelLabel(f))}</span>`;
    }

    function getSetFeel(index) {
      const input = $(`[data-input="feel-${index}"]`);
      return input?.value || active?.exercises?.[index]?.draftFeel || 'good';
    }

    function formatMaybe(value, suffix = '') {
      const n = Number(value);
      return Number.isFinite(n) ? `${cleanNumber(n)}${suffix}` : '—';
    }

    function getLastLoggedWeight(entry) {
      const logs = [...(entry?.logs || [])].reverse();
      const found = logs.find(log => Number.isFinite(Number(log.weight)) && Number(log.weight) > 0);
      return found ? Number(found.weight) : null;
    }

    function getSessionWeightValue(entry, ex, fallback = '') {
      if (ex.type !== 'weighted' && ex.type !== 'bodyweight') return fallback;
      if (Number.isFinite(Number(entry?.draftWeight)) && Number(entry.draftWeight) > 0) return cleanNumber(entry.draftWeight);
      const lastWeight = getLastLoggedWeight(entry);
      if (lastWeight !== null) return cleanNumber(lastWeight);
      if (Number.isFinite(Number(fallback)) && Number(fallback) > 0) return cleanNumber(fallback);
      return '';
    }

    function currentWeightFromInput(index) {
      const input = $(`[data-input="weight-${index}"]`);
      const fromInput = input ? Number(input.value) : NaN;
      if (Number.isFinite(fromInput) && fromInput > 0) return fromInput;
      const entry = active?.exercises?.[index];
      if (!entry) return NaN;
      const ex = getExercise(entry.id);
      if (!ex) return NaN;
      const fromSession = Number(getSessionWeightValue(entry, ex, recommendedInputValue(ex)));
      return Number.isFinite(fromSession) && fromSession > 0 ? fromSession : NaN;
    }

    function setDraftWeight(index, weight, message = '') {
      if (!active?.exercises?.[index]) return;
      const clean = Math.max(0, Math.round(Number(weight) * 100) / 100);
      if (!Number.isFinite(clean) || clean <= 0) {
        showToast('Enter a starting weight first.');
        return;
      }
      active.exercises[index].draftWeight = clean;
      saveActive();
      const display = cleanNumber(clean);
      const input = $(`[data-input="weight-${index}"]`);
      if (input) input.value = display;
      const label = $(`[data-current-weight="${index}"]`);
      if (label) label.textContent = `${display} ${state.settings.units}`;
      if (message) showToast(message.replace('{weight}', `${display} ${state.settings.units}`));
    }

    function adjustWeight(index, delta) {
      if (!active?.exercises?.[index]) return;
      const entry = active.exercises[index];
      const ex = getExercise(entry.id);
      if (!ex || (ex.type !== 'weighted' && ex.type !== 'bodyweight')) return;
      const current = currentWeightFromInput(index);
      if (!Number.isFinite(current) || current <= 0) {
        showToast('Enter a starting weight first, then use +5 / -5.');
        return;
      }
      const next = Math.max(0, current + Number(delta || 0));
      setDraftWeight(index, next, `Next sets default to {weight}.`);
    }

    function useLastSetWeight(index) {
      if (!active?.exercises?.[index]) return;
      const lastWeight = getLastLoggedWeight(active.exercises[index]);
      if (lastWeight === null) {
        showToast('No previous set weight for this exercise yet.');
        return;
      }
      setDraftWeight(index, lastWeight, `Next sets reset to {weight}.`);
    }

    function clearDraftWeight(index) {
      if (!active?.exercises?.[index]) return;
      active.exercises[index].draftWeight = null;
      saveActive();
      const input = $(`[data-input="weight-${index}"]`);
      if (input) input.value = '';
      const label = $(`[data-current-weight="${index}"]`);
      if (label) label.textContent = 'Set weight';
      showToast('Weight cleared for this exercise.');
    }

    function updateHeader() {
      const day = getDay();
      document.documentElement.dataset.theme = state.settings.theme || 'dark';
      const nextChip = $('#nextChip');
      if (nextChip) nextChip.textContent = `Next: Day ${day.day} • ${day.title}`;
      $('#headerSub').textContent = `${typeLabel(day)} • ${day.focus} • no lunges`;
    }

    function showToast(message) {
      const box = $('#toast');
      box.textContent = message;
      box.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => box.classList.remove('show'), 3200);
    }

    function quickAppDefaults() {
      return {
        pfAppUrl: 'shortcuts://run-shortcut?name=Open%20Planet%20Fitness',
        musicAppUrl: 'music://',
        pfFallbackUrl: 'https://apps.apple.com/us/app/planet-fitness/id399857015',
        musicFallbackUrl: 'https://music.apple.com/us/browse'
      };
    }

    function safeLaunchUrl(value) {
      const raw = String(value || '').trim();
      if (!raw) return '';
      try {
        const url = new URL(raw);
        const protocol = url.protocol.replace(':', '').toLowerCase();
        if (['javascript', 'data', 'file', 'vbscript', 'blob'].includes(protocol)) return '';
        return raw;
      } catch (err) {
        return '';
      }
    }

    function readLaunchSetting(key) {
      const input = $(`[data-setting="${key}"]`);
      return String(input?.value || state.settings[key] || quickAppDefaults()[key] || '').trim();
    }

    function getExternalAppConfig(kind) {
      const defaults = quickAppDefaults();
      if (kind === 'music') {
        return {
          name: 'Apple Music',
          url: readLaunchSetting('musicAppUrl') || defaults.musicAppUrl,
          fallback: state.settings.musicFallbackUrl || defaults.musicFallbackUrl
        };
      }
      return {
        name: 'Planet Fitness',
        url: readLaunchSetting('pfAppUrl') || defaults.pfAppUrl,
        fallback: state.settings.pfFallbackUrl || defaults.pfFallbackUrl
      };
    }

    function openExternalApp(kind) {
      const cfg = getExternalAppConfig(kind);
      const launchUrl = safeLaunchUrl(cfg.url);
      const fallbackUrl = safeLaunchUrl(cfg.fallback);
      if (!launchUrl) {
        showToast(`Add a ${cfg.name} quick link in Settings.`);
        return;
      }
      let fallbackTimer = null;
      const lower = launchUrl.toLowerCase();
      const canUseWebFallback = /^https?:\/\//i.test(fallbackUrl || '') && !lower.startsWith('shortcuts://') && !/^https?:\/\//i.test(launchUrl);
      if (canUseWebFallback) {
        const clearFallback = () => {
          if (fallbackTimer) clearTimeout(fallbackTimer);
          fallbackTimer = null;
        };
        document.addEventListener('visibilitychange', () => { if (document.hidden) clearFallback(); }, { once: true });
        window.addEventListener('pagehide', clearFallback, { once: true });
        fallbackTimer = setTimeout(() => {
          if (!document.hidden) window.open(fallbackUrl, '_blank', 'noopener');
        }, 1200);
      }
      showToast(`Opening ${cfg.name}…`);
      try {
        window.location.href = launchUrl;
      } catch (err) {
        if (fallbackUrl) window.open(fallbackUrl, '_blank', 'noopener');
        else showToast(`Could not open ${cfg.name}.`);
      }
    }

    function resetQuickAppLinks() {
      const defaults = quickAppDefaults();
      state.settings.pfAppUrl = defaults.pfAppUrl;
      state.settings.musicAppUrl = defaults.musicAppUrl;
      state.settings.pfFallbackUrl = defaults.pfFallbackUrl;
      state.settings.musicFallbackUrl = defaults.musicFallbackUrl;
      saveState();
      showToast('Quick app links reset.');
    }

    function renderQuickAppsPanel() {
      return `
        <div class="quick-app-panel quick-app-panel-compact">
          <div class="quick-app-head">
            <strong>Quick launch</strong>
            <span>PF check-in/crowd meter or music.</span>
          </div>
          <div class="quick-app-grid">
            <button class="btn green quick-btn" data-action="open-external-app" data-app="pf">🏋️ PF app</button>
            <button class="btn quick-btn" data-action="open-external-app" data-app="music">🎵 Music</button>
          </div>
        </div>
      `;
    }

    function render() {
      updateHeader();
      $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === currentTab));
      if (currentTab === 'today') renderToday();
      if (currentTab === 'history') renderHistory();
      if (currentTab === 'progress') renderProgress();
      if (currentTab === 'plan') renderPlan();
      if (currentTab === 'settings') renderSettings();
    }

    function renderToday() {
      if (active) {
        renderActiveSession();
        return;
      }
      const day = getDay();
      const stats = getStats();
      const view = $('#view');
      view.innerHTML = `
        <section class="hero">
          <div class="card">
            <div class="card-inner">
              <div class="kicker">Today’s workout</div>
              <h1>Day ${day.day}: ${esc(day.title)}</h1>
              <p class="muted">${esc(day.focus)}</p>
              <div class="badge-row">
                <span class="badge">${day.type === 'rest' ? '🛌 Rest day' : '🏋️ Lift day'}</span>
                <span class="badge">🚫 No lunges</span>
                <span class="badge">⏱️ Rest timer: ${state.settings.restSeconds}s</span>
              </div>
              <p class="note" style="margin-top:16px">${esc(day.note)}</p>
              <div class="toolbar">
                ${day.type === 'rest'
                  ? `<button class="btn green" data-action="mark-rest-complete">Mark rest day complete</button><button class="btn primary" data-action="start-workout">Start optional recovery</button>`
                  : `<button class="btn primary" data-action="start-workout">Start workout</button>`}
                <button class="btn" data-action="advance-day">Skip to next day</button>
                <select class="split-select" data-action="change-current-day" aria-label="Choose split day">
                  ${PLAN.map((d, i) => `<option value="${i}" ${i === state.settings.currentDayIndex ? 'selected' : ''}>Day ${d.day}: ${esc(d.title)}</option>`).join('')}
                </select>
              </div>
              ${renderQuickAppsPanel()}
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <div class="kicker">Dashboard</div>
              <div class="stat-row" style="grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top:12px">
                <div class="stat"><div class="label">Workouts</div><div class="value">${stats.liftSessions}</div></div>
                <div class="stat"><div class="label">This week</div><div class="value">${stats.thisWeek}</div></div>
                <div class="stat"><div class="label">Total sets</div><div class="value">${stats.totalSets}</div></div>
                <div class="stat"><div class="label">Streak</div><div class="value">${stats.streak}</div></div>
              </div>
              <div class="section-title"><h3 style="margin:0">Recent 7 days</h3></div>
              ${renderMiniCalendar()}
              ${renderTodayCoachSnapshot()}
              <div class="coach-strip">
                <div><strong>Coach check-in</strong><span>Share your recent workouts, body metrics, and next-weight recommendations with ChatGPT.</span></div>
                <button class="btn small green" data-action="share-coach-report">Share report</button>
              </div>
            </div>
          </div>
        </section>
        <div class="section-title">
          <h2 style="margin:0">Workout preview</h2>
          <span class="pill">${esc(day.warmup)}</span>
        </div>
        <section class="exercise-preview">
          ${day.exercises.map(ex => renderExercisePreview(ex)).join('')}
        </section>
      `;
    }

    function renderExercisePreview(ex) {
      const rec = recommendationFor(ex);
      const progress = state.exerciseProgress[ex.id];
      const last = progress?.lastSummary ? `<div class="rec-line">Last: ${esc(progress.lastSummary)}</div>` : '';
      return `
        <article class="exercise-item">
          <div class="exercise-head">
            <div>
              <h3>${esc(ex.name)}</h3>
              <div class="small-text">${esc(ex.equipment || '')} ${ex.cues ? '• ' + esc(ex.cues) : ''}</div>
            </div>
            <span class="target">${esc(targetLabel(ex))}</span>
          </div>
          ${last}
          <div class="rec-line"><span class="rec-good">Next:</span> ${esc(rec)}</div>
        </article>
      `;
    }

    function renderMiniCalendar() {
      const days = [];
      const today = new Date();
      today.setHours(0,0,0,0);
      const completedDates = new Set(state.history.map(s => new Date(s.startedAt || s.date).toDateString()));
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        const done = completedDates.has(d.toDateString());
        const isToday = i === 0;
        days.push(`<div class="day-dot ${done ? 'done' : ''} ${isToday ? 'today' : ''}" title="${d.toDateString()}">${d.toLocaleDateString(undefined, { weekday: 'short' }).slice(0,2)}</div>`);
      }
      return `<div class="mini-calendar">${days.join('')}</div>`;
    }

    function renderTodayCoachSnapshot() {
      const metric = latestBodyMetric();
      const checkin = getTodayCheckin();
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      const first = metrics[0];
      const delta = metric && first && metrics.length > 1 ? Number(metric.weight) - Number(first.weight) : null;
      const cal = checkin?.calories;
      const protein = checkin?.protein;
      return `
        <div class="snapshot-grid">
          <div class="snapshot-tile ${metric ? 'good' : ''}">
            <div class="label">Latest weight</div>
            <div class="value">${metric ? `${esc(metric.weight)} ${esc(state.settings.units)}` : 'Add'}</div>
            <div class="sub">${metric ? `${metric.bodyFat ? esc(metric.bodyFat) + '% body fat • ' : ''}${delta !== null ? (delta >= 0 ? '+' : '') + delta.toFixed(1) + ' total' : fmtDate(metric.date)}` : 'Progress tab → body metrics'}</div>
          </div>
          <div class="snapshot-tile">
            <div class="label">Protein today</div>
            <div class="value">${formatMaybe(protein, 'g')}</div>
            <div class="goal-meter"><span style="width:${pct(protein, state.goals.dailyProtein)}%"></span></div>
            <div class="sub">Goal ${esc(state.goals.dailyProtein)}g</div>
          </div>
          <div class="snapshot-tile">
            <div class="label">Calories today</div>
            <div class="value">${formatMaybe(cal)}</div>
            <div class="goal-meter"><span style="width:${pct(cal, state.goals.dailyCalories)}%"></span></div>
            <div class="sub">Target ${esc(state.goals.dailyCalories)}</div>
          </div>
          <div class="snapshot-tile">
            <div class="label">Coach mode</div>
            <div class="value">On</div>
            <div class="sub">Set feel + warm-up tracking improve next-weight calls.</div>
          </div>
        </div>
        <div class="wide-actions">
          <button class="btn small" data-action="go-progress">Log body / nutrition</button>
        </div>
      `;
    }

    function startWorkout() {
      const day = getDay();
      active = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        dayIndex: state.settings.currentDayIndex,
        day: day.day,
        title: day.title,
        type: day.type,
        focus: day.focus,
        startedAt: new Date().toISOString(),
        exercises: day.exercises.map(ex => ({ id: ex.id, logs: [], notes: '', draftWeight: null, draftFeel: 'good' }))
      };
      saveActive();
      currentTab = 'today';
      render();
      showToast(day.type === 'rest' ? 'Optional recovery started.' : 'Workout started. Log each working set.');
    }

    function renderActiveSession() {
      const day = PLAN[active.dayIndex] || getDay();
      const elapsed = formatDuration(Date.now() - new Date(active.startedAt).getTime());
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="session-bar">
              <div>
                <div class="kicker">Active session</div>
                <h1>Day ${day.day}: ${esc(day.title)}</h1>
                <p class="muted">${esc(day.focus)} • Started ${fmtTime(active.startedAt)}</p>
              </div>
              <div class="timer-bubble">⏱️ <span id="elapsedTime">${elapsed}</span></div>
            </div>
            <p class="note">${esc(day.warmup)}</p>
            <div class="toolbar session-toolbar">
              <button class="btn green" data-action="finish-workout">Finish workout + save</button>
              <button class="btn warn" data-action="start-rest-manual">Start rest timer</button>
              <button class="btn danger" data-action="cancel-workout">Cancel</button>
            </div>
            <div class="quick-inline-actions" aria-label="Quick apps">
              <button class="quick-chip" data-action="open-external-app" data-app="pf">🏋️ PF app</button>
              <button class="quick-chip" data-action="open-external-app" data-app="music">🎵 Music</button>
            </div>
          </div>
        </section>
        <section class="grid" style="margin-top:16px">
          ${active.exercises.map((entry, index) => renderExerciseLogCard(entry, index)).join('')}
        </section>
      `;
      restartElapsedClock();
    }

    function renderExerciseLogCard(entry, index) {
      const ex = getExercise(entry.id);
      if (!ex) return '';
      const logs = entry.logs || [];
      const rec = recommendationFor(ex);
      const recValue = getSessionWeightValue(entry, ex, recommendedInputValue(ex));
      const last = state.exerciseProgress[ex.id]?.lastSummary || 'No previous log yet';
      return `
        <article class="card" data-card-index="${index}">
          <div class="card-inner">
            <div class="exercise-head">
              <div>
                <h2 style="margin-bottom:4px">${esc(ex.name)}</h2>
                <div class="small-text">Target: ${esc(targetLabel(ex))} • ${esc(ex.equipment || '')}</div>
              </div>
              <span class="target">${esc(ex.type)}</span>
            </div>
            <div class="badge-row">
              <span class="badge">Last: ${esc(last)}</span>
              <span class="badge">Next: ${esc(rec)}</span>
            </div>
            ${renderExerciseCompletion(ex, logs)}
            ${logs.length ? renderLogTable(ex, logs, index) : `<div class="empty" style="margin-top:12px">No sets logged yet for this exercise.</div>`}
            ${renderLogInputs(ex, index, recValue)}
            <div class="small-text" style="margin-top:10px">${esc(ex.cues || '')}</div>
          </div>
        </article>
      `;
    }

    function renderLogTable(ex, logs, index) {
      const rows = logs.map((log, i) => {
        if (ex.type === 'weighted') {
          const setName = log.warmup ? 'Warm-up' : String(i + 1);
          return `<tr><td>${esc(setName)}</td><td>${esc(log.weight)} ${esc(state.settings.units)}</td><td>${esc(log.reps)}</td><td>${renderFeelBadge(log.feel, log.warmup)}</td><td><button class="btn small ghost" data-action="delete-set" data-exercise-index="${index}" data-set-index="${i}">Delete</button></td></tr>`;
        }
        if (ex.type === 'bodyweight') {
          const setName = log.warmup ? 'Warm-up' : String(i + 1);
          return `<tr><td>${esc(setName)}</td><td>${esc(log.reps)} reps</td><td>${log.weight ? esc(log.weight) + ' ' + esc(state.settings.units) : 'bodyweight'}</td><td>${renderFeelBadge(log.feel, log.warmup)}</td><td><button class="btn small ghost" data-action="delete-set" data-exercise-index="${index}" data-set-index="${i}">Delete</button></td></tr>`;
        }
        return `<tr><td>${i + 1}</td><td>${esc(log.duration)} ${esc(ex.unit || 'min')}</td><td>${esc(log.note || '')}</td><td><button class="btn small ghost" data-action="delete-set" data-exercise-index="${index}" data-set-index="${i}">Delete</button></td></tr>`;
      }).join('');
      const headers = ex.type === 'weighted'
        ? '<tr><th>Set</th><th>Weight</th><th>Reps</th><th>Feel</th><th></th></tr>'
        : ex.type === 'bodyweight'
          ? '<tr><th>Set</th><th>Reps</th><th>Added weight</th><th>Feel</th><th></th></tr>'
          : '<tr><th>Log</th><th>Amount</th><th>Note</th><th></th></tr>';
      return `<table class="set-table"><thead>${headers}</thead><tbody>${rows}</tbody></table>`;
    }

    function renderLogInputs(ex, index, recValue) {
      if (ex.type === 'weighted') {
        const weightValue = recValue ? cleanNumber(recValue) : '';
        return `
          ${renderQuickWeightControls(index, weightValue, 'Easy weight')}
          ${renderSetOptions(index)}
          <div class="form-grid" style="margin-top:12px">
            <div class="field"><label>Weight (${esc(state.settings.units)})</label><input inputmode="decimal" data-input="weight-${index}" placeholder="${weightValue ? esc(weightValue) : 'ex: 80'}" value="${weightValue ? esc(weightValue) : ''}"></div>
            <div class="field"><label>Reps</label><input inputmode="numeric" data-input="reps-${index}" placeholder="${ex.min}-${ex.max}"></div>
            <div class="field"><label>Note</label><input data-input="note-${index}" placeholder="optional"></div>
            <button class="btn primary" data-action="add-set" data-exercise-index="${index}">Log set</button>
          </div>
        `;
      }
      if (ex.type === 'bodyweight') {
        const weightValue = recValue ? cleanNumber(recValue) : '';
        return `
          ${renderQuickWeightControls(index, weightValue, 'Added weight')}
          ${renderSetOptions(index)}
          <div class="form-grid" style="margin-top:12px">
            <div class="field"><label>Reps</label><input inputmode="numeric" data-input="reps-${index}" placeholder="${ex.min}-${ex.max}"></div>
            <div class="field"><label>Added weight (${esc(state.settings.units)})</label><input inputmode="decimal" data-input="weight-${index}" placeholder="optional" value="${weightValue ? esc(weightValue) : ''}"></div>
            <div class="field"><label>Note</label><input data-input="note-${index}" placeholder="optional"></div>
            <button class="btn primary" data-action="add-set" data-exercise-index="${index}">Log set</button>
          </div>
        `;
      }
      return `
        <div class="form-grid" style="margin-top:12px">
          <div class="field"><label>Duration (${esc(ex.unit || 'min')})</label><input inputmode="decimal" data-input="duration-${index}" placeholder="${recValue || ex.min}"></div>
          <div class="field"><label>Effort / setting</label><input data-input="note-${index}" placeholder="ex: incline 8, speed 3.2"></div>
          <div class="field"><label>Extra</label><input data-input="extra-${index}" placeholder="optional"></div>
          <button class="btn primary" data-action="add-set" data-exercise-index="${index}">Log</button>
        </div>
      `;
    }

    function renderSetOptions(index) {
      const feel = active?.exercises?.[index]?.draftFeel || 'good';
      return `
        <div class="feel-panel">
          <div class="feel-head">
            <span>How did this set feel?</span>
            <strong>${feelEmoji(feel)} ${esc(feelLabel(feel))}</strong>
          </div>
          <div class="feel-buttons" data-feel-group="${index}">
            <button class="feel-btn ${feel === 'easy' ? 'active' : ''}" data-action="set-feel" data-exercise-index="${index}" data-feel="easy" type="button">🟢 Easy</button>
            <button class="feel-btn ${feel === 'good' ? 'active' : ''}" data-action="set-feel" data-exercise-index="${index}" data-feel="good" type="button">🟡 Just right</button>
            <button class="feel-btn ${feel === 'hard' ? 'active' : ''}" data-action="set-feel" data-exercise-index="${index}" data-feel="hard" type="button">🔴 Hard</button>
          </div>
          <input type="hidden" data-input="feel-${index}" value="${esc(feel)}">
          <label class="warmup-toggle"><input type="checkbox" data-input="warmup-${index}"> Mark this as a warm-up set so it does not drive recommendations</label>
        </div>
      `;
    }

    function renderQuickWeightControls(index, weightValue = '', label = 'Easy weight') {
      return `
        <div class="quick-weight-panel">
          <div class="quick-weight-head">
            <span>${esc(label)}</span>
            <strong class="quick-weight-current" data-current-weight="${index}">${weightValue ? esc(weightValue) + ' ' + esc(state.settings.units) : 'Set weight'}</strong>
          </div>
          <div class="quick-weight-grid">
            <button class="btn small ghost" data-action="adjust-weight" data-exercise-index="${index}" data-delta="-10">−10</button>
            <button class="btn small ghost" data-action="adjust-weight" data-exercise-index="${index}" data-delta="-5">−5</button>
            <button class="btn small primary" data-action="adjust-weight" data-exercise-index="${index}" data-delta="5">+5</button>
            <button class="btn small primary" data-action="adjust-weight" data-exercise-index="${index}" data-delta="10">+10</button>
            <button class="btn small ghost" data-action="use-last-weight" data-exercise-index="${index}">Last</button>
            <button class="btn small ghost" data-action="clear-weight" data-exercise-index="${index}">Clear</button>
          </div>
          <div class="quick-weight-hint">Tap +5 before logging a set. After you log it, that new weight stays filled in for the next sets on this exercise.</div>
        </div>
      `;
    }

    function renderExerciseCompletion(ex, logs) {
      const count = logs.length;
      const target = ex.sets || 1;
      const complete = count >= target;
      const label = ex.type === 'cardio' || ex.type === 'timed' ? 'logs' : 'sets';
      return `<div class="finish-row"><span class="finish-pill ${complete ? 'done' : ''}">${count}/${target} ${label} logged</span>${complete ? '<span class="finish-pill done">target hit</span>' : '<span class="finish-pill">keep going</span>'}</div>`;
    }

    function setFeel(index, feel) {
      if (!active?.exercises?.[index]) return;
      const valid = ['easy', 'good', 'hard'].includes(feel) ? feel : 'good';
      active.exercises[index].draftFeel = valid;
      saveActive();
      const input = $(`[data-input="feel-${index}"]`);
      if (input) input.value = valid;
      $$(`[data-feel-group="${index}"] .feel-btn`).forEach(btn => btn.classList.toggle('active', btn.dataset.feel === valid));
      const head = $(`[data-feel-group="${index}"]`)?.closest('.feel-panel')?.querySelector('.feel-head strong');
      if (head) head.textContent = `${feelEmoji(valid)} ${feelLabel(valid)}`;
      showToast(`Set feel: ${feelLabel(valid)}.`);
    }

    function addSet(index) {
      if (!active || !active.exercises[index]) return;
      const entry = active.exercises[index];
      const ex = getExercise(entry.id);
      if (!ex) return;
      const note = $(`[data-input="note-${index}"]`)?.value?.trim() || '';
      const feel = getSetFeel(index);
      const warmup = Boolean($(`[data-input="warmup-${index}"]`)?.checked);
      if (ex.type === 'weighted') {
        const weight = parseFloat($(`[data-input="weight-${index}"]`)?.value);
        const reps = parseInt($(`[data-input="reps-${index}"]`)?.value, 10);
        if (!Number.isFinite(weight) || weight <= 0 || !Number.isFinite(reps) || reps <= 0) {
          showToast('Enter both weight and reps.');
          return;
        }
        entry.logs.push({ weight, reps, feel, warmup, note, at: new Date().toISOString() });
        entry.draftWeight = weight;
        entry.draftFeel = 'good';
      } else if (ex.type === 'bodyweight') {
        const reps = parseInt($(`[data-input="reps-${index}"]`)?.value, 10);
        const weightRaw = $(`[data-input="weight-${index}"]`)?.value;
        const weight = weightRaw ? parseFloat(weightRaw) : null;
        if (!Number.isFinite(reps) || reps <= 0) {
          showToast('Enter reps.');
          return;
        }
        entry.logs.push({ reps, weight: Number.isFinite(weight) ? weight : null, feel, warmup, note, at: new Date().toISOString() });
        entry.draftWeight = Number.isFinite(weight) && weight > 0 ? weight : null;
        entry.draftFeel = 'good';
      } else {
        const duration = parseFloat($(`[data-input="duration-${index}"]`)?.value);
        const extra = $(`[data-input="extra-${index}"]`)?.value?.trim() || '';
        if (!Number.isFinite(duration) || duration <= 0) {
          showToast('Enter the duration.');
          return;
        }
        entry.logs.push({ duration, note: [note, extra].filter(Boolean).join(' • '), at: new Date().toISOString() });
      }
      saveActive();
      if (state.settings.autoRest && ex.type !== 'cardio') startRestTimer(state.settings.restSeconds);
      renderActiveSession();
      showToast(`${ex.name} logged.`);
    }

    function deleteSet(exIndex, setIndex) {
      if (!active?.exercises?.[exIndex]) return;
      const entry = active.exercises[exIndex];
      entry.logs.splice(setIndex, 1);
      entry.draftWeight = getLastLoggedWeight(entry);
      saveActive();
      renderActiveSession();
    }

    function finishWorkout() {
      if (!active) return;
      const loggedCount = active.exercises.reduce((sum, ex) => sum + (ex.logs?.length || 0), 0);
      if (loggedCount === 0 && !confirm('No sets have been logged. Save anyway?')) return;
      const now = new Date().toISOString();
      const session = {
        ...active,
        endedAt: now,
        durationMs: new Date(now).getTime() - new Date(active.startedAt).getTime(),
        completedAt: now
      };
      state.history.push(session);
      rebuildProgressFromHistory();
      state.settings.currentDayIndex = (active.dayIndex + 1) % PLAN.length;
      active = null;
      saveActive();
      saveState();
      stopRestTimer();
      currentTab = 'history';
      render();
      showToast(`Saved. Next up: Day ${getDay().day} • ${getDay().title}.`);
    }

    function cancelWorkout() {
      if (!active) return;
      if (!confirm('Cancel this active workout? Logged sets from this session will be discarded.')) return;
      active = null;
      saveActive();
      stopRestTimer();
      render();
      showToast('Workout canceled.');
    }

    function markRestComplete() {
      const day = getDay();
      const now = new Date().toISOString();
      const session = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        dayIndex: state.settings.currentDayIndex,
        day: day.day,
        title: day.title,
        type: 'rest',
        focus: day.focus,
        startedAt: now,
        endedAt: now,
        durationMs: 0,
        completedAt: now,
        exercises: []
      };
      state.history.push(session);
      state.settings.currentDayIndex = (state.settings.currentDayIndex + 1) % PLAN.length;
      saveState();
      render();
      showToast(`Rest day saved. Next up: Day ${getDay().day} • ${getDay().title}.`);
    }

    function analyzeExercise(ex, logs) {
      const previous = state.exerciseProgress[ex.id] || {};
      const cleanLogs = logs || [];
      if (!cleanLogs.length) return previous;
      const base = {
        lastDate: new Date().toISOString(),
        completedCount: (previous.completedCount || 0) + 1,
        lastSummary: summarizeLogs(ex, cleanLogs)
      };

      if (ex.type === 'weighted') {
        const allWeighted = cleanLogs.filter(l => Number.isFinite(Number(l.weight)) && Number.isFinite(Number(l.reps)));
        const working = allWeighted.filter(l => !l.warmup);
        const evalSource = working.length ? working : allWeighted;
        if (!evalSource.length) return { ...previous, ...base };
        const evalSets = evalSource.slice(-ex.sets);
        const weights = evalSets.map(l => Number(l.weight));
        const reps = evalSets.map(l => Number(l.reps));
        const lastWeight = weights[weights.length - 1];
        const minReps = Math.min(...reps);
        const maxRepsHit = reps.every(r => r >= ex.max);
        const belowMin = reps.some(r => r < ex.min);
        const sameWorkingWeight = weights.every(w => w === lastWeight);
        const hardCount = evalSets.filter(l => l.feel === 'hard').length;
        const easyCount = evalSets.filter(l => l.feel === 'easy').length;
        const majority = Math.ceil(evalSets.length / 2);
        let nextWeight = lastWeight;
        let note = `Repeat ${lastWeight} ${state.settings.units} and add reps.`;

        if (evalSets.length < ex.sets) {
          note = `Repeat ${lastWeight} ${state.settings.units}; log all ${ex.sets} working sets next time.`;
        } else if (!sameWorkingWeight) {
          note = `Use ${lastWeight} ${state.settings.units} as your working weight next time and keep working sets consistent.`;
        } else if (maxRepsHit && hardCount === 0) {
          nextWeight = roundToIncrement(lastWeight + ex.increment, ex.increment);
          note = `Increase to ${nextWeight} ${state.settings.units} next time. You hit the top range without marking sets hard.`;
        } else if (easyCount >= majority && minReps >= ex.max - 1 && hardCount === 0) {
          nextWeight = roundToIncrement(lastWeight + ex.increment, ex.increment);
          note = `Try ${nextWeight} ${state.settings.units} next time if form was clean. You were near the top range and most sets felt easy.`;
        } else if (belowMin && hardCount >= majority) {
          nextWeight = Math.max(0, roundToIncrement(lastWeight - ex.increment, ex.increment));
          note = `Drop to ${nextWeight} ${state.settings.units} or repeat lighter. Multiple working sets were hard and below the target range.`;
        } else if (belowMin) {
          note = `Repeat ${lastWeight} ${state.settings.units}. Get every working set to at least ${ex.min} reps before adding weight.`;
        } else if (hardCount >= majority) {
          note = `Repeat ${lastWeight} ${state.settings.units}. Keep this weight until it feels more controlled.`;
        }
        const warmups = allWeighted.length - working.length;
        if (warmups > 0) note += ` Warm-up sets were ignored for this recommendation.`;
        const bestSet = bestWeightedSet(ex.id);
        return { ...previous, ...base, lastWeight, nextWeight, note, bestSet };
      }

      if (ex.type === 'bodyweight') {
        const allSets = cleanLogs.filter(l => Number.isFinite(Number(l.reps)));
        const working = allSets.filter(l => !l.warmup);
        const evalSets = (working.length ? working : allSets).slice(-ex.sets);
        const reps = evalSets.map(l => Number(l.reps)).filter(Number.isFinite);
        const minReps = reps.length ? Math.min(...reps) : 0;
        const hardCount = evalSets.filter(l => l.feel === 'hard').length;
        const note = minReps >= ex.max && hardCount === 0
          ? 'Next time: add 1–3 reps per set, slow the tempo, or add light weight.'
          : hardCount >= Math.ceil(Math.max(1, evalSets.length) / 2)
            ? 'Repeat with cleaner control before adding reps.'
            : 'Repeat and try to add reps with clean form.';
        return { ...previous, ...base, note, bestSet: bestBodyweightSet(ex.id) };
      }

      const durations = cleanLogs.map(l => Number(l.duration)).filter(Number.isFinite);
      const lastDuration = durations[durations.length - 1] || ex.min;
      let nextDuration = lastDuration;
      let note = `Repeat ${lastDuration} ${ex.unit || 'min'} next time.`;
      if (lastDuration >= ex.max) {
        nextDuration = lastDuration + (ex.increment || 2);
        note = `Add ${ex.increment || 2} ${ex.unit || 'min'} or slightly increase intensity next time.`;
      }
      return { ...previous, ...base, lastDuration, nextDuration, note };
    }

    function roundToIncrement(value, increment) {
      const inc = increment || 5;
      return Math.round(value / inc) * inc;
    }

    function rebuildProgressFromHistory() {
      state.exerciseProgress = {};
      const sorted = [...state.history].sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
      for (const session of sorted) {
        for (const entry of session.exercises || []) {
          const ex = getExercise(entry.id);
          if (!ex) continue;
          state.exerciseProgress[ex.id] = analyzeExercise(ex, entry.logs || []);
        }
      }
    }

    function summarizeLogs(ex, logs) {
      if (!logs?.length) return 'No logs';
      if (ex.type === 'weighted') {
        const pieces = logs.map(l => `${l.warmup ? 'WU ' : ''}${l.weight}×${l.reps}${l.feel ? ' ' + feelEmoji(l.feel) : ''}`);
        return pieces.slice(0, 5).join(', ') + (pieces.length > 5 ? '…' : '');
      }
      if (ex.type === 'bodyweight') {
        const pieces = logs.map(l => `${l.warmup ? 'WU ' : ''}${l.reps} reps${l.weight ? ' +' + l.weight : ''}${l.feel ? ' ' + feelEmoji(l.feel) : ''}`);
        return pieces.slice(0, 5).join(', ') + (pieces.length > 5 ? '…' : '');
      }
      return logs.map(l => `${l.duration} ${ex.unit || 'min'}`).join(', ');
    }

    function bestWeightedSet(exerciseId) {
      let best = null;
      for (const session of state.history) {
        for (const entry of session.exercises || []) {
          if (entry.id !== exerciseId) continue;
          const ex = getExercise(entry.id);
          for (const log of entry.logs || []) {
            if (log.warmup) continue;
            const weight = Number(log.weight), reps = Number(log.reps);
            if (!Number.isFinite(weight) || !Number.isFinite(reps)) continue;
            const estimate = weight * (1 + reps / 30);
            if (!best || estimate > best.estimate) best = { weight, reps, estimate, date: session.startedAt, name: ex?.name || exerciseId };
          }
        }
      }
      return best;
    }

    function bestBodyweightSet(exerciseId) {
      let best = null;
      for (const session of state.history) {
        for (const entry of session.exercises || []) {
          if (entry.id !== exerciseId) continue;
          const ex = getExercise(entry.id);
          for (const log of entry.logs || []) {
            if (log.warmup) continue;
            const reps = Number(log.reps);
            if (!Number.isFinite(reps)) continue;
            if (!best || reps > best.reps) best = { reps, date: session.startedAt, name: ex?.name || exerciseId };
          }
        }
      }
      return best;
    }

    function renderHistory() {
      const sessions = [...state.history].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt));
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="section-title" style="margin-top:0">
              <div>
                <div class="kicker">Training log</div>
                <h1>History</h1>
                <p class="muted">Every saved workout and rest day lives here.</p>
              </div>
              <div class="inline-controls">
                <button class="btn green" data-action="share-coach-report">Coach check-in</button>
                <button class="btn" data-action="export-data">Export backup</button>
                <label class="btn" for="importFile">Import backup</label>
                <input id="importFile" type="file" accept="application/json" hidden>
              </div>
            </div>
            ${sessions.length ? `<div class="history-list">${sessions.map(renderHistoryCard).join('')}</div>` : `<div class="empty">No saved sessions yet. Start your first workout from the Today tab.</div>`}
          </div>
        </section>
      `;
      $('#importFile')?.addEventListener('change', importData);
    }

    function renderHistoryCard(session) {
      const exercises = session.exercises || [];
      const summaryRows = exercises.filter(e => e.logs?.length).slice(0, 7).map(entry => {
        const ex = getExercise(entry.id);
        return `<div><strong>${esc(ex?.name || entry.id)}:</strong> ${esc(summarizeLogs(ex || { type:'weighted' }, entry.logs))}</div>`;
      }).join('');
      return `
        <article class="history-card">
          <div class="history-card-head">
            <div>
              <h3>${esc(session.title)} <span class="muted">• Day ${session.day}</span></h3>
              <div class="small-text">${fmtDate(session.startedAt)} at ${fmtTime(session.startedAt)} • ${session.type === 'rest' ? 'Rest' : formatDuration(session.durationMs || 0)}</div>
            </div>
            <button class="btn small danger" data-action="delete-session" data-session-id="${esc(session.id)}">Delete</button>
          </div>
          ${summaryRows ? `<div class="history-summary">${summaryRows}${exercises.filter(e => e.logs?.length).length > 7 ? '<div>…</div>' : ''}</div>` : `<div class="history-summary"><div>Rest day or no sets logged.</div></div>`}
        </article>
      `;
    }

    function deleteSession(id) {
      if (!confirm('Delete this saved session?')) return;
      state.history = state.history.filter(s => s.id !== id);
      rebuildProgressFromHistory();
      saveState();
      renderHistory();
      showToast('Session deleted.');
    }

    function renderProgress() {
      const stats = getStats();
      const prRows = getPRRows().slice(0, 12).map(pr => `
        <tr><td>${esc(pr.name)}</td><td>${esc(pr.value)}</td><td>${fmtDate(pr.date)}</td></tr>
      `).join('');
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="kicker">Coach dashboard</div>
            <h1>Progress</h1>
            <div class="stat-row">
              <div class="stat"><div class="label">Lift sessions</div><div class="value">${stats.liftSessions}</div></div>
              <div class="stat"><div class="label">Rest days logged</div><div class="value">${stats.restSessions}</div></div>
              <div class="stat"><div class="label">Total sets</div><div class="value">${stats.totalSets}</div></div>
              <div class="stat"><div class="label">Volume</div><div class="value">${Math.round(stats.totalVolume).toLocaleString()}</div></div>
            </div>
            ${renderBodySnapshotStats()}
          </div>
        </section>
        <section class="grid two" style="margin-top:16px">
          <div class="card chart-card">
            <div class="card-inner">
              <div class="section-title" style="margin-top:0"><h2 style="margin:0">Body metrics</h2></div>
              ${renderBodyChart()}
              ${renderMetricForm()}
              ${renderMetricTable()}
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <div class="section-title" style="margin-top:0"><h2 style="margin:0">Nutrition & recovery</h2></div>
              ${renderCheckinSummary()}
              ${renderDailyCheckinForm()}
            </div>
          </div>
        </section>
        <section class="card" style="margin-top:16px">
          <div class="card-inner">
            <div class="section-title" style="margin-top:0"><h2 style="margin:0">Estimated PRs</h2></div>
            ${prRows ? `<table class="set-table"><thead><tr><th>Exercise</th><th>Best</th><th>Date</th></tr></thead><tbody>${prRows}</tbody></table>` : `<div class="empty">No PRs yet. Log a few weighted workouts first.</div>`}
          </div>
        </section>
      `;
    }

    function renderBodySnapshotStats() {
      const metric = latestBodyMetric();
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      const first = metrics[0];
      const delta = metric && first && metrics.length > 1 ? Number(metric.weight) - Number(first.weight) : null;
      const bf = Number(metric?.bodyFat);
      const leanMass = metric && Number.isFinite(Number(metric.weight)) && Number.isFinite(bf)
        ? Number(metric.weight) * (1 - bf / 100)
        : null;
      return `
        <div class="body-snapshot-row stat-row">
          <div class="stat"><div class="label">Latest weight</div><div class="value">${metric ? `${esc(metric.weight)} ${esc(state.settings.units)}` : '—'}</div></div>
          <div class="stat"><div class="label">Total change</div><div class="value">${delta !== null ? `${delta >= 0 ? '+' : ''}${delta.toFixed(1)}` : '—'}</div></div>
          <div class="stat"><div class="label">Body fat</div><div class="value">${Number.isFinite(bf) ? `${cleanNumber(bf)}%` : '—'}</div></div>
          <div class="stat"><div class="label">Est. lean mass</div><div class="value">${Number.isFinite(leanMass) ? `${cleanNumber(leanMass)} ${esc(state.settings.units)}` : '—'}</div></div>
        </div>
      `;
    }

    function getStats() {
      const liftSessions = state.history.filter(s => s.type !== 'rest').length;
      const restSessions = state.history.filter(s => s.type === 'rest').length;
      let totalSets = 0;
      let totalVolume = 0;
      for (const session of state.history) {
        for (const entry of session.exercises || []) {
          for (const log of entry.logs || []) {
            if (Number.isFinite(Number(log.reps))) totalSets += 1;
            if (Number.isFinite(Number(log.weight)) && Number.isFinite(Number(log.reps))) totalVolume += Number(log.weight) * Number(log.reps);
          }
        }
      }
      const now = new Date();
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - 6);
      weekStart.setHours(0,0,0,0);
      const thisWeek = state.history.filter(s => new Date(s.startedAt) >= weekStart).length;
      return { liftSessions, restSessions, totalSets, totalVolume, thisWeek, streak: getStreak() };
    }

    function getStreak() {
      if (!state.history.length) return 0;
      const completed = new Set(state.history.map(s => {
        const d = new Date(s.startedAt); d.setHours(0,0,0,0); return d.getTime();
      }));
      let streak = 0;
      const cursor = new Date(); cursor.setHours(0,0,0,0);
      for (let i = 0; i < 365; i++) {
        if (completed.has(cursor.getTime())) streak += 1;
        else if (i === 0) { cursor.setDate(cursor.getDate() - 1); continue; }
        else break;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function getPRRows() {
      const rows = [];
      for (const [id, progress] of Object.entries(state.exerciseProgress)) {
        const ex = getExercise(id);
        if (!ex || !progress.bestSet) continue;
        if (ex.type === 'weighted') rows.push({ name: ex.name, value: `${progress.bestSet.weight}×${progress.bestSet.reps} (${Math.round(progress.bestSet.estimate)} est.)`, date: progress.bestSet.date, score: progress.bestSet.estimate });
        if (ex.type === 'bodyweight') rows.push({ name: ex.name, value: `${progress.bestSet.reps} reps`, date: progress.bestSet.date, score: progress.bestSet.reps });
      }
      return rows.sort((a,b) => b.score - a.score);
    }

    function renderBodyChart() {
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      if (metrics.length < 2) return `<div class="empty">Add body weight entries to see a trend chart.</div>`;
      const width = 640, height = 220, pad = 28;
      const weights = metrics.map(m => Number(m.weight)).filter(Number.isFinite);
      const minW = Math.min(...weights), maxW = Math.max(...weights);
      const span = Math.max(1, maxW - minW);
      const points = metrics.map((m, i) => {
        const x = pad + (i / Math.max(1, metrics.length - 1)) * (width - pad * 2);
        const y = height - pad - ((Number(m.weight) - minW) / span) * (height - pad * 2);
        return `${x},${y}`;
      }).join(' ');
      const last = metrics[metrics.length - 1];
      const first = metrics[0];
      const delta = Number(last.weight) - Number(first.weight);
      return `
        <div class="big-metric">${esc(last.weight)} ${esc(state.settings.units)}</div>
        <div class="small-text">Change: ${delta > 0 ? '+' : ''}${delta.toFixed(1)} ${esc(state.settings.units)} since ${fmtDate(first.date)}</div>
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Body weight chart">
          <polyline fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="${points}" opacity=".95"></polyline>
          ${metrics.map((m, i) => {
            const x = pad + (i / Math.max(1, metrics.length - 1)) * (width - pad * 2);
            const y = height - pad - ((Number(m.weight) - minW) / span) * (height - pad * 2);
            return `<circle cx="${x}" cy="${y}" r="5" fill="currentColor"></circle>`;
          }).join('')}
        </svg>
      `;
    }
