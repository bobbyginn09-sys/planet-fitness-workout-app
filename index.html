    function buildCoachReport() {
      const stats = getStats();
      const next = getDay();
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      const lastMetric = metrics[metrics.length - 1];
      const firstMetric = metrics[0];
      const checks = recentCheckins(7);
      const recent = [...state.history].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt)).slice(0, 6);
      const lines = [];
      lines.push('PF WORKOUT COACH v7 — COACH CHECK-IN');
      lines.push(`Generated: ${new Date().toLocaleString()}`);
      lines.push(`Next workout: Day ${next.day} — ${next.title} (${typeLabel(next)}: ${next.focus})`);
      lines.push(`Stats: ${stats.liftSessions} lift sessions, ${stats.restSessions} rest days, ${stats.thisWeek} completed in the last 7 days, ${stats.totalSets} logged sets, ${Math.round(stats.totalVolume).toLocaleString()} total volume.`);
      lines.push(`Goals: ${state.goals.dailyCalories} calories, ${state.goals.dailyProtein}g protein, ${state.goals.dailySteps.toLocaleString ? state.goals.dailySteps.toLocaleString() : state.goals.dailySteps} steps, target body fat ${state.goals.targetBodyFat}%.`);
      if (lastMetric) {
        const delta = firstMetric ? Number(lastMetric.weight) - Number(firstMetric.weight) : 0;
        const parts = [`latest ${lastMetric.weight} ${state.settings.units}`];
        if (lastMetric.bodyFat) parts.push(`body fat ${lastMetric.bodyFat}%`);
        if (lastMetric.waist) parts.push(`waist ${lastMetric.waist}`);
        if (lastMetric.skeletalMuscle) parts.push(`skeletal muscle ${lastMetric.skeletalMuscle}%`);
        if (lastMetric.muscleMass) parts.push(`muscle mass ${lastMetric.muscleMass} ${state.settings.units}`);
        if (lastMetric.visceralFat) parts.push(`visceral fat ${lastMetric.visceralFat}`);
        if (lastMetric.bmr) parts.push(`BMR ${lastMetric.bmr}`);
        lines.push(`Body metrics: ${parts.join(', ')} on ${fmtDate(lastMetric.date)}${firstMetric && metrics.length > 1 ? `; weight change ${delta >= 0 ? '+' : ''}${delta.toFixed(1)} ${state.settings.units} since ${fmtDate(firstMetric.date)}` : ''}.`);
      } else {
        lines.push('Body metrics: none logged yet.');
      }
      if (checks.length) {
        const ac = avg(checks.map(c => c.calories));
        const ap = avg(checks.map(c => c.protein));
        const as = avg(checks.map(c => c.steps));
        const ah = avg(checks.map(c => c.sleep));
        lines.push(`Nutrition/recovery last 7 days: ${checks.length} check-ins; avg calories ${ac ? Math.round(ac) : 'n/a'}, protein ${ap ? Math.round(ap) + 'g' : 'n/a'}, steps ${as ? Math.round(as).toLocaleString() : 'n/a'}, sleep ${ah ? cleanNumber(ah) + 'h' : 'n/a'}.`);
      } else {
        lines.push('Nutrition/recovery: no daily check-ins logged yet.');
      }
      lines.push('Set feel legend: 🟢 easy, 🟡 just right, 🔴 hard. WU means warm-up set ignored for recommendations.');
      lines.push('');
      lines.push('Recent sessions:');
      if (!recent.length) {
        lines.push('- No saved sessions yet.');
      } else {
        recent.forEach(session => {
          const setCount = (session.exercises || []).reduce((sum, entry) => sum + ((entry.logs || []).length), 0);
          lines.push(`- ${fmtDate(session.startedAt)} — Day ${session.day} ${session.title} (${session.type === 'rest' ? 'rest' : formatDuration(session.durationMs || 0)}), ${setCount} logs`);
          (session.exercises || []).filter(entry => entry.logs?.length).slice(0, 6).forEach(entry => {
            const ex = getExercise(entry.id) || { name: entry.id, type: 'weighted' };
            lines.push(`  • ${ex.name}: ${summarizeLogs(ex, entry.logs)}`);
          });
        });
      }
      lines.push('');
      lines.push('Next-time recommendations:');
      const recs = Object.entries(state.exerciseProgress)
        .map(([id, progress]) => ({ ex: getExercise(id), progress }))
        .filter(item => item.ex && item.progress?.note)
        .slice(0, 18);
      if (!recs.length) {
        lines.push('- None yet. Log a workout first.');
      } else {
        recs.forEach(({ ex, progress }) => {
          lines.push(`- ${ex.name}: ${progress.note}${progress.lastSummary ? ` Last: ${progress.lastSummary}.` : ''}`);
        });
      }
      lines.push('');
      lines.push('Ask: Review this and tell me what to adjust for fat loss and muscle definition.');
      return lines.join('\n');
    }

    function downloadTextFile(filename, text, type = 'text/plain') {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function shareCoachReport() {
      const report = buildCoachReport();
      if (navigator.share) {
        try {
          await navigator.share({ title: 'PF Workout Coach Check-In', text: report });
          showToast('Coach report shared.');
          return;
        } catch (err) {
          if (err && err.name === 'AbortError') return;
        }
      }
      try {
        await navigator.clipboard.writeText(report);
        showToast('Coach report copied. Paste it into ChatGPT.');
      } catch (err) {
        downloadTextFile(`pf-coach-checkin-${new Date().toISOString().slice(0,10)}.txt`, report);
        showToast('Coach report downloaded as a text file.');
      }
    }

    async function refreshAppCache() {
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter(key => key.includes('pf-workout')).map(key => caches.delete(key)));
        }
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.update().catch(() => {})));
        }
        showToast('App cache refreshed. Close and reopen the app.');
      } catch (err) {
        showToast('Could not refresh cache. Close and reopen the browser.');
      }
    }

    function exportData() {
      const payload = JSON.stringify({ exportedAt: new Date().toISOString(), app: 'PF Workout Tracker', data: state }, null, 2);
      const blob = new Blob([payload], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pf-workout-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('Backup exported.');
    }

    function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          const incoming = parsed.data || parsed;
          if (!incoming.history || !incoming.settings) throw new Error('Invalid backup');
          if (!confirm('Import this backup? It will replace the current data in this browser.')) return;
          const next = Object.assign(defaultState(), incoming);
          Object.keys(state).forEach(k => delete state[k]);
          Object.assign(state, next);
          rebuildProgressFromHistory();
          saveState();
          render();
          showToast('Backup imported.');
        } catch (err) {
          showToast('Could not import that backup file.');
        }
      };
      reader.readAsText(file);
    }

    function resetAll() {
      if (!confirm('Reset all workout history, metrics, and recommendations? Export a backup first if you want to keep it.')) return;
      const fresh = defaultState();
      Object.keys(state).forEach(k => delete state[k]);
      Object.assign(state, fresh);
      active = null;
      saveActive();
      saveState();
      currentTab = 'today';
      render();
      showToast('App reset.');
    }

    function startRestTimer(seconds) {
      stopRestTimer(false);
      rest.duration = seconds * 1000;
      rest.start = Date.now();
      rest.end = rest.start + rest.duration;
      $('#restTimerBox').classList.remove('hidden');
      rest.interval = setInterval(updateRestTimer, 250);
      updateRestTimer();
    }

    function stopRestTimer(hide = true) {
      if (rest.interval) clearInterval(rest.interval);
      rest.interval = null;
      rest.end = 0;
      if (hide) $('#restTimerBox').classList.add('hidden');
    }

    function updateRestTimer() {
      if (!rest.end) return;
      const remaining = Math.max(0, rest.end - Date.now());
      const pct = rest.duration ? (1 - remaining / rest.duration) * 100 : 100;
      $('#restTime').textContent = formatDuration(remaining, true);
      $('#restBar').style.width = `${clamp(pct, 0, 100)}%`;
      if (remaining <= 0) {
        stopRestTimer(false);
        $('#restTime').textContent = 'Done';
        $('#restBar').style.width = '100%';
        setTimeout(() => $('#restTimerBox').classList.add('hidden'), 1800);
        showToast('Rest is done.');
      }
    }

    function restartElapsedClock() {
      if (renderClock) clearInterval(renderClock);
      renderClock = setInterval(() => {
        const el = $('#elapsedTime');
        if (el && active) el.textContent = formatDuration(Date.now() - new Date(active.startedAt).getTime());
      }, 1000);
    }

    function formatDuration(ms, clock = false) {
      const total = Math.max(0, Math.round(ms / 1000));
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (clock || h === 0) return `${String(m + h * 60).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function openQuickShortcut(shortcutKey) {
      const links = Object.assign({}, defaultState().settings.quickLinks, state.settings.quickLinks || {});
      $$('[data-setting-quick]').forEach(input => {
        const key = input.dataset.settingQuick;
        if (key && input.value.trim()) links[key] = input.value.trim();
      });
      const name = links[shortcutKey];
      if (!name) {
        showToast('Shortcut name is blank. Check Settings.');
        return;
      }
      window.location.href = `shortcuts://run-shortcut?name=${encodeURIComponent(name)}`;
      showToast(`Running shortcut: ${name}`);
    }

    function handleClick(event) {
      const tabBtn = event.target.closest('[data-tab]');
      if (tabBtn) {
        currentTab = tabBtn.dataset.tab;
        render();
        return;
      }
      const btn = event.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === 'open-external-app') openExternalApp(btn.dataset.app || 'pf');
      if (action === 'reset-quick-app-links') { resetQuickAppLinks(); renderSettings(); }
      if (action === 'start-workout') startWorkout();
      if (action === 'finish-workout') finishWorkout();
      if (action === 'cancel-workout') cancelWorkout();
      if (action === 'mark-rest-complete') markRestComplete();
      if (action === 'advance-day') { state.settings.currentDayIndex = (state.settings.currentDayIndex + 1) % PLAN.length; saveState(); render(); showToast(`Next up: Day ${getDay().day} • ${getDay().title}.`); }
      if (action === 'change-current-day') return;
      if (action === 'set-current-day') { state.settings.currentDayIndex = Number(btn.dataset.dayIndex) || 0; saveState(); currentTab = 'today'; render(); showToast(`Set next workout to Day ${getDay().day}.`); }
      if (action === 'add-set') addSet(Number(btn.dataset.exerciseIndex));
      if (action === 'set-feel') setFeel(Number(btn.dataset.exerciseIndex), btn.dataset.feel);
      if (action === 'adjust-weight') adjustWeight(Number(btn.dataset.exerciseIndex), Number(btn.dataset.delta));
      if (action === 'use-last-weight') useLastSetWeight(Number(btn.dataset.exerciseIndex));
      if (action === 'clear-weight') clearDraftWeight(Number(btn.dataset.exerciseIndex));
      if (action === 'delete-set') deleteSet(Number(btn.dataset.exerciseIndex), Number(btn.dataset.setIndex));
      if (action === 'delete-session') deleteSession(btn.dataset.sessionId);
      if (action === 'save-metric') saveMetric();
      if (action === 'save-checkin') saveDailyCheckin();
      if (action === 'go-progress') { currentTab = 'progress'; render(); }
      if (action === 'save-settings') saveSettingsFromUI();
      if (action === 'export-data') exportData();
      if (action === 'share-coach-report') shareCoachReport();
      if (action === 'refresh-app-cache') refreshAppCache();
      if (action === 'reset-all') resetAll();
      if (action === 'toggle-theme') { state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark'; saveState(); render(); }
      if (action === 'start-rest-manual') startRestTimer(state.settings.restSeconds);
      if (action === 'add-rest-30') { if (!rest.end) startRestTimer(30); else rest.end += 30000; rest.duration += 30000; updateRestTimer(); }
      if (action === 'skip-rest') stopRestTimer(true);
    }

    function handleChange(event) {
      const chooser = event.target.closest('[data-action="change-current-day"]');
      if (chooser) {
        state.settings.currentDayIndex = Number(chooser.value) || 0;
        saveState();
        render();
      }
    }

    function handleInput(event) {
      const input = event.target.closest('[data-input^="weight-"]');
      if (!input || !active) return;
      const index = Number(String(input.dataset.input || '').split('-')[1]);
      if (!Number.isInteger(index) || !active.exercises[index]) return;
      const weight = Number(input.value);
      if (!Number.isFinite(weight) || weight <= 0) return;
      active.exercises[index].draftWeight = Math.round(weight * 100) / 100;
      saveActive();
      const label = $(`[data-current-weight="${index}"]`);
      if (label) label.textContent = `${cleanNumber(weight)} ${state.settings.units}`;
    }


    document.addEventListener('click', handleClick);
    document.addEventListener('change', handleChange);
    document.addEventListener('input', handleInput);

    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }

    rebuildProgressFromHistory();
    saveState();
    render();
  })();
  </script>
</body>
</html>
