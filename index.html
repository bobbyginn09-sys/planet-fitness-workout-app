<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0E1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ATLAS" />
  <title>ATLAS · Workout Coach</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="atlas-mark.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-startup-image" href="splash/launch-1170x2532.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="splash/launch-1179x2556.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="splash/launch-1290x2796.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="splash/launch-1125x2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a12;
      --bg2: #0b1120;
      --surface: #111827;
      --surface2: #182132;
      --surface3: #202b3e;
      --text: #f7f9fd;
      --muted: #9aa7bd;
      --line: rgba(255,255,255,.105);
      --purple: #8b5cf6;
      --blue: #3b82f6;
      --green: #22c55e;
      --cyan: #06b6d4;
      --orange: #f59e0b;
      --red: #fb7185;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --shadow: 0 20px 60px rgba(0,0,0,.34);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #eef2f8;
      --bg2: #f8fafc;
      --surface: #ffffff;
      --surface2: #f1f5f9;
      --surface3: #e7edf5;
      --text: #111827;
      --muted: #5f6b7e;
      --line: rgba(15,23,42,.11);
      --shadow: 0 18px 45px rgba(30,41,59,.13);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; }
    html { background: var(--bg); }
    body {
      background:
        radial-gradient(circle at 2% -8%, rgba(139,92,246,.24), transparent 31rem),
        radial-gradient(circle at 100% 0%, rgba(6,182,212,.12), transparent 27rem),
        linear-gradient(150deg, var(--bg), var(--bg2));
      color: var(--text);
      padding-bottom: calc(86px + var(--safe-bottom));
      overflow-x: hidden;
    }
    body.focus-running { overflow: hidden; padding-bottom: 0; }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; color: inherit; }
    button:disabled { opacity: .42; cursor: default; }
    input, select, textarea {
      width: 100%;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 15px;
      outline: none;
      font-size: 16px;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(139,92,246,.75);
      box-shadow: 0 0 0 4px rgba(139,92,246,.14);
    }
    h1,h2,h3,p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: clamp(34px, 9vw, 54px); line-height: .95; letter-spacing: -.058em; }
    h2 { margin-bottom: 10px; font-size: clamp(25px, 6vw, 34px); line-height: 1.02; letter-spacing: -.042em; }
    h3 { margin-bottom: 8px; font-size: 18px; letter-spacing: -.022em; }
    a { color: inherit; }
    .hidden { display: none !important; }
    .muted { color: var(--muted); }
    .eyebrow { color: var(--green); text-transform: uppercase; letter-spacing: .16em; font-size: 12px; font-weight: 900; }
    .shell { width: min(760px, calc(100% - 30px)); margin: 0 auto; }
    .app-header {
      position: sticky; top: 0; z-index: 40;
      padding-top: var(--safe-top);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(22px);
      border-bottom: 1px solid var(--line);
    }
    .header-inner { min-height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 48px; height: 48px; border-radius: 16px; flex: 0 0 auto;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      box-shadow: 0 14px 34px rgba(84,83,255,.28);
      overflow: hidden;
    }
    .brand-mark svg { width: 29px; height: 29px; }
    .brand-copy { min-width: 0; }
    .brand-title { font-weight: 920; font-size: 19px; letter-spacing: -.035em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-sub { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .version-badge { display: inline-flex; margin-left: 6px; padding: 3px 7px; border-radius: 999px; font-size: 10px; letter-spacing: .08em; color: #c8fbd7; background: rgba(34,197,94,.13); border: 1px solid rgba(34,197,94,.35); vertical-align: 2px; }
    .icon-btn {
      width: 46px; height: 46px; border-radius: 16px; display: grid; place-items: center;
      background: var(--surface2); border: 1px solid var(--line); font-size: 20px;
    }
    .main { padding: 18px 0 34px; }
    .stack { display: grid; gap: 16px; }
    .card {
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .card-pad { padding: 22px; }
    .soft-card { background: var(--surface2); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 17px; }
    .mission-card {
      position: relative;
      background:
        radial-gradient(circle at 90% 8%, rgba(6,182,212,.16), transparent 18rem),
        radial-gradient(circle at 0% 0%, rgba(139,92,246,.25), transparent 22rem),
        var(--surface);
    }
    .mission-card::after { content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit; box-shadow: inset 0 1px 0 rgba(255,255,255,.06); }
    .mission-meta { display: flex; flex-wrap: wrap; gap: 9px; margin: 16px 0; }
    .chip { display: inline-flex; align-items: center; gap: 7px; min-height: 34px; padding: 7px 11px; border-radius: 999px; background: rgba(255,255,255,.065); border: 1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 800; }
    .chip.good { color: #a7f3d0; background: rgba(34,197,94,.11); border-color: rgba(34,197,94,.28); }
    .mission-note { color: #dbe5f5; line-height: 1.55; padding: 14px 15px; background: rgba(255,255,255,.055); border-left: 4px solid var(--purple); border-radius: 16px; }
    .btn {
      min-height: 50px; border-radius: 17px; padding: 13px 17px;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      background: var(--surface2); border: 1px solid var(--line); font-weight: 880; text-decoration: none;
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:active { transform: scale(.985); }
    .btn.primary { background: linear-gradient(135deg, var(--purple), #2863ef); color: #fff; border: 0; box-shadow: 0 18px 38px rgba(91,71,230,.3); }
    .btn.green { background: linear-gradient(135deg, var(--green), var(--cyan)); color: #fff; border: 0; }
    .btn.danger { color: #ffd5dc; background: rgba(251,113,133,.12); border-color: rgba(251,113,133,.28); }
    .btn.ghost { background: transparent; }
    .btn.small { min-height: 40px; padding: 9px 12px; border-radius: 14px; font-size: 13px; }
    .btn.block { width: 100%; }
    .button-row { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 11px; }
    .button-row.one { grid-template-columns: 1fr; }
    .mini-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 11px; }
    .metric { padding: 16px; border-radius: 21px; background: var(--surface2); border: 1px solid var(--line); min-width:0; }
    .metric-label { color: var(--muted); font-size: 12px; font-weight: 790; }
    .metric-value { margin-top: 5px; font-size: 28px; font-weight: 940; letter-spacing: -.045em; overflow-wrap:anywhere; }
    .metric-sub { color: var(--muted); margin-top: 3px; font-size: 12px; line-height: 1.35; }
    .section-head { display:flex; align-items:end; justify-content:space-between; gap:12px; margin: 8px 2px 12px; }
    .section-head h2,.section-head h3 { margin:0; }
    .coach-brief { display:grid; gap:10px; }
    .coach-line { display:grid; grid-template-columns: 32px 1fr; gap:11px; align-items:start; padding:12px 0; border-bottom:1px solid var(--line); }
    .coach-line:last-child { border-bottom:0; padding-bottom:0; }
    .coach-line:first-child { padding-top:0; }
    .coach-icon { width:32px;height:32px;border-radius:12px;display:grid;place-items:center;background:rgba(139,92,246,.15); }
    .coach-line strong { display:block; margin-bottom:3px; }
    .week-strip { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:7px; }
    .day-cell { min-height:66px; border-radius:17px; display:grid; place-items:center; align-content:center; gap:4px; background:var(--surface2); border:1px solid var(--line); color:var(--muted); font-size:11px; font-weight:850; }
    .day-cell.done { background:rgba(34,197,94,.14); border-color:rgba(34,197,94,.38); color:#d8ffe4; }
    .day-cell.today { outline:2px solid rgba(139,92,246,.62); outline-offset:1px; }
    .day-cell b { font-size:16px; color:var(--text); }
    .quick-launch { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .quick-launch button { min-height:58px; border-radius:19px; background:var(--surface2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:10px; font-weight:900; }
    .quick-launch button:first-child { background:linear-gradient(135deg,rgba(34,197,94,.9),rgba(6,182,212,.9)); color:#fff; border:0; }
    .bottom-nav {
      position:fixed; left:0; right:0; bottom:0; z-index:60;
      padding: 9px 10px calc(9px + var(--safe-bottom));
      background: color-mix(in srgb, var(--bg) 90%, transparent); backdrop-filter:blur(24px); border-top:1px solid var(--line);
    }
    .nav-inner { width:min(760px,100%); margin:0 auto; display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:5px; }
    .nav-btn { min-height:60px; border-radius:18px; background:transparent; color:var(--muted); display:grid; place-items:center; align-content:center; gap:4px; font-size:11px; font-weight:850; }
    .nav-btn span:first-child { font-size:21px; line-height:1; }
    .nav-btn.active { color:var(--text); background:var(--surface2); border:1px solid var(--line); }
    .plan-day { display:grid; grid-template-columns:52px 1fr auto; gap:13px; align-items:center; padding:15px; border-radius:22px; background:var(--surface2); border:1px solid var(--line); }
    .plan-num { width:52px;height:52px;border-radius:17px;display:grid;place-items:center;font-weight:940;background:rgba(139,92,246,.14);color:#ddd2ff; }
    .plan-day.rest .plan-num { background:rgba(34,197,94,.12);color:#bff5cd; }
    .plan-day h3 { margin:0 0 3px; }
    .plan-day .tag { font-size:11px;color:var(--muted);font-weight:800; }
    .preview-exercise { display:grid; gap:4px; padding:14px 0; border-bottom:1px solid var(--line); }
    .preview-exercise:last-child { border-bottom:0; }
    .preview-top { display:flex; justify-content:space-between; gap:10px; align-items:start; }
    .target-pill { white-space:nowrap; padding:5px 9px; border-radius:999px; background:rgba(139,92,246,.14); color:#dcd2ff; font-size:11px; font-weight:900; }
    .history-card { border-radius:24px; background:var(--surface2); border:1px solid var(--line); overflow:hidden; }
    .history-card summary { list-style:none; padding:17px; cursor:pointer; }
    .history-card summary::-webkit-details-marker { display:none; }
    .history-top { display:flex; align-items:start; justify-content:space-between; gap:12px; }
    .history-stats { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .history-body { border-top:1px solid var(--line); padding:17px; display:grid; gap:12px; }
    .history-ex { padding:12px 0; border-bottom:1px solid var(--line); }
    .history-ex:last-child { border-bottom:0; }
    .set-inline { display:flex; flex-wrap:wrap; gap:7px; margin-top:7px; }
    .set-chip { padding:6px 9px; border-radius:11px; background:rgba(255,255,255,.06); border:1px solid var(--line); font-size:12px; color:#dfe7f6; }
    .set-chip.wu { opacity:.6; }
    .chart-card { padding:18px; background:var(--surface2); border:1px solid var(--line); border-radius:24px; }
    .chart-wrap { width:100%; height:190px; margin-top:12px; }
    .chart-wrap svg { width:100%; height:100%; overflow:visible; }
    .chart-empty { display:grid;place-items:center;height:160px;color:var(--muted);text-align:center; }
    .form-grid { display:grid; gap:12px; }
    .field label { display:block;color:var(--muted);font-size:12px;font-weight:800;margin:0 0 6px 3px; }
    details.setting { background:var(--surface2);border:1px solid var(--line);border-radius:22px;overflow:hidden; }
    details.setting summary { list-style:none;cursor:pointer;padding:17px;font-weight:900;display:flex;justify-content:space-between;gap:12px; }
    details.setting summary::-webkit-details-marker { display:none; }
    .setting-body { border-top:1px solid var(--line);padding:17px;display:grid;gap:13px; }
    .empty { padding:24px;text-align:center;color:var(--muted);background:var(--surface2);border:1px dashed var(--line);border-radius:21px; }
    .toast { position:fixed;left:50%;bottom:calc(92px + var(--safe-bottom));transform:translate(-50%,20px);z-index:120;max-width:min(430px,calc(100% - 32px));padding:12px 16px;border-radius:16px;background:#05070d;color:#fff;border:1px solid rgba(255,255,255,.13);box-shadow:0 18px 55px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s ease;font-weight:800;text-align:center; }
    .toast.show { opacity:1;transform:translate(-50%,0); }

    /* Focus workout mode */
    .focus-shell { position:fixed;inset:0;z-index:100;background:linear-gradient(155deg,#05070d,#0b1120 60%,#0b0e18);display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;padding-top:var(--safe-top); }
    .focus-header { min-height:66px;padding:10px 14px;display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,.08); }
    .focus-close,.focus-menu { width:44px;height:44px;border-radius:15px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;font-size:18px; }
    .focus-title { min-width:0;text-align:center; }
    .focus-title strong { display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px; }
    .focus-title span { color:#9aa7bd;font-size:12px; }
    .focus-elapsed { font-variant-numeric:tabular-nums;font-size:13px;font-weight:900; }
    .focus-progress { padding:10px 17px 8px; }
    .focus-progress-top { display:flex;justify-content:space-between;gap:10px;color:#aab5c9;font-size:12px;font-weight:800;margin-bottom:8px; }
    .progress-track { height:6px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden; }
    .progress-fill { height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),var(--blue),var(--cyan));transition:width .25s ease; }
    .exercise-stage { min-height:0;padding:6px 14px 10px;touch-action:pan-y; }
    .exercise-focus-card { height:100%;max-width:680px;margin:0 auto;background:linear-gradient(160deg,rgba(255,255,255,.09),rgba(255,255,255,.045));border:1px solid rgba(255,255,255,.12);border-radius:30px;box-shadow:0 26px 70px rgba(0,0,0,.42);overflow:hidden;animation:cardIn .22s ease; }
    @keyframes cardIn { from{opacity:.2;transform:translateX(18px) scale(.985)} to{opacity:1;transform:none} }
    .exercise-scroll { height:100%;overflow-y:auto;overscroll-behavior:contain;padding:20px 19px 26px;scrollbar-width:none; }
    .exercise-scroll::-webkit-scrollbar { display:none; }
    .exercise-number { color:#9aa7bd;text-transform:uppercase;letter-spacing:.13em;font-size:11px;font-weight:900; }
    .exercise-title { font-size:clamp(30px,8vw,44px);line-height:.95;letter-spacing:-.055em;margin:8px 0 7px; }
    .exercise-target { color:#c5cede;font-size:14px; }
    .exercise-head-tap { display:block; background:none; border:0; padding:0; text-align:left; color:inherit; }
    .exercise-head-tap small { display:block; margin-top:7px; color:#7aa2ff; font-size:11px; font-weight:800; letter-spacing:.02em; }
    .exercise-note-chip { margin-top:10px; display:inline-flex; align-items:center; gap:8px; padding:8px 10px; border-radius:14px; background:rgba(37,99,255,.11); border:1px solid rgba(96,165,250,.22); color:#d8e5ff; font-size:12px; font-weight:700; max-width:100%; }
    .exercise-note-chip.empty { color:#9aa7bd; background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.09); }
    .exercise-note-chip strong { color:#fff; }
    .previous-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-top:10px; }
    .previous-stat { padding:10px 11px; border-radius:14px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); }
    .previous-stat span { display:block; color:#8ea0b8; font-size:10px; text-transform:uppercase; letter-spacing:.08em; font-weight:900; }
    .previous-stat strong { display:block; margin-top:6px; color:#fff; font-size:14px; line-height:1.2; }
    .warm-compact { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:10px; padding:9px 11px; border-radius:14px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); }
    .warm-compact span { display:block; color:#dfe7f6; font-size:12px; font-weight:800; }
    .warm-compact small { display:block; margin-top:3px; color:#8ea0b8; font-size:10px; font-weight:600; line-height:1.25; }
    .warm-compact input { width:18px; height:18px; accent-color:var(--purple); }
    .exercise-hero { display:grid; grid-template-columns:108px 1fr; gap:14px; align-items:center; }
    .exercise-hero-visual { height:108px; border-radius:24px; background:linear-gradient(145deg,rgba(37,99,255,.16),rgba(124,58,237,.14)); border:1px solid rgba(96,165,250,.24); display:grid; place-items:center; overflow:hidden; }
    .exercise-hero-visual svg { width:88px; height:88px; }
    .exercise-hero-visual { position:relative; }
    .exercise-hero-visual::after { content:"Animated guide"; position:absolute; left:8px; bottom:7px; padding:4px 7px; border-radius:999px; background:rgba(4,8,15,.72); color:#bcd0ff; font-size:8px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; border:1px solid rgba(255,255,255,.08); }
    .exercise-hero-visual svg { transform-origin:center; animation:exerciseGuideMove 2.2s ease-in-out infinite; }
    .exercise-hero-visual svg circle { transform-box:fill-box; transform-origin:center; animation:exerciseGuidePulse 2.2s ease-in-out infinite; }
    @keyframes exerciseGuideMove { 0%,100%{transform:translateY(1px) scale(.985)} 50%{transform:translateY(-3px) scale(1.015)} }
    @keyframes exerciseGuidePulse { 0%,100%{opacity:.74} 50%{opacity:1} }
    .set-reference-row { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px; margin:7px 0 2px; }
    .set-reference { padding:8px 9px; border-radius:12px; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.075); min-width:0; }
    .set-reference span { display:block; color:#8390a5; font-size:9px; font-weight:900; text-transform:uppercase; letter-spacing:.07em; }
    .set-reference strong { display:block; margin-top:4px; color:#eff4ff; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .prefill-badge { display:inline-flex; align-items:center; gap:5px; margin-top:5px; color:#9ec0ff; font-size:10px; font-weight:850; }
    .prefill-badge::before { content:"↗"; }
    .exercise-hero-copy p { margin:8px 0 0; color:#c9d6e8; font-size:13px; line-height:1.45; }
    .cue-steps { margin:10px 0 0; padding-left:18px; color:#d6deea; font-size:13px; line-height:1.45; }
    .cue-steps li + li { margin-top:7px; }
    .sheet-meta-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .sheet-chip { padding:7px 10px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); color:#d6ddeb; font-size:11px; font-weight:800; }
    .sheet-section-title { display:block; color:#fff; font-size:14px; font-weight:900; margin-bottom:5px; }
    .previous-card { margin-top:16px;padding:14px;border-radius:20px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.09); }
    .previous-head { display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px; }
    .previous-head strong { font-size:13px; }
    .previous-date { color:#8f9bb0;font-size:11px; }

    /* ATLAS 2.5.1 — premium motion and tactile polish */
    #view.view-enter { animation: atlasViewIn .32s cubic-bezier(.2,.8,.2,1) both; }
    @keyframes atlasViewIn { from { opacity:0; transform:translateY(8px) scale(.995); } to { opacity:1; transform:none; } }
    .btn,.icon-btn,.mini-action,.nav-btn,.weight-add,.quick-square button,.plan-week-tabs button {
      transition: transform .16s ease, filter .16s ease, border-color .2s ease, background-color .2s ease, box-shadow .2s ease;
      touch-action: manipulation;
    }
    .btn:active,.icon-btn:active,.mini-action:active,.weight-add:active,.quick-square button:active,.plan-week-tabs button:active { transform:scale(.965); filter:brightness(.94); }
    .nav-btn:active { transform:translateY(1px) scale(.96); }
    .btn.primary { box-shadow:0 12px 30px rgba(67,83,255,.24), inset 0 1px 0 rgba(255,255,255,.2); }
    .btn.primary:hover { box-shadow:0 16px 38px rgba(67,83,255,.32), inset 0 1px 0 rgba(255,255,255,.22); }
    .today-card { position:relative; isolation:isolate; }
    .today-card::after { content:"";position:absolute;inset:auto -18% -42% 28%;height:62%;z-index:-1;background:radial-gradient(circle,rgba(91,74,255,.22),transparent 67%);pointer-events:none; }
    .today-mark { position:relative; overflow:hidden; }
    .today-mark::after { content:"";position:absolute;inset:-45%;background:linear-gradient(115deg,transparent 36%,rgba(255,255,255,.20) 50%,transparent 64%);transform:translateX(-55%) rotate(8deg);animation:atlasSheen 5.5s ease-in-out infinite; }
    @keyframes atlasSheen { 0%,62%{transform:translateX(-65%) rotate(8deg)} 82%,100%{transform:translateX(65%) rotate(8deg)} }
    .today-mark svg { width:62%;height:62%;filter:drop-shadow(0 6px 13px rgba(60,99,255,.35)); }
    .brand-mark img { image-rendering:auto;filter:drop-shadow(0 4px 8px rgba(64,93,255,.26));transform:translateZ(0); }
    .week-dots i { transform:scale(.82); transition:transform .25s cubic-bezier(.2,.8,.2,1), background .25s ease, box-shadow .25s ease; }
    .week-dots i.done { transform:scale(1);box-shadow:0 0 0 3px rgba(34,197,94,.08),0 0 12px rgba(34,197,94,.36); }
    .week-dots i.today { transform:scale(1.08);animation:atlasPulse 2.4s ease-in-out infinite; }
    @keyframes atlasPulse { 0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.25)} 50%{box-shadow:0 0 0 5px rgba(59,130,246,0)} }
    .card,.coach-compact,.snapshot-card { transition:border-color .22s ease,transform .22s ease,box-shadow .22s ease; }
    @media (hover:hover) { .card:hover,.coach-compact:hover,.snapshot-card:hover { border-color:rgba(91,124,255,.28);transform:translateY(-1px); } }
    .completion-burst { animation:completionPop .5s cubic-bezier(.2,.9,.2,1) both; }
    @keyframes completionPop { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
    @media (prefers-reduced-motion: reduce) { * { scroll-behavior:auto !important;animation:none !important;transition:none !important; } }


    /* =========================================================
       ATLAS 2.5.1 — professional brand + iPhone-first layout
       ========================================================= */
    :root {
      --bg:#0E1117; --bg2:#080B12; --surface:#141A25; --surface2:#1A1F2B; --surface3:#222A38;
      --text:#F7F9FC; --muted:#8B95A7; --line:rgba(139,149,167,.18);
      --blue:#2563FF; --purple:#7C3AED; --green:#22C55E; --cyan:#18BDEB; --orange:#F59E0B; --red:#EF4444;
      --brand-gradient:linear-gradient(115deg,#2563FF 0%,#4D65FF 48%,#7C3AED 100%);
      --shadow:0 18px 50px rgba(0,0,0,.34); --header-h:62px; --nav-h:72px;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display",Inter,system-ui,sans-serif;
    }
    :root[data-theme="light"] { --bg:#F3F6FB;--bg2:#FFFFFF;--surface:#FFFFFF;--surface2:#EDF1F7;--surface3:#E4EAF2;--text:#0E1117;--muted:#667085;--line:rgba(14,17,23,.12); }
    body { background:radial-gradient(circle at 10% -8%,rgba(37,99,255,.17),transparent 26rem),radial-gradient(circle at 100% 8%,rgba(124,58,237,.11),transparent 24rem),linear-gradient(165deg,var(--bg),var(--bg2)); padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px); }
    h1,h2,h3 { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,system-ui,sans-serif; }
    h1 { letter-spacing:-.055em; }
    .shell { width:min(680px,calc(100% - 24px)); }
    .app-header { background:color-mix(in srgb,var(--bg) 91%,transparent); border-color:rgba(139,149,167,.12); }
    .header-inner { min-height:var(--header-h); }
    .brand { gap:10px; }
    .brand-mark { width:40px;height:40px;border-radius:13px;padding:4px;background:linear-gradient(145deg,#131B2B,#090D16);border:1px solid rgba(139,149,167,.2);box-shadow:0 10px 26px rgba(37,99,255,.14); }
    .brand-mark img { width:100%;height:100%;object-fit:contain; }
    .brand-title { font-size:19px;letter-spacing:.15em;font-weight:900; }
    .brand-sub { font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted); }
    .version-badge { margin-left:5px;padding:2px 6px;font-size:9px;letter-spacing:.06em;color:#AFC4FF;background:rgba(37,99,255,.1);border-color:rgba(37,99,255,.28);vertical-align:3px; }
    .icon-btn { width:40px;height:40px;border-radius:13px;background:var(--surface2); }
    .icon-btn svg { width:21px;height:21px;fill:currentColor; }
    .main { padding:12px 0 24px; }
    .card { background:linear-gradient(155deg,color-mix(in srgb,var(--surface) 96%,transparent),color-mix(in srgb,var(--surface2) 76%,transparent));border-radius:24px; }
    .card-pad { padding:18px; }
    .btn { border-radius:15px;min-height:48px; }
    .btn.primary { background:var(--brand-gradient);box-shadow:0 14px 30px rgba(72,78,244,.25); }
    .btn.subtle { background:var(--surface2);border-color:var(--line); }
    .eyebrow,.section-kicker { color:var(--blue);font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.14em; }

    /* Home — one-screen dashboard on modern iPhones */
    .home-screen { min-height:calc(100dvh - var(--safe-top) - var(--safe-bottom) - var(--header-h) - var(--nav-h) - 34px);display:flex;flex-direction:column;gap:11px; }
    .home-greeting { display:flex;align-items:flex-end;justify-content:space-between;padding:2px 3px 1px; }
    .home-greeting span { color:var(--muted);font-size:13px; }
    .home-greeting h1 { font-size:31px;line-height:1;margin:3px 0 0; }
    .home-status { padding:6px 10px;border-radius:999px;color:#A7F3D0;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.26);font-size:11px!important;font-weight:850; }
    .home-status.rest { color:#BFD4FF;background:rgba(37,99,255,.1);border-color:rgba(37,99,255,.25); }
    .today-card { position:relative;overflow:hidden;padding:18px;border:1px solid rgba(91,111,255,.25);border-radius:25px;background:radial-gradient(circle at 100% 0%,rgba(124,58,237,.22),transparent 15rem),radial-gradient(circle at 0 100%,rgba(37,99,255,.17),transparent 17rem),linear-gradient(155deg,#151C29,#10151F);box-shadow:var(--shadow); }
    .today-card::after { content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.06); }
    .today-card-top { display:flex;justify-content:space-between;gap:16px;align-items:flex-start; }
    .today-card h2 { font-size:39px;line-height:.96;margin:7px 0 6px;letter-spacing:-.055em; }

    .today-mark { width:61px;height:61px;border-radius:19px;padding:8px;background:rgba(4,8,17,.42);border:1px solid rgba(255,255,255,.08); }
    .today-mark img { width:100%;height:100%; }
    .today-meta { display:flex;align-items:center;gap:8px;color:#A7B1C1;font-size:11px;font-weight:750;margin:15px 0 14px;white-space:nowrap; }
    .today-meta i { width:3px;height:3px;border-radius:50%;background:#566175; }
    .today-actions { display:grid;grid-template-columns:1fr;gap:8px; }
    .today-actions.two { grid-template-columns:.92fr 1.18fr; }
    .today-actions .btn { min-height:51px;font-weight:900; }
    .today-actions .btn span { margin-left:auto; }
    .coach-compact { padding:14px 15px;border-radius:21px;background:var(--surface);border:1px solid var(--line); }
    .compact-head { display:flex;align-items:center;justify-content:space-between;gap:12px; }
    .compact-head strong { display:block;margin-top:3px;font-size:14px; }
    .mini-action { width:35px;height:35px;border-radius:12px;background:rgba(37,99,255,.1);border:1px solid rgba(37,99,255,.25);color:#8CB2FF;font-size:17px; }
    .coach-compact-list { display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px; }
    .coach-compact-list>div { display:grid;grid-template-columns:24px 1fr;gap:7px;align-items:start;min-width:0; }
    .coach-compact-list>div>span { width:23px;height:23px;border-radius:8px;display:grid;place-items:center;color:#A7C3FF;background:rgba(37,99,255,.11);font-size:10px;font-weight:900; }
    .coach-compact-list p { margin:1px 0 0;color:#B2BCCB;font-size:11px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .home-bottom-grid { display:grid;grid-template-columns:1fr 1fr 65px;gap:9px;min-height:92px; }
    .snapshot-card { min-width:0;text-align:left;padding:13px;border-radius:19px;background:var(--surface);border:1px solid var(--line);color:var(--text); }
    button.snapshot-card { display:block;width:100%; }
    .snapshot-card>span { color:var(--muted);font-size:10px;font-weight:750; }
    .snapshot-card>strong { display:block;font-size:24px;line-height:1.05;margin-top:5px;letter-spacing:-.045em; }
    .snapshot-card strong small { font-size:12px;color:var(--muted); }
    .snapshot-card>small { display:block;color:var(--muted);font-size:9px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .weight-card { position:relative;padding:0;overflow:hidden;display:grid;grid-template-columns:minmax(0,1fr) 42px;align-items:stretch; }
    .weight-summary { min-width:0;text-align:left;padding:13px 6px 13px 13px;color:var(--text); }
    .weight-summary>span { display:block;color:var(--muted);font-size:10px;font-weight:750; }
    .weight-summary>strong { display:block;font-size:24px;line-height:1.05;margin-top:5px;letter-spacing:-.045em; }
    .weight-summary>small { display:block;color:var(--muted);font-size:9px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .weight-add { align-self:stretch;margin:7px 7px 7px 0;border-radius:13px;background:rgba(37,99,255,.12);border:1px solid rgba(37,99,255,.35);color:#86A8FF;font-size:24px;font-weight:500;display:grid;place-items:center; }
    .weight-add:active { transform:scale(.96);background:rgba(37,99,255,.2); }
    .body-quick-sheet .form-grid { margin-top:12px; }
    .body-quick-sheet .mini-grid { grid-template-columns:repeat(2,minmax(0,1fr));gap:9px; }
    .body-quick-sheet .field label { font-size:10px; }
    .body-quick-sheet input { min-height:46px; }
    .week-dots { display:flex;gap:4px;margin-top:9px; }
    .week-dots i { width:8px;height:8px;border-radius:50%;background:#303746; }

    .week-dots i.today { outline:1px solid var(--blue);outline-offset:2px; }

    /* Workout preview */

    .brief-stats span { padding:6px 9px;border-radius:999px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-size:10px;font-weight:800; }
    .brief-note { display:grid;grid-template-columns:72px 1fr;gap:9px;align-items:start;padding:11px 12px;border-radius:15px;background:rgba(37,99,255,.07);border:1px solid rgba(37,99,255,.14);font-size:11px;line-height:1.4; }

    .plan-exercise-row:last-child { border-bottom:0; }
    .plan-exercise-row>span { width:26px;height:26px;border-radius:9px;display:grid;place-items:center;background:rgba(37,99,255,.1);color:#9DBAFF;font-size:10px;font-weight:900; }

    /* Full-screen Focus Mode — no vertical scrolling */

    .focus-shell { height:100dvh;grid-template-rows:56px 14px minmax(0,1fr) calc(64px + var(--safe-bottom));padding-top:var(--safe-top);background:radial-gradient(circle at 50% -12%,rgba(37,99,255,.13),transparent 22rem),linear-gradient(165deg,#080B12,#0E1117 62%,#0A0E17); }
    .focus-header { min-height:56px;padding:7px 12px;border-bottom:0;grid-template-columns:42px 1fr 42px; }

    .focus-close { font-size:24px;font-weight:300; }
    .focus-menu { font-size:15px; }
    .focus-title strong { font-size:13px; }
    .focus-title span { font-size:10px; }

    const $ = (selector, scope = document) => scope.querySelector(selector);

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const base = defaultState();
        const merged = { ...base, ...parsed };
        merged.settings = { ...base.settings, ...(parsed.settings || {}) };
        merged.goals = { ...base.goals, ...(parsed.goals || {}) };
        merged.history = Array.isArray(parsed.history) ? parsed.history : [];
        merged.bodyMetrics = Array.isArray(parsed.bodyMetrics) ? parsed.bodyMetrics : [];
        merged.dailyCheckins = Array.isArray(parsed.dailyCheckins) ? parsed.dailyCheckins : [];
        merged.exerciseProgress = parsed.exerciseProgress || {};
        return merged;
      } catch (error) {
        console.warn('State load failed', error);
        return defaultState();
      }
    }

    function loadActive() {
      try {
        const raw = localStorage.getItem(ACTIVE_KEY);
        if (!raw) return null;
        const session = JSON.parse(raw);
        session.currentExerciseIndex = Number.isFinite(Number(session.currentExerciseIndex)) ? Number(session.currentExerciseIndex) : 0;
        session.sessionNote = session.sessionNote || '';
        session.exercises = Array.isArray(session.exercises) ? session.exercises.map(entry => ({
          id: entry.id,
          logs: Array.isArray(entry.logs) ? entry.logs : [],
          notes: entry.notes || '',
          draftWeight: Number.isFinite(Number(entry.draftWeight)) ? Number(entry.draftWeight) : null,
          draftReps: Number.isFinite(Number(entry.draftReps)) ? Number(entry.draftReps) : null,
          draftFeel: ['easy','good','hard'].includes(entry.draftFeel) ? entry.draftFeel : 'good',
          draftWarmup: Boolean(entry.draftWarmup)
        })) : [];
        return session;
      } catch (error) {
        console.warn('Active session load failed', error);
        return null;
      }
    }

    function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (error) { console.warn('State save unavailable', error); } updateChrome(); }
    function saveActive() { try { if(active) localStorage.setItem(ACTIVE_KEY, JSON.stringify(active)); else localStorage.removeItem(ACTIVE_KEY); } catch (error) { console.warn('Active session save unavailable', error); } }
    function getDay(index = state.settings.currentDayIndex) { return PLAN[((Number(index)||0)+PLAN.length)%PLAN.length]; }
    function getExercise(id) { for (const day of PLAN) { const ex = day.exercises.find(item => item.id===id); if(ex) return ex; } return null; }
    function targetLabel(ex) { return (ex.type==='cardio'||ex.type==='timed') ? `${ex.min}–${ex.max} ${ex.unit||'min'}` : `${ex.sets} × ${ex.min}–${ex.max}`; }
    function feelEmoji(feel) { return feel==='easy'?'🟢':feel==='hard'?'🔴':'🟡'; }
    function workingLogs(logs=[]) { return logs.filter(log => !log.warmup); }
    function latestBodyMetric() { return [...state.bodyMetrics].sort((a,b)=>new Date(a.date)-new Date(b.date)).at(-1) || null; }
    function roundTo(value, increment=5) { return Math.round(Number(value)/increment)*increment; }
    function formatDuration(ms) { const total=Math.max(0,Math.floor(Number(ms||0)/1000)); const h=Math.floor(total/3600),m=Math.floor((total%3600)/60),s=total%60; return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`; }
    function estimatedMinutes(day) {
      if(day.type==='rest') return 25;
      const working = day.exercises.reduce((sum,ex)=>sum + (ex.type==='weighted'||ex.type==='bodyweight'?ex.sets:0),0);
      const cardio = day.exercises.filter(ex=>ex.type==='cardio'||ex.type==='timed').reduce((sum,ex)=>sum+ex.min,0);
      return Math.round(8 + working*2.15 + cardio);
    }

      return `<img src="atlas-mark.svg" alt="" />`;

    function haptic(kind='light') {
      try {
        if(!navigator.vibrate) return;
        const pattern=kind==='success'?[35,45,70]:kind==='medium'?[28]:[12];
        navigator.vibrate(pattern);
      } catch(_) {}
    }
    function animateView() {
      const view=$('#view'); if(!view) return;
      view.classList.remove('view-enter'); void view.offsetWidth; view.classList.add('view-enter');
    }
    function greeting() { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }

    function updateChrome() {
      document.documentElement.dataset.theme = state.settings.theme || 'dark';
      const day=getDay();
      const sub=$('#headerSub');
      if(sub) sub.textContent = active ? `${day.title} in progress` : 'Built for progress.';

      $('#bottomNav')?.classList.toggle('hidden', focus || currentView==='complete');

    }

    function render() {
      updateChrome();
      if(currentView==='home') renderHome();
      else if(currentView==='workout') active ? renderFocusWorkout() : renderWorkoutPreview();
      else if(currentView==='progress') renderProgress();
      else if(currentView==='plan') renderPlan();
      else if(currentView==='more') renderMore();
      else if(currentView==='complete') renderCompletion();
      animateView();
      window.scrollTo({top:0,behavior:'instant'});

    function stats() {
      const liftSessions=state.history.filter(s=>s.type!=='rest');
      const restDays=state.history.filter(s=>s.type==='rest').length;
      const totalSets=liftSessions.reduce((sum,s)=>sum+(s.exercises||[]).reduce((a,e)=>a+workingLogs(e.logs||[]).length,0),0);
      const totalVolume=liftSessions.reduce((sum,s)=>sum+sessionVolume(s),0);
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-6);cutoff.setHours(0,0,0,0);
      const thisWeek=state.history.filter(s=>new Date(s.startedAt)>=cutoff).length;
      return {liftSessions:liftSessions.length,restDays,totalSets,totalVolume,thisWeek,streak:calculateStreak()};
    }

    function calculateStreak() {
      const dates=new Set(state.history.map(s=>dateKey(s.startedAt)));
      let cursor=new Date(); let count=0;
      if(!dates.has(dateKey(cursor))) cursor.setDate(cursor.getDate()-1);
      while(dates.has(dateKey(cursor))){count++;cursor.setDate(cursor.getDate()-1);} return count;
    }

    function sessionVolume(session) {
      let total=0;
      for(const entry of session.exercises||[]){
        const ex=getExercise(entry.id); if(!ex||ex.type!=='weighted') continue;
        for(const log of workingLogs(entry.logs||[])){ const w=Number(log.weight),r=Number(log.reps); if(Number.isFinite(w)&&Number.isFinite(r)) total+=w*r; }
      }
      return Math.round(total);
    }

    function sessionWorkingSets(session) { return (session.exercises||[]).reduce((sum,e)=>sum+workingLogs(e.logs||[]).length,0); }
    function sessionCardioMinutes(session) { let total=0; for(const e of session.exercises||[]){ const ex=getExercise(e.id); if(ex&&(ex.type==='cardio'||ex.type==='timed')) for(const log of e.logs||[]) total += Number(log.duration)||0; } return Math.round(total*100)/100; }

    function coachBriefItems(day) {
      if(day.type==='rest') return ['Optional walk: keep the pace conversational.', 'Mobility is enough; finish feeling better than you started.'];
      const items=[];
      for(const ex of day.exercises.filter(ex=>ex.type==='weighted'||ex.type==='bodyweight')){
        const note=state.exerciseProgress[ex.id]?.note;
        if(note) items.push(`${ex.name}: ${note}`);
        if(items.length===2) break;
      }
      if(!items.length) items.push('Use clean working sets and leave 1–2 reps in reserve.', 'Keep the same working weight across your counted sets.');
      if(items.length===1) items.push('Finish with the planned cardio at a controlled pace.');
      return items;
    }

      return coachBriefItems(day).map((text,i)=>`<div class="coach-line"><div class="coach-icon">${i+1}</div><div><span class="muted">${esc(text)}</span></div></div>`).join('');

    function renderQuickLaunch() { return `<div class="quick-launch"><button data-action="open-app" data-app="pf"><span class="quick-badge">PF</span><span>Planet Fitness</span></button><button data-action="open-app" data-app="music"><span class="quick-badge">♫</span><span>Apple Music</span></button></div>`; }

    function renderWeekDots() {
      const today=new Date();today.setHours(0,0,0,0);const done=new Set(state.history.map(s=>dateKey(s.startedAt)));let out='';
      for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);out+=`<i class="${done.has(dateKey(d))?'done':''} ${i===0?'today':''}"></i>`;}
      return out;
    }

    function renderWeekStrip() {
      const today=new Date();today.setHours(0,0,0,0);
      const done=new Map();
      state.history.forEach(s=>done.set(dateKey(s.startedAt),s.type==='rest'?'rest':'lift'));
      let html='';
      for(let i=6;i>=0;i--){const d=new Date(today);d.setDate(today.getDate()-i);const key=dateKey(d), status=done.get(key);html+=`<div class="day-cell ${status?'done':''} ${i===0?'today':''}"><span>${d.toLocaleDateString(undefined,{weekday:'short'}).slice(0,2)}</span><b>${d.getDate()}</b><span>${status==='rest'?'☁️':status?'✓':'·'}</span></div>`;}

    }

    function renderWorkoutPreview() {
      const day=getDay();
      $('#view').innerHTML=`<div class="stack workout-preview-v21">
        <section class="card workout-brief-card"><div class="card-pad">
          <div class="workout-brief-top"><div><div class="eyebrow">Day ${day.day} of 7</div><h1>${esc(day.title)}</h1><p>${esc(day.focus)}</p></div><div class="brief-logo"><img src="atlas-mark.svg" alt=""></div></div>
          <div class="brief-stats"><span>${estimatedMinutes(day)} min</span><span>${day.exercises.length} exercises</span><span>${day.type==='rest'?'Recovery':'Lift day'}</span></div>

          <div class="today-actions ${day.type==='rest'?'two':''}">${day.type==='rest'?'<button class="btn subtle" data-action="mark-rest">Mark rest day</button>':''}<button class="btn primary" data-action="start-workout">${day.type==='rest'?'Start optional recovery':'Start workout'}<span>→</span></button></div>
        </div></section>
        <details class="card workout-list-collapsed"><summary><div><strong>Workout plan</strong><span>${day.exercises.length} exercises · tap to view</span></div><span>⌄</span></summary><div class="workout-list-body">${day.exercises.map((ex,i)=>`<div class="plan-exercise-row"><span>${i+1}</span><div><strong>${esc(ex.name)}</strong><small>${esc(ex.equipment||'')}</small></div><b>${esc(targetLabel(ex))}</b></div>`).join('')}</div></details>
        <div class="day-selector-row"><label>Choose day</label><select data-action="change-day">${PLAN.map((d,i)=>`<option value="${i}" ${i===state.settings.currentDayIndex?'selected':''}>Day ${d.day} · ${esc(d.title)}</option>`).join('')}</select></div>
      </div>`;
    }

    function startWorkout() {
      const day=getDay();
      active={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),dayIndex:state.settings.currentDayIndex,day:day.day,title:day.title,type:day.type,focus:day.focus,startedAt:new Date().toISOString(),sessionNote:'',currentExerciseIndex:0,exercises:day.exercises.map(ex=>({id:ex.id,logs:[],notes:'',draftWeight:initialWeight(ex),draftReps:initialReps(ex),draftFeel:'good',draftWarmup:false}))};
      saveActive();currentView='workout';render();showToast(day.type==='rest'?'Recovery session started.':'Workout started.');
    }

    function initialWeight(ex) { const p=state.exerciseProgress[ex.id]||exerciseAliases(ex.id).map(id=>state.exerciseProgress[id]).find(Boolean); if(ex.type==='weighted') return Number.isFinite(Number(p?.nextWeight))?Number(p.nextWeight):Number.isFinite(Number(p?.lastWeight))?Number(p.lastWeight):null; return null; }
    function initialReps(ex) { const prev=getPreviousExercise(ex.id); const logs=prev?workingLogs(prev.entry.logs||[]):[]; const last=logs.at(-1); return Number.isFinite(Number(last?.reps))?clamp(Number(last.reps),1,99):ex.min; }
    function exerciseAliases(id) {
      const aliases={smith_squat:['smith_squat_box'],leg_press_45:['leg_press'],romanian_deadlift:['smith_rdl']};
      return [id,...(aliases[id]||[])];
    }
    function previousWorkingSet(ex, entry) {
      const current=workingLogs(entry?.logs||[]).at(-1);
      if(current) return {label:formatLogShort(ex,current),source:'This workout'};
      const prev=getPreviousExercise(ex.id), last=prev?workingLogs(prev.entry.logs||[]).at(-1):null;
      return last?{label:formatLogShort(ex,last),source:'Last workout'}:null;
    }
    function renderSetReferences(ex,entry) {
      if(ex.type!=='weighted'&&ex.type!=='bodyweight') return '';
      const previous=previousWorkingSet(ex,entry);
      const p=state.exerciseProgress[ex.id]||exerciseAliases(ex.id).map(id=>state.exerciseProgress[id]).find(Boolean);
      const suggested=nextTargetLabel(ex,p);
      return `<div class="set-reference-row"><div class="set-reference"><span>${esc(previous?.source||'Previous set')}</span><strong>${esc(previous?.label||'No previous set')}</strong></div><div class="set-reference"><span>Suggested next</span><strong>${esc(suggested)}</strong></div></div>`;
    }

    function renderFocusWorkout() {
      if(!active){currentView='workout';renderWorkoutPreview();return;}
      const day=PLAN[active.dayIndex]||getDay();
      active.currentExerciseIndex=clamp(Number(active.currentExerciseIndex)||0,0,Math.max(0,active.exercises.length-1));
      const index=active.currentExerciseIndex, entry=active.exercises[index], ex=getExercise(entry.id), total=active.exercises.length;
      const completed=active.exercises.filter(e=>{const x=getExercise(e.id);return workingLogs(e.logs||[]).length>=(x?.sets||1);}).length;
      const progress=Math.max(4,Math.round(((index+1)/Math.max(1,total))*100));
      $('#view').innerHTML=`<div class="focus-shell">
        <header class="focus-header"><button class="focus-close" data-action="pause-workout" aria-label="Pause workout">×</button><div class="focus-title"><strong>${index+1} of ${total}</strong><span>${esc(day.title)}</span></div><button class="focus-menu" data-action="open-exercise-tools" aria-label="Exercise details">•••</button></header>
        <div class="focus-progress"><div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div></div>
        <main class="exercise-stage" id="exerciseStage">${renderFocusCard(ex,entry,index,total)}</main>
        <footer class="focus-bottom"><button class="focus-nav-btn" data-action="${index>0?'previous-exercise':'pause-workout'}">${index>0?'← Previous':'Pause'}</button><div class="focus-elapsed" id="elapsed">${formatDuration(Date.now()-new Date(active.startedAt))}</div><button class="focus-nav-btn primary" data-action="${index<total-1?'next-exercise':'finish-workout'}">${index<total-1?'Next →':'Finish'}</button></footer>
        ${exerciseSheetOpen?renderExerciseSheet(ex,entry,index):''}
      </div>`;
      bindSwipe();startElapsedClock();
    }

    function renderFocusCard(ex, entry, index, total) {
      if(!ex) return '<div class="empty">Exercise unavailable.</div>';
      const logs=entry.logs||[], working=workingLogs(logs), targetHit=working.length>=ex.sets;
      const weight=Number.isFinite(Number(entry.draftWeight))?Number(entry.draftWeight):(initialWeight(ex)||'');
      const reps=Number.isFinite(Number(entry.draftReps))?Number(entry.draftReps):ex.min;
      return `<article class="exercise-focus-card"><div class="exercise-card-inner">
        <div class="exercise-card-head"><div><span class="exercise-number">${targetHit?'Target complete':`Set ${Math.min(working.length+1,ex.sets)} of ${ex.sets}`}</span><button class="exercise-head-tap" data-action="open-exercise-tools" aria-label="Open exercise picture and instructions"><h1 class="exercise-title">${esc(ex.name)}</h1><div class="exercise-target">${esc(targetLabel(ex))} · ${esc(ex.equipment||'')}</div><small>Tap for picture, cues, and notes</small></button>${renderExerciseNoteChip(entry)}</div><button class="details-dot" data-action="open-exercise-tools" aria-label="Details">•••</button></div>
        ${renderPreviousCard(ex)}
        ${logs.length?`<div class="logged-strip">${logs.slice(-6).map((log,i)=>renderLoggedSet(ex,log,Math.max(0,logs.length-6)+i,index)).join('')}</div>`:'<div class="logged-placeholder">No sets logged yet</div>'}
        <div class="focus-log-wrap">${renderFocusLogPanel(ex,entry,index,weight,reps)}</div>
      </div></article>`;
    }

    function renderPreviousCard(ex) {
      const prev=getPreviousExercise(ex.id), p=state.exerciseProgress[ex.id]||exerciseAliases(ex.id).map(id=>state.exerciseProgress[id]).find(Boolean);
      if(!prev) return `<div class="previous-compact"><div><span>Previous</span><strong>First session</strong></div><div class="previous-grid"><div class="previous-stat"><span>Last time</span><strong>Not logged yet</strong></div><div class="previous-stat"><span>Suggested next</span><strong>Start clean</strong></div></div><p><span>Coach</span>Choose a clean starting load and leave 1–3 reps in reserve.</p></div>`;
      const logs=workingLogs(prev.entry.logs||[]);
      const lastSummary=logs.length ? logs.slice(-3).map(log=>formatLogShort(ex,log)).join(' · ') : 'Logged';
      const suggestion=nextTargetLabel(ex,p);
      return `<div class="previous-compact"><div class="previous-row"><div><span>Previous · ${fmtDate(prev.session.startedAt)}</span><div class="previous-set-row">${logs.slice(-5).map(log=>`<b>${esc(formatLogShort(ex,log))}</b>`).join('')}</div></div></div><div class="previous-grid"><div class="previous-stat"><span>Last time</span><strong>${esc(lastSummary)}</strong></div><div class="previous-stat"><span>Suggested next</span><strong>${esc(suggestion)}</strong></div></div><p><span>Coach</span>${esc(p?.note||'Repeat the last clean setup.')}</p></div>`;
    }

    function renderLoggedSet(ex, log, setIndex, exerciseIndex) {
      const label=formatLogShort(ex,log); return `<button class="logged-set ${log.warmup?'warmup':''}" data-action="edit-set" data-set-index="${setIndex}" title="Tap to delete"><b>${esc(label)}</b><span>${log.warmup?'warm-up':`${feelEmoji(log.feel)} set ${setIndex+1}`}</span></button>`;
    }

    function renderFocusLogPanel(ex, entry, index, weight, reps) {
      const feel=entry.draftFeel||'good', setNo=workingLogs(entry.logs||[]).length+1;
      if(ex.type==='weighted') return `<div class="compact-log-panel">
        ${renderSetReferences(ex,entry)}
        <div class="control-grid">
          <div class="control-block"><div class="control-label"><span>Weight</span><small>${state.settings.units}</small></div><div class="compact-stepper"><button data-action="adjust-weight" data-delta="-5">−</button><input inputmode="decimal" data-input="weight" value="${esc(weight)}" placeholder="0"><button data-action="adjust-weight" data-delta="5">+</button></div>${Number.isFinite(Number(state.exerciseProgress[ex.id]?.nextWeight))?'<div class="prefill-badge">Suggested weight prefilled</div>':''}<div class="micro-adjust"><button data-action="adjust-weight" data-delta="-10">−10</button><button data-action="adjust-weight" data-delta="-5">−5</button><button data-action="adjust-weight" data-delta="5">+5</button><button data-action="adjust-weight" data-delta="10">+10</button></div></div>
          <div class="control-block"><div class="control-label"><span>Reps</span><small>${ex.min}–${ex.max}</small></div><div class="compact-stepper"><button data-action="adjust-reps" data-delta="-1">−</button><input inputmode="numeric" data-input="reps" value="${esc(reps)}"><button data-action="adjust-reps" data-delta="1">+</button></div><div class="rep-hint">Target ${ex.min}–${ex.max}</div></div>
        </div>${renderFeelOnly(entry,feel)}<button class="log-set-btn" data-action="log-set">Log set ${setNo}<span>✓</span></button>
      </div>`;
      if(ex.type==='bodyweight') return `<div class="compact-log-panel single-control">${renderSetReferences(ex,entry)}<div class="control-block"><div class="control-label"><span>Reps</span><small>${ex.min}–${ex.max}</small></div><div class="compact-stepper"><button data-action="adjust-reps" data-delta="-1">−</button><input inputmode="numeric" data-input="reps" value="${esc(reps)}"><button data-action="adjust-reps" data-delta="1">+</button></div></div>${renderFeelOnly(entry,feel)}<button class="log-set-btn" data-action="log-set">Log set ${setNo}<span>✓</span></button></div>`;

    }

    function renderRepAndFeel(entry,reps,feel) { return renderFeelOnly(entry,feel); }
    function renderFeelOnly(entry,feel) { return `<div class="feel-row"><button class="feel-btn easy ${feel==='easy'?'active':''}" data-action="set-feel" data-feel="easy">Easy</button><button class="feel-btn right ${feel==='good'?'active':''}" data-action="set-feel" data-feel="good">Just right</button><button class="feel-btn hard ${feel==='hard'?'active':''}" data-action="set-feel" data-feel="hard">Hard</button></div><label class="warm-compact"><div><span>Warm-up set</span><small>Tracked separately and does not count toward your working sets or stats.</small></div><input type="checkbox" data-input="warmup" ${entry.draftWarmup?'checked':''}></label>`; }

    function renderExerciseSheet(ex,entry,index){return `<div class="sheet-backdrop" data-action="close-exercise-tools"><section class="bottom-sheet" role="dialog" aria-modal="true" aria-label="Exercise details" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-head"><div><span class="section-kicker">Exercise details</span><h2>${esc(ex.name)}</h2></div><button data-action="close-exercise-tools" aria-label="Close">×</button></div><div class="sheet-section"><div class="exercise-hero"><div class="exercise-hero-visual">${renderExerciseVisual(ex)}</div><div class="exercise-hero-copy"><strong class="sheet-section-title">Quick guide</strong><div class="sheet-meta-chips"><span class="sheet-chip">${esc(targetLabel(ex))}</span><span class="sheet-chip">${esc(ex.equipment||'Gym floor')}</span></div><p>${esc(ex.cues||'Use controlled reps and clean form.')}</p></div></div></div><div class="sheet-section"><strong class="sheet-section-title">How to do it</strong><ol class="cue-steps">${exerciseSteps(ex).map(step=>`<li>${esc(step)}</li>`).join('')}</ol></div><div class="sheet-section"><label class="sheet-section-title">Exercise note</label><textarea data-input="exercise-note" placeholder="Seat position, grip, machine used, discomfort…">${esc(entry.notes||'')}</textarea></div>${ex.name.includes('Smith Machine')?`<div class="sheet-section">${renderPlateTool(ex,index,entry.draftWeight)}</div>`:''}<button class="btn danger block" data-action="delete-last-set">Delete last set</button><button class="btn danger block" style="margin-top:10px" data-action="cancel-workout">Cancel workout</button></section></div>`;}
    function renderExerciseNoteChip(entry) {
      const note = String(entry?.notes || '').trim();
      if (!note) return '<button class="exercise-note-chip empty" data-action="open-exercise-tools" aria-label="Add an exercise note">📝 Add note</button>';
      return `<button class="exercise-note-chip" data-action="open-exercise-tools" aria-label="Edit exercise note"><strong>📝 Note</strong><span>${esc(note)}</span></button>`;

    function nextTargetLabel(ex, progress) {
      if (!progress) return 'Repeat last clean setup';
      if (ex.type === 'weighted' && Number.isFinite(Number(progress.nextWeight))) return `${cleanNumber(progress.nextWeight)} ${state.settings.units}`;
      if ((ex.type === 'cardio' || ex.type === 'timed') && Number.isFinite(Number(progress.nextDuration))) return `${cleanNumber(progress.nextDuration)} ${ex.unit||'min'}`;
      return progress.lastSummary || progress.note || 'Repeat last clean setup';
    }

      const accent = lower.includes('leg') || lower.includes('squat') || lower.includes('deadlift') || lower.includes('calf') ? '#66A0FF' : lower.includes('curl') || lower.includes('triceps') || lower.includes('press') || lower.includes('row') || lower.includes('pulldown') ? '#A78BFA' : '#2DD4BF';
      if (lower.includes('leg press')) return `<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="10" y="58" width="50" height="7" rx="3.5" fill="${stroke}" opacity=".88"/><rect x="56" y="22" width="24" height="48" rx="6" fill="none" stroke="${stroke}" stroke-width="5"/><circle cx="40" cy="22" r="7" fill="${accent}"/><path d="M38 30l10 11 11 6" fill="none" stroke="${stroke}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M48 41l-8 12" fill="none" stroke="${accent}" stroke-width="6" stroke-linecap="round"/><path d="M56 47l7-12" fill="none" stroke="${accent}" stroke-width="6" stroke-linecap="round"/><circle cx="72" cy="20" r="8" fill="${accent}" opacity=".9"/><circle cx="79" cy="31" r="5" fill="${accent}" opacity=".65"/></svg>`;
      if (lower.includes('squat')) return `<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="18" y="18" width="60" height="5" rx="2.5" fill="${stroke}"/><circle cx="48" cy="23" r="7" fill="${accent}"/><path d="M48 31v19l-13 12m13-12 13 12M35 63l-7 14m33-14 7 14" fill="none" stroke="${stroke}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 18v44M76 18v44" stroke="${stroke}" stroke-width="4" opacity=".7"/></svg>`;
      if (lower.includes('deadlift') || lower.includes('rdl')) return `<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="49" cy="20" r="7" fill="${accent}"/><path d="M48 28l2 18-10 15m8-13 15 10m-27 17 12-15 15 12" fill="none" stroke="${stroke}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><rect x="20" y="70" width="56" height="5" rx="2.5" fill="${stroke}"/><circle cx="18" cy="72.5" r="7" fill="${accent}" opacity=".75"/><circle cx="78" cy="72.5" r="7" fill="${accent}" opacity=".75"/></svg>`;
      if (lower.includes('curl') || lower.includes('pushdown') || lower.includes('triceps')) return `<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="48" cy="18" r="7" fill="${accent}"/><path d="M48 27v18m0 0-16 10m16-10 16 10M32 55l-6 16m38-16 6 16" fill="none" stroke="${stroke}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M28 42h11m18 0h11" stroke="${accent}" stroke-width="6" stroke-linecap="round"/></svg>`;
      if (lower.includes('row') || lower.includes('pulldown') || lower.includes('face pull')) return `<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="34" cy="22" r="7" fill="${accent}"/><path d="M34 30l5 17 14 8m-10-9-11 14m22-5 12-12" fill="none" stroke="${stroke}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M70 18v48" stroke="${stroke}" stroke-width="4" opacity=".72"/><path d="M69 28c-8 6-14 11-22 15" fill="none" stroke="${accent}" stroke-width="5" stroke-linecap="round"/></svg>`;
      if (ex.type === 'cardio' || ex.type === 'timed') return `<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="20" y="55" width="56" height="8" rx="4" fill="${stroke}"/><path d="M30 55l11-20 10 9 11-16" fill="none" stroke="${accent}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="33" cy="28" r="7" fill="${accent}"/></svg>`;
      return `<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="48" cy="20" r="7" fill="${accent}"/><path d="M48 28v20m0 0-14 10m14-10 14 10M34 58l-8 16m36-16 8 16" fill="none" stroke="${stroke}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    function exerciseSteps(ex) {
      const lower = `${ex.id} ${ex.name} ${ex.equipment||''}`.toLowerCase();
      if (lower.includes('leg press')) return ['Set your feet shoulder-width with your full foot on the platform and unlock the safeties.', 'Lower the sled under control until your knees are bent comfortably, then drive through the mid-foot to press it away.', 'Keep tension the whole time and avoid snapping your knees straight at the top.'];
      if (lower.includes('squat')) return ['Set the bar at upper-chest height, brace your core, and place your feet just outside shoulder-width.', 'Sit straight down with control until depth is clean, then drive up through your mid-foot.', 'Keep your ribs down and avoid letting your knees cave in.'];
      if (lower.includes('deadlift') || lower.includes('rdl')) return ['Stand tall with dumbbells close to your legs and keep a soft bend in your knees.', 'Push your hips back until you feel a hamstring stretch, then stand back up by driving the hips forward.', 'Keep the weights close and your back neutral the whole set.'];
      if (lower.includes('row') || lower.includes('pulldown') || lower.includes('face pull')) return ['Set your body position first so your chest stays proud and your torso stays still.', 'Pull with your elbows and pause for a beat when the handle reaches the finishing position.', 'Return under control instead of letting the weight yank you forward.'];
      if (lower.includes('curl') || lower.includes('pushdown') || lower.includes('triceps')) return ['Lock in your upper-arm position before each rep.', 'Move the weight smoothly through the full range and squeeze the target muscle at the hardest point.', 'Avoid swinging or turning it into a full-body movement.'];
      if (lower.includes('calf')) return ['Place the balls of your feet on the platform and let your heels drop into a stretch.', 'Press all the way up onto your toes, pause, then lower slowly again.', 'Use a full range of motion instead of bouncing.'];
      if (ex.type === 'cardio' || ex.type === 'timed') return ['Start easy for the first minute and settle into the planned pace.', 'Keep your posture tall and your breathing controlled while you move.', 'Finish feeling worked, not wrecked, so you recover well for the next session.'];
      return ['Set yourself up so the machine, seat, or handles feel locked in before the first rep.', 'Move with control and match the target rep range for this exercise.', 'Use the cue above to stay strict and make every working set count.'];
    }

    function openExerciseTools(){if(!active)return;syncDraftFromInputs();exerciseSheetOpen=true;renderFocusWorkout();}
    function closeExerciseTools(){if(!active)return;syncDraftFromInputs();exerciseSheetOpen=false;renderFocusWorkout();}

    function renderPlateTool(ex,index,weight) { return `<div><strong style="color:#fff">Smith plate calculator</strong><div class="muted" style="margin-top:4px">Target ${esc(weight||0)} lb · starting resistance ${esc(state.settings.smithBarWeight)} lb</div><div style="margin-top:8px;color:#fff;font-weight:850">${esc(plateCalculation(Number(weight)||0,Number(state.settings.smithBarWeight)||0))}</div></div>`; }
    function plateCalculation(total,bar) { if(!Number.isFinite(total)||total<=0) return 'Enter a target weight.'; const per=Math.max(0,(total-bar)/2); const plates=[45,35,25,10,5,2.5]; let remaining=per, used=[]; for(const p of plates){const count=Math.floor((remaining+.001)/p);for(let i=0;i<count;i++)used.push(p);remaining-=count*p;} return remaining>.2?`${cleanNumber(per)} lb per side (closest plates vary)`:`Per side: ${used.length?used.join(' + '):'no plates'}`; }

    function getPreviousExercise(id) {
      const ids=exerciseAliases(id);
      const sessions=[...state.history].sort((a,b)=>new Date(b.startedAt)-new Date(a.startedAt));
      for(const session of sessions){const entry=(session.exercises||[]).find(e=>ids.includes(e.id) && (e.logs||[]).length);if(entry)return{session,entry};} return null;
    }

    function formatLogShort(ex,log) {
      if(ex.type==='weighted') return `${log.warmup?'WU ':''}${cleanNumber(log.weight)}×${cleanNumber(log.reps)}`;

    }

    function syncDraftFromInputs() {
      if(!active) return; const entry=active.exercises[active.currentExerciseIndex], ex=getExercise(entry.id); if(!entry||!ex)return;

      const reps=Number($('[data-input="reps"]')?.value); if(Number.isFinite(reps)&&reps>0) entry.draftReps=reps;
      const duration=Number($('[data-input="duration"]')?.value); if(Number.isFinite(duration)&&duration>0) entry.draftReps=duration;
      const note=$('[data-input="exercise-note"]')?.value; if(typeof note==='string') entry.notes=note;

    function adjustDraft(kind,delta) {

    }

    function setFeel(feel) { if(!active)return; syncDraftFromInputs(); const entry=active.exercises[active.currentExerciseIndex];entry.draftFeel=['easy','good','hard'].includes(feel)?feel:'good';saveActive();renderFocusWorkout(); }

    function logSet() {
      if(!active)return; const index=active.currentExerciseIndex,entry=active.exercises[index],ex=getExercise(entry.id);if(!ex)return;
      syncDraftFromInputs(); const warmup=Boolean(entry.draftWarmup),feel=entry.draftFeel||'good';
      if(ex.type==='weighted'){

      } else if(ex.type==='bodyweight'){
        const reps=Number(entry.draftReps);if(!Number.isFinite(reps)||reps<=0){showToast('Enter reps.');return;}entry.logs.push({reps,weight:null,feel,warmup,at:new Date().toISOString()});
      } else {
        const duration=Number(entry.draftReps);if(!Number.isFinite(duration)||duration<=0){showToast('Enter duration.');return;}entry.logs.push({duration,note:$('[data-input="cardio-note"]')?.value?.trim()||'',at:new Date().toISOString()});
      }
      entry.draftFeel='good'; entry.draftWarmup=false; saveActive(); renderFocusWorkout();
      if(state.settings.autoRest && ex.type!=='cardio' && ex.type!=='timed') startRest(Number(state.settings.restSeconds)||90);

    }

    function deleteLastSet() { if(!active)return;const entry=active.exercises[active.currentExerciseIndex];if(!entry.logs.length){showToast('No set to delete.');return;}entry.logs.pop();saveActive();renderFocusWorkout();showToast('Last set removed.'); }
    function deleteSpecificSet(setIndex) { if(!active)return;const entry=active.exercises[active.currentExerciseIndex];if(!confirm('Delete this set?'))return;entry.logs.splice(Number(setIndex),1);saveActive();renderFocusWorkout(); }

    function nextExercise(delta=1) { if(!active)return;syncDraftFromInputs();exerciseSheetOpen=false;active.currentExerciseIndex=clamp(active.currentExerciseIndex+delta,0,active.exercises.length-1);saveActive();renderFocusWorkout(); }
    function jumpExercise(index) { if(!active)return;syncDraftFromInputs();active.currentExerciseIndex=clamp(Number(index),0,active.exercises.length-1);saveActive();renderFocusWorkout(); }
    function pauseWorkout() { syncDraftFromInputs();exerciseSheetOpen=false;currentView='home';render();showToast('Workout paused. Your sets are saved.'); }

    function bindSwipe() {
      const stage=$('#exerciseStage');if(!stage)return;
      stage.addEventListener('touchstart',event=>{if(event.target.closest('button,input,textarea,select,summary'))return;const t=event.changedTouches[0];swipeStart={x:t.clientX,y:t.clientY};},{passive:true});
      stage.addEventListener('touchend',event=>{if(!swipeStart)return;const t=event.changedTouches[0],dx=t.clientX-swipeStart.x,dy=t.clientY-swipeStart.y;swipeStart=null;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.25)nextExercise(dx<0?1:-1);},{passive:true});
    }

    function startElapsedClock() { clearInterval(elapsedTimer);elapsedTimer=setInterval(()=>{const el=$('#elapsed');if(active&&el)el.textContent=formatDuration(Date.now()-new Date(active.startedAt));},1000); }

    function startRest(seconds) {
      stopRest(); const duration=Math.max(5,Number(seconds)||90); restState={start:Date.now(),end:Date.now()+duration*1000,duration};

    }
    function renderRest() {

    }
    function updateRest() { if(!restState)return;const remaining=Math.max(0,restState.end-Date.now()),pct=(remaining/(restState.duration*1000))*100;const time=$('#restTime'),ring=$('#restRing');if(time)time.textContent=formatRest(Math.ceil(remaining/1000));if(ring)ring.style.setProperty('--rest-pct',`${pct}%`);if(remaining<=0){finishRest();} }
    function formatRest(seconds){const s=Math.max(0,Math.ceil(seconds));return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
    function finishRest(){stopRest();beep();showToast('Rest complete.');}
    function stopRest(){clearInterval(restTimer);restTimer=null;restState=null;$('#restOverlay')?.remove();}
    function addRest(){if(!restState)return;restState.end+=30000;restState.duration+=30;updateRest();}
    function beep(){try{if(state.settings.sound){const Ctx=window.AudioContext||window.webkitAudioContext;const ctx=new Ctx();const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=660;g.gain.setValueAtTime(.08,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.28);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.3);}if(navigator.vibrate)navigator.vibrate([120,60,120]);}catch(_){} }

    function currentPRScores() { const scores={};for(const day of PLAN)for(const ex of day.exercises){const best=bestSet(ex.id);if(best)scores[ex.id]=best.score;}return scores; }
    function bestSet(id, history=state.history) { const ex=getExercise(id);if(!ex)return null;let best=null;for(const s of history)for(const e of s.exercises||[]){if(e.id!==id)continue;for(const log of workingLogs(e.logs||[])){let score=null;if(ex.type==='weighted'){const w=Number(log.weight),r=Number(log.reps);if(Number.isFinite(w)&&Number.isFinite(r))score=w*(1+r/30);}else if(ex.type==='bodyweight'){score=Number(log.reps);}if(Number.isFinite(score)&&(!best||score>best.score))best={score,log,date:s.startedAt};}}return best; }

    function finishWorkout() {
      if(!active)return;syncDraftFromInputs();const count=active.exercises.reduce((sum,e)=>sum+(e.logs||[]).length,0);if(!count&&!confirm('No activity has been logged. Save this workout anyway?'))return;
      const prior=currentPRScores(),now=new Date().toISOString();const session={...deepClone(active),endedAt:now,completedAt:now,durationMs:new Date(now)-new Date(active.startedAt),prs:[]};

    }

    function markRest() {
      const day=getDay(),now=new Date().toISOString();const session={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),dayIndex:state.settings.currentDayIndex,day:day.day,title:day.title,type:'rest',focus:day.focus,startedAt:now,endedAt:now,completedAt:now,durationMs:0,exercises:[],prs:[]};state.history.push(session);state.settings.currentDayIndex=(state.settings.currentDayIndex+1)%PLAN.length;lastCompletedSession=session;saveState();currentView='complete';render();
    }

    function renderCompletion() {
      const s=lastCompletedSession || [...state.history].sort((a,b)=>new Date(b.startedAt)-new Date(a.startedAt))[0];if(!s){currentView='home';render();return;}
      const working=sessionWorkingSets(s),volume=sessionVolume(s),cardio=sessionCardioMinutes(s),recs=(s.exercises||[]).map(e=>({ex:getExercise(e.id),p:state.exerciseProgress[e.id]})).filter(x=>x.ex&&x.p?.note).slice(0,2);
      $('#view').innerHTML=`<div class="completion-screen"><div class="completion-brand"><div class="completion-mark"><img src="atlas-mark.svg" alt=""></div><div class="eyebrow">Workout complete</div><h1>${esc(s.title)}</h1><p>Your session is saved.</p></div><div class="completion-stats"><div><span>Duration</span><strong>${formatDuration(s.durationMs)}</strong></div><div><span>Working sets</span><strong>${working}</strong></div><div><span>Volume</span><strong>${volume.toLocaleString()}</strong><small>lb</small></div>${cardio?`<div><span>Cardio</span><strong>${cardio}</strong><small>min</small></div>`:''}</div>${s.prs?.length?`<div class="completion-pr"><span>🏆 New PR</span><strong>${esc(s.prs[0].name)}</strong><small>${esc(s.prs[0].value)}${s.prs.length>1?` · +${s.prs.length-1} more`:''}</small></div>`:''}<div class="completion-notes"><span class="section-kicker">Coach notes</span>${recs.length?recs.map(x=>`<p><strong>${esc(x.ex.name)}</strong> · ${esc(x.p.note)}</p>`).join(''):'<p>Rest day logged. Your next workout is ready when you are.</p>'}</div><button class="btn primary block completion-button" data-action="complete-done">Return home</button></div>`;

    function analyzeExercise(ex, logs, previous={}) {
      const clean=logs||[],base={lastDate:new Date().toISOString(),completedCount:(previous.completedCount||0)+1,lastSummary:clean.map(l=>formatLogShort(ex,l)).join(', ')};

    }

    function rebuildProgress() { state.exerciseProgress={};const sessions=[...state.history].sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt));for(const s of sessions)for(const entry of s.exercises||[]){const ex=getExercise(entry.id);if(ex)state.exerciseProgress[entry.id]=analyzeExercise(ex,entry.logs||[],state.exerciseProgress[entry.id]||{});} }

    function renderProgress() {

    function weightedExerciseIds(){const ids=[];for(const day of PLAN)for(const ex of day.exercises)if(ex.type==='weighted'&&strengthPoints(ex.id).length)ids.push(ex.id);return [...new Set(ids)];}
    function strengthPoints(id){const ex=getExercise(id),points=[];if(!ex)return points;for(const s of [...state.history].sort((a,b)=>new Date(a.startedAt)-new Date(b.startedAt))){const entry=(s.exercises||[]).find(e=>e.id===id);if(!entry)continue;let best=0;for(const log of workingLogs(entry.logs||[])){const w=Number(log.weight),r=Number(log.reps);if(Number.isFinite(w)&&Number.isFinite(r))best=Math.max(best,w*(1+r/30));}if(best)points.push({date:s.startedAt,value:Math.round(best*10)/10});}return points;}
    function weightPoints(){return [...state.bodyMetrics].sort((a,b)=>new Date(a.date)-new Date(b.date)).filter(m=>Number.isFinite(Number(m.weight))).map(m=>({date:m.date,value:Number(m.weight)}));}
    function renderWeightChart(){const pts=weightPoints();return renderLineChart(pts,'lb');}
    function renderStrengthChart(id){return renderLineChart(strengthPoints(id),'e1RM');}
    function renderLineChart(points,unit){if(points.length<2)return`<div class="chart-empty">Log at least two readings to build this chart.</div>`;const w=600,h=180,pad=18,vals=points.map(p=>p.value),min=Math.min(...vals),max=Math.max(...vals),range=Math.max(1,max-min),coords=points.map((p,i)=>({x:pad+(i/(points.length-1))*(w-pad*2),y:h-pad-((p.value-min)/range)*(h-pad*2),...p})),path=coords.map((p,i)=>`${i?'L':'M'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');return`<div style="display:flex;justify-content:space-between;gap:10px"><strong>${cleanNumber(points.at(-1).value)} ${esc(unit)}</strong><span class="muted" style="font-size:12px">${fmtDate(points[0].date)} → ${fmtDate(points.at(-1).date)}</span></div><div class="chart-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img"><defs><linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b5cf6" stop-opacity=".35"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></linearGradient></defs><path d="${path} L ${coords.at(-1).x} ${h-pad} L ${coords[0].x} ${h-pad} Z" fill="url(#area)"/><path d="${path}" fill="none" stroke="#c4b5fd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>${coords.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#f8fafc"/>`).join('')}</svg></div>`;}

    function getWeightTrend(){const pts=weightPoints(),now=Date.now();const avgFor=days=>{const cut=now-days*86400000,vals=pts.filter(p=>new Date(p.date).getTime()>=cut).map(p=>p.value);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;};const avg7=avgFor(7);let label='Collecting trend';if(pts.length>=4){const recent=pts.slice(-3).reduce((a,b)=>a+b.value,0)/Math.min(3,pts.length),older=pts.slice(0,Math.max(1,pts.length-3)).slice(-3).reduce((a,b)=>a+b.value,0)/Math.max(1,pts.slice(0,Math.max(1,pts.length-3)).slice(-3).length),diff=recent-older;label=Math.abs(diff)<.5?'Stable trend':diff<0?`Trending down ${cleanNumber(Math.abs(diff))} lb`:`Trending up ${cleanNumber(diff)} lb`; }return{avg7,label};}

    function weeklyReview(){const end=new Date(),start=new Date();start.setDate(end.getDate()-6);start.setHours(0,0,0,0);const sessions=state.history.filter(s=>new Date(s.startedAt)>=start),lifts=sessions.filter(s=>s.type!=='rest'),sets=lifts.reduce((sum,s)=>sum+sessionWorkingSets(s),0),cardio=Math.round(sessions.reduce((sum,s)=>sum+sessionCardioMinutes(s),0)*100)/100,all=lifts.flatMap(s=>(s.exercises||[]).flatMap(e=>workingLogs(e.logs||[]))),rated=all.filter(l=>l.feel),hard=rated.filter(l=>l.feel==='hard').length,hardPct=rated.length?Math.round(hard/rated.length*100):0,ready=Object.values(state.exerciseProgress).filter(p=>/Increase|Try/.test(p.note||'')).length,wins=[`${lifts.length} lift session${lifts.length===1?'':'s'} completed with ${sets} working sets.`,`${cardio} cardio minutes logged.`,ready?`${ready} exercise${ready===1?' is':'s are'} ready for progression.`:'Baseline data is getting stronger.'],adjustments=[];if(lifts.length<5)adjustments.push(`Complete the remaining ${5-lifts.length} planned lift day${5-lifts.length===1?'':'s'} without cramming missed sessions together.`);if(cardio<100)adjustments.push(`Build cardio gradually; ${cardio} minutes are logged in the last 7 days.`);if(hardPct>35)adjustments.push(`${hardPct}% of rated sets were hard. Keep most working sets “just right” and save grinders for occasional final sets.`);else adjustments.push('Effort balance looks controlled. Keep most sets 1–2 clean reps from failure.');adjustments.push('Keep logging morning weight 3–4 times per week so the 7-day average becomes dependable.');return{title:`${fmtDate(start)} – ${fmtDate(end)}`,lifts:lifts.length,sets,cardio,hardPct,wins,adjustments};}
