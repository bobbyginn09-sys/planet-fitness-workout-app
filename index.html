          <div class="card-inner">
            <div class="session-bar">
              <div>
                <div class="kicker">Active session</div>
                <h1>Day ${day.day}: ${esc(day.title)}</h1>
                <p class="muted">${esc(day.focus)} • Started ${fmtTime(active.startedAt)}</p>
              </div>
              <div class="timer-bubble">⏱️ <span id="elapsedTime">${elapsed}</span></div>
            </div>
            <p class="note">${esc(day.warmup)}</p>
            <div class="toolbar">
              <button class="btn green" data-action="finish-workout">Finish workout + save</button>
              <button class="btn warn" data-action="start-rest-manual">Start rest timer</button>
              <button class="btn danger" data-action="cancel-workout">Cancel</button>
            </div>
          </div>
        </section>
        <section class="grid" style="margin-top:16px">
          ${active.exercises.map((entry, index) => renderExerciseLogCard(entry, index)).join('')}
        </section>
      `;
      restartElapsedClock();
    }

    function renderExerciseLogCard(entry, index) {
      const ex = getExercise(entry.id);
      if (!ex) return '';
      const logs = entry.logs || [];
      const rec = recommendationFor(ex);
      const recValue = getSessionWeightValue(entry, ex, recommendedInputValue(ex));
      const last = state.exerciseProgress[ex.id]?.lastSummary || 'No previous log yet';
      return `
        <article class="card" data-card-index="${index}">
          <div class="card-inner">
            <div class="exercise-head">
              <div>
                <h2 style="margin-bottom:4px">${esc(ex.name)}</h2>
                <div class="small-text">Target: ${esc(targetLabel(ex))} • ${esc(ex.equipment || '')}</div>
              </div>
              <span class="target">${esc(ex.type)}</span>
            </div>
            <div class="badge-row">
              <span class="badge">Last: ${esc(last)}</span>
              <span class="badge">Next: ${esc(rec)}</span>
            </div>
            ${renderExerciseCompletion(ex, logs)}
            ${logs.length ? renderLogTable(ex, logs, index) : `<div class="empty" style="margin-top:12px">No sets logged yet for this exercise.</div>`}
            ${renderLogInputs(ex, index, recValue)}
            <div class="small-text" style="margin-top:10px">${esc(ex.cues || '')}</div>
          </div>
        </article>
      `;
    }

    function renderLogTable(ex, logs, index) {
      const rows = logs.map((log, i) => {
        if (ex.type === 'weighted') {
          return `<tr><td>${i + 1}</td><td>${esc(log.weight)} ${esc(state.settings.units)}</td><td>${esc(log.reps)}</td><td><button class="btn small ghost" data-action="delete-set" data-exercise-index="${index}" data-set-index="${i}">Delete</button></td></tr>`;
        }
        if (ex.type === 'bodyweight') {
          return `<tr><td>${i + 1}</td><td>${esc(log.reps)} reps</td><td>${log.weight ? esc(log.weight) + ' ' + esc(state.settings.units) : 'bodyweight'}</td><td><button class="btn small ghost" data-action="delete-set" data-exercise-index="${index}" data-set-index="${i}">Delete</button></td></tr>`;
        }
        return `<tr><td>${i + 1}</td><td>${esc(log.duration)} ${esc(ex.unit || 'min')}</td><td>${esc(log.note || '')}</td><td><button class="btn small ghost" data-action="delete-set" data-exercise-index="${index}" data-set-index="${i}">Delete</button></td></tr>`;
      }).join('');
      const headers = ex.type === 'weighted'
        ? '<tr><th>Set</th><th>Weight</th><th>Reps</th><th></th></tr>'
        : '<tr><th>Log</th><th>Amount</th><th>Note</th><th></th></tr>';
      return `<table class="set-table"><thead>${headers}</thead><tbody>${rows}</tbody></table>`;
    }

    function renderLogInputs(ex, index, recValue) {
      if (ex.type === 'weighted') {
        const weightValue = recValue ? cleanNumber(recValue) : '';
        return `
          ${renderQuickWeightControls(index, weightValue, 'Easy weight')}
          <div class="form-grid" style="margin-top:12px">
            <div class="field"><label>Weight (${esc(state.settings.units)})</label><input inputmode="decimal" data-input="weight-${index}" placeholder="${weightValue ? esc(weightValue) : 'ex: 80'}" value="${weightValue ? esc(weightValue) : ''}"></div>
            <div class="field"><label>Reps</label><input inputmode="numeric" data-input="reps-${index}" placeholder="${ex.min}-${ex.max}"></div>
            <div class="field"><label>Note</label><input data-input="note-${index}" placeholder="optional"></div>
            <button class="btn primary" data-action="add-set" data-exercise-index="${index}">Log set</button>
          </div>
        `;
      }
      if (ex.type === 'bodyweight') {
        const weightValue = recValue ? cleanNumber(recValue) : '';
        return `
          ${renderQuickWeightControls(index, weightValue, 'Added weight')}
          <div class="form-grid" style="margin-top:12px">
            <div class="field"><label>Reps</label><input inputmode="numeric" data-input="reps-${index}" placeholder="${ex.min}-${ex.max}"></div>
            <div class="field"><label>Added weight (${esc(state.settings.units)})</label><input inputmode="decimal" data-input="weight-${index}" placeholder="optional" value="${weightValue ? esc(weightValue) : ''}"></div>
            <div class="field"><label>Note</label><input data-input="note-${index}" placeholder="optional"></div>
            <button class="btn primary" data-action="add-set" data-exercise-index="${index}">Log set</button>
          </div>
        `;
      }
      return `
        <div class="form-grid" style="margin-top:12px">
          <div class="field"><label>Duration (${esc(ex.unit || 'min')})</label><input inputmode="decimal" data-input="duration-${index}" placeholder="${recValue || ex.min}"></div>
          <div class="field"><label>Effort / setting</label><input data-input="note-${index}" placeholder="ex: incline 8, speed 3.2"></div>
          <div class="field"><label>Extra</label><input data-input="extra-${index}" placeholder="optional"></div>
          <button class="btn primary" data-action="add-set" data-exercise-index="${index}">Log</button>
        </div>
      `;
    }


    function renderQuickWeightControls(index, weightValue = '', label = 'Easy weight') {
      return `
        <div class="quick-weight-panel">
          <div class="quick-weight-head">
            <span>${esc(label)}</span>
            <strong class="quick-weight-current" data-current-weight="${index}">${weightValue ? esc(weightValue) + ' ' + esc(state.settings.units) : 'Set weight'}</strong>
          </div>
          <div class="quick-weight-grid">
            <button class="btn small ghost" data-action="adjust-weight" data-exercise-index="${index}" data-delta="-10">−10</button>
            <button class="btn small ghost" data-action="adjust-weight" data-exercise-index="${index}" data-delta="-5">−5</button>
            <button class="btn small primary" data-action="adjust-weight" data-exercise-index="${index}" data-delta="5">+5</button>
            <button class="btn small primary" data-action="adjust-weight" data-exercise-index="${index}" data-delta="10">+10</button>
            <button class="btn small ghost" data-action="use-last-weight" data-exercise-index="${index}">Last</button>
            <button class="btn small ghost" data-action="clear-weight" data-exercise-index="${index}">Clear</button>
          </div>
          <div class="quick-weight-hint">Tap +5 before logging a set. After you log it, that new weight stays filled in for the next sets on this exercise.</div>
        </div>
      `;
    }

    function renderExerciseCompletion(ex, logs) {
      const count = logs.length;
      const target = ex.sets || 1;
      const complete = count >= target;
      const label = ex.type === 'cardio' || ex.type === 'timed' ? 'logs' : 'sets';
      return `<div class="finish-row"><span class="finish-pill ${complete ? 'done' : ''}">${count}/${target} ${label} logged</span>${complete ? '<span class="finish-pill done">target hit</span>' : '<span class="finish-pill">keep going</span>'}</div>`;
    }

    function addSet(index) {
      if (!active || !active.exercises[index]) return;
      const entry = active.exercises[index];
      const ex = getExercise(entry.id);
      if (!ex) return;
      const note = $(`[data-input="note-${index}"]`)?.value?.trim() || '';
      if (ex.type === 'weighted') {
        const weight = parseFloat($(`[data-input="weight-${index}"]`)?.value);
        const reps = parseInt($(`[data-input="reps-${index}"]`)?.value, 10);
        if (!Number.isFinite(weight) || weight <= 0 || !Number.isFinite(reps) || reps <= 0) {
          showToast('Enter both weight and reps.');
          return;
        }
        entry.logs.push({ weight, reps, note, at: new Date().toISOString() });
        entry.draftWeight = weight;
      } else if (ex.type === 'bodyweight') {
        const reps = parseInt($(`[data-input="reps-${index}"]`)?.value, 10);
        const weightRaw = $(`[data-input="weight-${index}"]`)?.value;
        const weight = weightRaw ? parseFloat(weightRaw) : null;
        if (!Number.isFinite(reps) || reps <= 0) {
          showToast('Enter reps.');
          return;
        }
        entry.logs.push({ reps, weight: Number.isFinite(weight) ? weight : null, note, at: new Date().toISOString() });
        entry.draftWeight = Number.isFinite(weight) && weight > 0 ? weight : null;
      } else {
        const duration = parseFloat($(`[data-input="duration-${index}"]`)?.value);
        const extra = $(`[data-input="extra-${index}"]`)?.value?.trim() || '';
        if (!Number.isFinite(duration) || duration <= 0) {
          showToast('Enter the duration.');
          return;
        }
        entry.logs.push({ duration, note: [note, extra].filter(Boolean).join(' • '), at: new Date().toISOString() });
      }
      saveActive();
      if (state.settings.autoRest && ex.type !== 'cardio') startRestTimer(state.settings.restSeconds);
      renderActiveSession();
      showToast(`${ex.name} logged.`);
    }

    function deleteSet(exIndex, setIndex) {
      if (!active?.exercises?.[exIndex]) return;
      const entry = active.exercises[exIndex];
      entry.logs.splice(setIndex, 1);
      entry.draftWeight = getLastLoggedWeight(entry);
      saveActive();
      renderActiveSession();
    }

    function finishWorkout() {
      if (!active) return;
      const loggedCount = active.exercises.reduce((sum, ex) => sum + (ex.logs?.length || 0), 0);
      if (loggedCount === 0 && !confirm('No sets have been logged. Save anyway?')) return;
      const now = new Date().toISOString();
      const session = {
        ...active,
        endedAt: now,
        durationMs: new Date(now).getTime() - new Date(active.startedAt).getTime(),
        completedAt: now
      };
      state.history.push(session);
      rebuildProgressFromHistory();
      state.settings.currentDayIndex = (active.dayIndex + 1) % PLAN.length;
      active = null;
      saveActive();
      saveState();
      stopRestTimer();
      currentTab = 'history';
      render();
      showToast(`Saved. Next up: Day ${getDay().day} • ${getDay().title}.`);
    }

    function cancelWorkout() {
      if (!active) return;
      if (!confirm('Cancel this active workout? Logged sets from this session will be discarded.')) return;
      active = null;
      saveActive();
      stopRestTimer();
      render();
      showToast('Workout canceled.');
    }

    function markRestComplete() {
      const day = getDay();
      const now = new Date().toISOString();
      const session = {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        dayIndex: state.settings.currentDayIndex,
        day: day.day,
        title: day.title,
        type: 'rest',
        focus: day.focus,
        startedAt: now,
        endedAt: now,
        durationMs: 0,
        completedAt: now,
        exercises: []
      };
      state.history.push(session);
      state.settings.currentDayIndex = (state.settings.currentDayIndex + 1) % PLAN.length;
      saveState();
      render();
      showToast(`Rest day saved. Next up: Day ${getDay().day} • ${getDay().title}.`);
    }

    function analyzeExercise(ex, logs) {
      const previous = state.exerciseProgress[ex.id] || {};
      const cleanLogs = logs || [];
      if (!cleanLogs.length) return previous;
      const base = {
        lastDate: new Date().toISOString(),
        completedCount: (previous.completedCount || 0) + 1,
        lastSummary: summarizeLogs(ex, cleanLogs)
      };

      if (ex.type === 'weighted') {
        const working = cleanLogs.filter(l => Number.isFinite(Number(l.weight)) && Number.isFinite(Number(l.reps)));
        if (!working.length) return { ...previous, ...base };
        const evalSets = working.slice(-ex.sets);
        const weights = evalSets.map(l => Number(l.weight));
        const reps = evalSets.map(l => Number(l.reps));
        const lastWeight = weights[weights.length - 1];
        const minReps = Math.min(...reps);
        const sameWorkingWeight = weights.every(w => w === lastWeight);
        let nextWeight = lastWeight;
        let note = `Repeat ${lastWeight} ${state.settings.units} and add reps.`;
        if (evalSets.length < ex.sets) {
          note = `Repeat ${lastWeight} ${state.settings.units}; log all ${ex.sets} sets next time.`;
        } else if (!sameWorkingWeight) {
          note = `Use ${lastWeight} ${state.settings.units} as your working weight next time and keep all sets consistent.`;
        } else if (minReps >= ex.max) {
          nextWeight = roundToIncrement(lastWeight + ex.increment, ex.increment);
          note = `Increase to ${nextWeight} ${state.settings.units} next time.`;
        } else if (minReps < ex.min) {
          note = `Repeat ${lastWeight} ${state.settings.units}. If form felt bad, reduce slightly.`;
        }
        const bestSet = bestWeightedSet(ex.id);
        return { ...previous, ...base, lastWeight, nextWeight, note, bestSet };
      }

      if (ex.type === 'bodyweight') {
        const reps = cleanLogs.map(l => Number(l.reps)).filter(Number.isFinite);
        const minReps = reps.length ? Math.min(...reps.slice(-ex.sets)) : 0;
        const note = minReps >= ex.max ? 'Next time: add 1–3 reps per set or slow the tempo.' : 'Repeat and try to add reps with clean form.';
        return { ...previous, ...base, note, bestSet: bestBodyweightSet(ex.id) };
      }

      const durations = cleanLogs.map(l => Number(l.duration)).filter(Number.isFinite);
      const lastDuration = durations[durations.length - 1] || ex.min;
      let nextDuration = lastDuration;
      let note = `Repeat ${lastDuration} ${ex.unit || 'min'} next time.`;
      if (lastDuration >= ex.max) {
        nextDuration = lastDuration + (ex.increment || 2);
        note = `Add ${ex.increment || 2} ${ex.unit || 'min'} or slightly increase intensity next time.`;
      }
      return { ...previous, ...base, lastDuration, nextDuration, note };
    }

    function roundToIncrement(value, increment) {
      const inc = increment || 5;
      return Math.round(value / inc) * inc;
    }

    function rebuildProgressFromHistory() {
      state.exerciseProgress = {};
      const sorted = [...state.history].sort((a, b) => new Date(a.startedAt) - new Date(b.startedAt));
      for (const session of sorted) {
        for (const entry of session.exercises || []) {
          const ex = getExercise(entry.id);
          if (!ex) continue;
          state.exerciseProgress[ex.id] = analyzeExercise(ex, entry.logs || []);
        }
      }
    }

    function summarizeLogs(ex, logs) {
      if (!logs?.length) return 'No logs';
      if (ex.type === 'weighted') {
        const pieces = logs.map(l => `${l.weight}×${l.reps}`);
        return pieces.slice(0, 5).join(', ') + (pieces.length > 5 ? '…' : '');
      }
      if (ex.type === 'bodyweight') {
        const pieces = logs.map(l => `${l.reps} reps${l.weight ? ' +' + l.weight : ''}`);
        return pieces.slice(0, 5).join(', ') + (pieces.length > 5 ? '…' : '');
      }
      return logs.map(l => `${l.duration} ${ex.unit || 'min'}`).join(', ');
    }

    function bestWeightedSet(exerciseId) {
      let best = null;
      for (const session of state.history) {
        for (const entry of session.exercises || []) {
          if (entry.id !== exerciseId) continue;
          const ex = getExercise(entry.id);
          for (const log of entry.logs || []) {
            const weight = Number(log.weight), reps = Number(log.reps);
            if (!Number.isFinite(weight) || !Number.isFinite(reps)) continue;
            const estimate = weight * (1 + reps / 30);
            if (!best || estimate > best.estimate) best = { weight, reps, estimate, date: session.startedAt, name: ex?.name || exerciseId };
          }
        }
      }
      return best;
    }

    function bestBodyweightSet(exerciseId) {
      let best = null;
      for (const session of state.history) {
        for (const entry of session.exercises || []) {
          if (entry.id !== exerciseId) continue;
          const ex = getExercise(entry.id);
          for (const log of entry.logs || []) {
            const reps = Number(log.reps);
            if (!Number.isFinite(reps)) continue;
            if (!best || reps > best.reps) best = { reps, date: session.startedAt, name: ex?.name || exerciseId };
          }
        }
      }
      return best;
    }

    function renderHistory() {
      const sessions = [...state.history].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt));
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="section-title" style="margin-top:0">
              <div>
                <div class="kicker">Training log</div>
                <h1>History</h1>
                <p class="muted">Every saved workout and rest day lives here.</p>
              </div>
              <div class="inline-controls">
                <button class="btn green" data-action="share-coach-report">Coach check-in</button>
                <button class="btn" data-action="export-data">Export backup</button>
                <label class="btn" for="importFile">Import backup</label>
                <input id="importFile" type="file" accept="application/json" hidden>
              </div>
            </div>
            ${sessions.length ? `<div class="history-list">${sessions.map(renderHistoryCard).join('')}</div>` : `<div class="empty">No saved sessions yet. Start your first workout from the Today tab.</div>`}
          </div>
        </section>
      `;
      $('#importFile')?.addEventListener('change', importData);
    }

    function renderHistoryCard(session) {
      const exercises = session.exercises || [];
      const summaryRows = exercises.filter(e => e.logs?.length).slice(0, 7).map(entry => {
        const ex = getExercise(entry.id);
        return `<div><strong>${esc(ex?.name || entry.id)}:</strong> ${esc(summarizeLogs(ex || { type:'weighted' }, entry.logs))}</div>`;
      }).join('');
      return `
        <article class="history-card">
          <div class="history-card-head">
            <div>
              <h3>${esc(session.title)} <span class="muted">• Day ${session.day}</span></h3>
              <div class="small-text">${fmtDate(session.startedAt)} at ${fmtTime(session.startedAt)} • ${session.type === 'rest' ? 'Rest' : formatDuration(session.durationMs || 0)}</div>
            </div>
            <button class="btn small danger" data-action="delete-session" data-session-id="${esc(session.id)}">Delete</button>
          </div>
          ${summaryRows ? `<div class="history-summary">${summaryRows}${exercises.filter(e => e.logs?.length).length > 7 ? '<div>…</div>' : ''}</div>` : `<div class="history-summary"><div>Rest day or no sets logged.</div></div>`}
        </article>
      `;
    }

    function deleteSession(id) {
      if (!confirm('Delete this saved session?')) return;
      state.history = state.history.filter(s => s.id !== id);
      rebuildProgressFromHistory();
      saveState();
      renderHistory();
      showToast('Session deleted.');
    }

    function renderProgress() {
      const stats = getStats();
      const prRows = getPRRows().slice(0, 12).map(pr => `
        <tr><td>${esc(pr.name)}</td><td>${esc(pr.value)}</td><td>${fmtDate(pr.date)}</td></tr>
      `).join('');
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="kicker">Progress</div>
            <h1>Stats</h1>
            <div class="stat-row">
              <div class="stat"><div class="label">Lift sessions</div><div class="value">${stats.liftSessions}</div></div>
              <div class="stat"><div class="label">Rest days logged</div><div class="value">${stats.restSessions}</div></div>
              <div class="stat"><div class="label">Total sets</div><div class="value">${stats.totalSets}</div></div>
              <div class="stat"><div class="label">Volume</div><div class="value">${Math.round(stats.totalVolume).toLocaleString()}</div></div>
            </div>
          </div>
        </section>
        <section class="grid two" style="margin-top:16px">
          <div class="card chart-card">
            <div class="card-inner">
              <div class="section-title" style="margin-top:0"><h2 style="margin:0">Body metrics</h2></div>
              ${renderBodyChart()}
              ${renderMetricForm()}
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <div class="section-title" style="margin-top:0"><h2 style="margin:0">Estimated PRs</h2></div>
              ${prRows ? `<table class="set-table"><thead><tr><th>Exercise</th><th>Best</th><th>Date</th></tr></thead><tbody>${prRows}</tbody></table>` : `<div class="empty">No PRs yet. Log a few weighted workouts first.</div>`}
            </div>
          </div>
        </section>
      `;
    }

    function getStats() {
      const liftSessions = state.history.filter(s => s.type !== 'rest').length;
      const restSessions = state.history.filter(s => s.type === 'rest').length;
      let totalSets = 0;
      let totalVolume = 0;
      for (const session of state.history) {
        for (const entry of session.exercises || []) {
          for (const log of entry.logs || []) {
            if (Number.isFinite(Number(log.reps))) totalSets += 1;
            if (Number.isFinite(Number(log.weight)) && Number.isFinite(Number(log.reps))) totalVolume += Number(log.weight) * Number(log.reps);
          }
        }
      }
      const now = new Date();
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - 6);
      weekStart.setHours(0,0,0,0);
      const thisWeek = state.history.filter(s => new Date(s.startedAt) >= weekStart).length;
      return { liftSessions, restSessions, totalSets, totalVolume, thisWeek, streak: getStreak() };
    }

    function getStreak() {
      if (!state.history.length) return 0;
      const completed = new Set(state.history.map(s => {
        const d = new Date(s.startedAt); d.setHours(0,0,0,0); return d.getTime();
      }));
      let streak = 0;
      const cursor = new Date(); cursor.setHours(0,0,0,0);
      for (let i = 0; i < 365; i++) {
        if (completed.has(cursor.getTime())) streak += 1;
        else if (i === 0) { cursor.setDate(cursor.getDate() - 1); continue; }
        else break;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function getPRRows() {
      const rows = [];
      for (const [id, progress] of Object.entries(state.exerciseProgress)) {
        const ex = getExercise(id);
        if (!ex || !progress.bestSet) continue;
        if (ex.type === 'weighted') rows.push({ name: ex.name, value: `${progress.bestSet.weight}×${progress.bestSet.reps} (${Math.round(progress.bestSet.estimate)} est.)`, date: progress.bestSet.date, score: progress.bestSet.estimate });
        if (ex.type === 'bodyweight') rows.push({ name: ex.name, value: `${progress.bestSet.reps} reps`, date: progress.bestSet.date, score: progress.bestSet.reps });
      }
      return rows.sort((a,b) => b.score - a.score);
    }

    function renderBodyChart() {
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      if (metrics.length < 2) return `<div class="empty">Add body weight entries to see a trend chart.</div>`;
      const width = 640, height = 220, pad = 28;
      const weights = metrics.map(m => Number(m.weight)).filter(Number.isFinite);
      const minW = Math.min(...weights), maxW = Math.max(...weights);
      const span = Math.max(1, maxW - minW);
      const points = metrics.map((m, i) => {
        const x = pad + (i / Math.max(1, metrics.length - 1)) * (width - pad * 2);
        const y = height - pad - ((Number(m.weight) - minW) / span) * (height - pad * 2);
        return `${x},${y}`;
      }).join(' ');
      const last = metrics[metrics.length - 1];
      const first = metrics[0];
      const delta = Number(last.weight) - Number(first.weight);
      return `
        <div class="big-metric">${esc(last.weight)} ${esc(state.settings.units)}</div>
        <div class="small-text">Change: ${delta > 0 ? '+' : ''}${delta.toFixed(1)} ${esc(state.settings.units)} since ${fmtDate(first.date)}</div>
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Body weight chart">
          <polyline fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" points="${points}" opacity=".95"></polyline>
          ${metrics.map((m, i) => {
            const x = pad + (i / Math.max(1, metrics.length - 1)) * (width - pad * 2);
            const y = height - pad - ((Number(m.weight) - minW) / span) * (height - pad * 2);
            return `<circle cx="${x}" cy="${y}" r="5" fill="currentColor"></circle>`;
          }).join('')}
        </svg>
      `;
    }

    function renderMetricForm() {
      return `
        <div class="form-grid" style="margin-top:12px">
          <div class="field"><label>Body weight (${esc(state.settings.units)})</label><input inputmode="decimal" data-input="metric-weight" placeholder="ex: 215"></div>
          <div class="field"><label>Waist</label><input inputmode="decimal" data-input="metric-waist" placeholder="optional"></div>
          <div class="field"><label>Note</label><input data-input="metric-note" placeholder="optional"></div>
          <button class="btn primary" data-action="save-metric">Save metric</button>
        </div>
      `;
    }

    function saveMetric() {
      const weight = parseFloat($('[data-input="metric-weight"]')?.value);
      const waistRaw = $('[data-input="metric-waist"]')?.value;
      const waist = waistRaw ? parseFloat(waistRaw) : null;
      const note = $('[data-input="metric-note"]')?.value?.trim() || '';
      if (!Number.isFinite(weight) || weight <= 0) {
        showToast('Enter a valid body weight.');
        return;
      }
      state.bodyMetrics.push({ id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), date: new Date().toISOString(), weight, waist: Number.isFinite(waist) ? waist : null, note });
      saveState();
      renderProgress();
      showToast('Metric saved.');
    }

    function renderPlan() {
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="kicker">Fixed weekly split</div>
            <h1>Plan</h1>
            <p class="muted">Same 7-day structure each week: 5 lifting days, 2 rest days, Planet Fitness equipment, no lunges.</p>
          </div>
        </section>
        <section class="plan-list" style="margin-top:16px">
          ${PLAN.map((day, index) => `
            <article class="card">
              <div class="card-inner">
                <div class="exercise-head">
                  <div>
                    <div class="kicker">Day ${day.day} • ${typeLabel(day)}</div>
                    <h2>${esc(day.title)}</h2>
                    <p class="muted">${esc(day.focus)}</p>
                  </div>
                  <button class="btn small" data-action="set-current-day" data-day-index="${index}">Make next</button>
                </div>
                <p class="note">${esc(day.note)}</p>
                <div class="exercise-preview">
                  ${day.exercises.map(renderExercisePreview).join('')}
                </div>
              </div>
            </article>
          `).join('')}
        </section>
      `;
    }

    function renderSettings() {
      const dayOptions = PLAN.map((d, i) => `<option value="${i}" ${i === state.settings.currentDayIndex ? 'selected' : ''}>Day ${d.day}: ${esc(d.title)}</option>`).join('');
      const view = $('#view');
      view.innerHTML = `
        <section class="card">
          <div class="card-inner">
            <div class="kicker">Settings</div>
            <h1>App settings</h1>
            <div class="grid two">
              <div class="field">
                <label>Next split day</label>
                <select data-setting="currentDayIndex">${dayOptions}</select>
              </div>
              <div class="field">
                <label>Units</label>
                <select data-setting="units"><option value="lb" ${state.settings.units === 'lb' ? 'selected' : ''}>lb</option><option value="kg" ${state.settings.units === 'kg' ? 'selected' : ''}>kg</option></select>
              </div>
              <div class="field">
                <label>Rest timer seconds</label>
                <input inputmode="numeric" data-setting="restSeconds" value="${esc(state.settings.restSeconds)}">
              </div>
              <div class="field">
                <label>Theme</label>
                <select data-setting="theme"><option value="dark" ${state.settings.theme === 'dark' ? 'selected' : ''}>Dark</option><option value="light" ${state.settings.theme === 'light' ? 'selected' : ''}>Light</option></select>
              </div>
            </div>
            <div class="toolbar">
              <label class="badge" style="cursor:pointer"><input type="checkbox" data-setting="autoRest" ${state.settings.autoRest ? 'checked' : ''} style="width:auto;margin:0 7px 0 0"> Auto-start rest timer after sets</label>
              <button class="btn primary" data-action="save-settings">Save settings</button>
              <button class="btn green" data-action="share-coach-report">Coach check-in</button>
            </div>
            <p class="small-text install-note">To install on your phone, use Safari/Chrome’s menu: <strong>Share or three dots → Add to Home Screen</strong>. I removed the confusing in-app Install button.</p>
          </div>
        </section>
        ${renderCoachPanel()}
        <section class="card danger-zone" style="margin-top:16px">
          <div class="card-inner">
            <h2>Backup and reset</h2>
            <p class="muted">Export a backup before resetting. Your workout history is saved locally in this browser.</p>
            <div class="toolbar">
              <button class="btn" data-action="export-data">Export backup</button>
              <button class="btn" data-action="refresh-app-cache">Refresh app cache</button>
              <label class="btn" for="settingsImportFile">Import backup</label>
              <input id="settingsImportFile" type="file" accept="application/json" hidden>
              <button class="btn danger" data-action="reset-all">Reset everything</button>
            </div>
          </div>
        </section>
      `;
      $('#settingsImportFile')?.addEventListener('change', importData);
    }

    function renderCoachPanel() {
      const report = buildCoachReport();
      return `
        <section class="card coach-card" style="margin-top:16px">
          <div class="card-inner">
            <div class="kicker">Coach access</div>
            <h2>Share progress with ChatGPT</h2>
            <p class="muted">Your data stays on your phone. Tap this to share or copy a clean check-in report, then paste it into ChatGPT so I can review your progress and adjust the plan.</p>
            <div class="toolbar">
              <button class="btn green" data-action="share-coach-report">Share / copy coach report</button>
              <button class="btn" data-action="export-data">Download full backup</button>
            </div>
            <details class="coach-details">
              <summary>Preview the coach report</summary>
              <textarea class="coach-preview" readonly>${esc(report)}</textarea>
            </details>
          </div>
        </section>
      `;
    }

    function saveSettingsFromUI() {
      const day = parseInt($('[data-setting="currentDayIndex"]')?.value, 10);
      const restSeconds = parseInt($('[data-setting="restSeconds"]')?.value, 10);
      const units = $('[data-setting="units"]')?.value || 'lb';
      const theme = $('[data-setting="theme"]')?.value || 'dark';
      const autoRest = $('[data-setting="autoRest"]')?.checked ?? true;
      state.settings.currentDayIndex = Number.isFinite(day) ? day : state.settings.currentDayIndex;
      state.settings.restSeconds = clamp(Number.isFinite(restSeconds) ? restSeconds : 90, 30, 300);
      state.settings.units = units;
      state.settings.theme = theme;
      state.settings.autoRest = autoRest;
      saveState();
      render();
      showToast('Settings saved.');
    }



    function buildCoachReport() {
      const stats = getStats();
      const next = getDay();
      const metrics = [...state.bodyMetrics].sort((a,b) => new Date(a.date) - new Date(b.date));
      const lastMetric = metrics[metrics.length - 1];
      const firstMetric = metrics[0];
      const recent = [...state.history].sort((a, b) => new Date(b.startedAt) - new Date(a.startedAt)).slice(0, 6);
      const lines = [];
      lines.push('PF WORKOUT TRACKER — COACH CHECK-IN');
      lines.push(`Generated: ${new Date().toLocaleString()}`);
      lines.push(`Next workout: Day ${next.day} — ${next.title} (${typeLabel(next)}: ${next.focus})`);
      lines.push(`Stats: ${stats.liftSessions} lift sessions, ${stats.restSessions} rest days, ${stats.thisWeek} completed in the last 7 days, ${stats.totalSets} logged sets, ${Math.round(stats.totalVolume).toLocaleString()} total volume.`);
      if (lastMetric) {
        const delta = firstMetric ? Number(lastMetric.weight) - Number(firstMetric.weight) : 0;
        const waist = lastMetric.waist ? `, waist ${lastMetric.waist}` : '';
        lines.push(`Body metrics: latest ${lastMetric.weight} ${state.settings.units}${waist} on ${fmtDate(lastMetric.date)}${firstMetric && metrics.length > 1 ? `; change ${delta >= 0 ? '+' : ''}${delta.toFixed(1)} ${state.settings.units} since ${fmtDate(firstMetric.date)}` : ''}.`);
      } else {
        lines.push('Body metrics: none logged yet.');
      }
      lines.push('');
      lines.push('Recent sessions:');
      if (!recent.length) {
        lines.push('- No saved sessions yet.');
      } else {
        recent.forEach(session => {
          const setCount = (session.exercises || []).reduce((sum, entry) => sum + ((entry.logs || []).length), 0);
          lines.push(`- ${fmtDate(session.startedAt)} — Day ${session.day} ${session.title} (${session.type === 'rest' ? 'rest' : formatDuration(session.durationMs || 0)}), ${setCount} logs`);
          (session.exercises || []).filter(entry => entry.logs?.length).slice(0, 5).forEach(entry => {
            const ex = getExercise(entry.id) || { name: entry.id, type: 'weighted' };
            lines.push(`  • ${ex.name}: ${summarizeLogs(ex, entry.logs)}`);
          });
        });
      }
      lines.push('');
      lines.push('Next-time recommendations:');
      const recs = Object.entries(state.exerciseProgress)
        .map(([id, progress]) => ({ ex: getExercise(id), progress }))
        .filter(item => item.ex && item.progress?.note)
        .slice(0, 18);
      if (!recs.length) {
        lines.push('- None yet. Log a workout first.');
      } else {
        recs.forEach(({ ex, progress }) => {
          lines.push(`- ${ex.name}: ${progress.note}${progress.lastSummary ? ` Last: ${progress.lastSummary}.` : ''}`);
        });
      }
      lines.push('');
      lines.push('Ask: Review this and tell me what to adjust for fat loss and muscle definition.');
      return lines.join('\n');
    }

    function downloadTextFile(filename, text, type = 'text/plain') {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function shareCoachReport() {
      const report = buildCoachReport();
      if (navigator.share) {
        try {
          await navigator.share({ title: 'PF Workout Coach Check-In', text: report });
          showToast('Coach report shared.');
          return;
        } catch (err) {
          if (err && err.name === 'AbortError') return;
        }
      }
      try {
        await navigator.clipboard.writeText(report);
        showToast('Coach report copied. Paste it into ChatGPT.');
      } catch (err) {
        downloadTextFile(`pf-coach-checkin-${new Date().toISOString().slice(0,10)}.txt`, report);
        showToast('Coach report downloaded as a text file.');
      }
    }

    async function refreshAppCache() {
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter(key => key.includes('pf-workout')).map(key => caches.delete(key)));
        }
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.update().catch(() => {})));
        }
        showToast('App cache refreshed. Close and reopen the app.');
      } catch (err) {
        showToast('Could not refresh cache. Close and reopen the browser.');
      }
    }

    function exportData() {
      const payload = JSON.stringify({ exportedAt: new Date().toISOString(), app: 'PF Workout Tracker', data: state }, null, 2);
      const blob = new Blob([payload], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `pf-workout-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('Backup exported.');
    }

    function importData(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result));
          const incoming = parsed.data || parsed;
          if (!incoming.history || !incoming.settings) throw new Error('Invalid backup');
          if (!confirm('Import this backup? It will replace the current data in this browser.')) return;
          const next = Object.assign(defaultState(), incoming);
          Object.keys(state).forEach(k => delete state[k]);
          Object.assign(state, next);
          rebuildProgressFromHistory();
          saveState();
          render();
          showToast('Backup imported.');
        } catch (err) {
          showToast('Could not import that backup file.');
        }
      };
      reader.readAsText(file);
    }

    function resetAll() {
      if (!confirm('Reset all workout history, metrics, and recommendations? Export a backup first if you want to keep it.')) return;
      const fresh = defaultState();
      Object.keys(state).forEach(k => delete state[k]);
      Object.assign(state, fresh);
      active = null;
      saveActive();
      saveState();
      currentTab = 'today';
      render();
      showToast('App reset.');
    }

    function startRestTimer(seconds) {
      stopRestTimer(false);
      rest.duration = seconds * 1000;
      rest.start = Date.now();
      rest.end = rest.start + rest.duration;
      $('#restTimerBox').classList.remove('hidden');
      rest.interval = setInterval(updateRestTimer, 250);
      updateRestTimer();
    }

    function stopRestTimer(hide = true) {
      if (rest.interval) clearInterval(rest.interval);
      rest.interval = null;
      rest.end = 0;
      if (hide) $('#restTimerBox').classList.add('hidden');
    }

    function updateRestTimer() {
      if (!rest.end) return;
      const remaining = Math.max(0, rest.end - Date.now());
      const pct = rest.duration ? (1 - remaining / rest.duration) * 100 : 100;
      $('#restTime').textContent = formatDuration(remaining, true);
      $('#restBar').style.width = `${clamp(pct, 0, 100)}%`;
      if (remaining <= 0) {
        stopRestTimer(false);
        $('#restTime').textContent = 'Done';
        $('#restBar').style.width = '100%';
        setTimeout(() => $('#restTimerBox').classList.add('hidden'), 1800);
        showToast('Rest is done.');
      }
    }

    function restartElapsedClock() {
      if (renderClock) clearInterval(renderClock);
      renderClock = setInterval(() => {
        const el = $('#elapsedTime');
        if (el && active) el.textContent = formatDuration(Date.now() - new Date(active.startedAt).getTime());
      }, 1000);
    }

    function formatDuration(ms, clock = false) {
      const total = Math.max(0, Math.round(ms / 1000));
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      if (clock || h === 0) return `${String(m + h * 60).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function handleClick(event) {
      const tabBtn = event.target.closest('[data-tab]');
      if (tabBtn) {
        currentTab = tabBtn.dataset.tab;
        render();
        return;
      }
      const btn = event.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === 'start-workout') startWorkout();
      if (action === 'finish-workout') finishWorkout();
      if (action === 'cancel-workout') cancelWorkout();
      if (action === 'mark-rest-complete') markRestComplete();
      if (action === 'advance-day') { state.settings.currentDayIndex = (state.settings.currentDayIndex + 1) % PLAN.length; saveState(); render(); showToast(`Next up: Day ${getDay().day} • ${getDay().title}.`); }
      if (action === 'change-current-day') return;
      if (action === 'set-current-day') { state.settings.currentDayIndex = Number(btn.dataset.dayIndex) || 0; saveState(); currentTab = 'today'; render(); showToast(`Set next workout to Day ${getDay().day}.`); }
      if (action === 'add-set') addSet(Number(btn.dataset.exerciseIndex));
      if (action === 'adjust-weight') adjustWeight(Number(btn.dataset.exerciseIndex), Number(btn.dataset.delta));
      if (action === 'use-last-weight') useLastSetWeight(Number(btn.dataset.exerciseIndex));
      if (action === 'clear-weight') clearDraftWeight(Number(btn.dataset.exerciseIndex));
      if (action === 'delete-set') deleteSet(Number(btn.dataset.exerciseIndex), Number(btn.dataset.setIndex));
      if (action === 'delete-session') deleteSession(btn.dataset.sessionId);
      if (action === 'save-metric') saveMetric();
      if (action === 'save-settings') saveSettingsFromUI();
      if (action === 'export-data') exportData();
      if (action === 'share-coach-report') shareCoachReport();
      if (action === 'refresh-app-cache') refreshAppCache();
      if (action === 'reset-all') resetAll();
      if (action === 'toggle-theme') { state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark'; saveState(); render(); }
      if (action === 'start-rest-manual') startRestTimer(state.settings.restSeconds);
      if (action === 'add-rest-30') { if (!rest.end) startRestTimer(30); else rest.end += 30000; rest.duration += 30000; updateRestTimer(); }
      if (action === 'skip-rest') stopRestTimer(true);
    }

    function handleChange(event) {
      const chooser = event.target.closest('[data-action="change-current-day"]');
      if (chooser) {
        state.settings.currentDayIndex = Number(chooser.value) || 0;
        saveState();
        render();
      }
    }

    function handleInput(event) {
      const input = event.target.closest('[data-input^="weight-"]');
      if (!input || !active) return;
      const index = Number(String(input.dataset.input || '').split('-')[1]);
      if (!Number.isInteger(index) || !active.exercises[index]) return;
      const weight = Number(input.value);
      if (!Number.isFinite(weight) || weight <= 0) return;
      active.exercises[index].draftWeight = Math.round(weight * 100) / 100;
      saveActive();
      const label = $(`[data-current-weight="${index}"]`);
      if (label) label.textContent = `${cleanNumber(weight)} ${state.settings.units}`;
    }


    document.addEventListener('click', handleClick);
    document.addEventListener('change', handleChange);
    document.addEventListener('input', handleInput);

    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }

    rebuildProgressFromHistory();
    saveState();
    render();
  })();
  </script>
</body>
</html>
